<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganti Password - SIPANDU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-sky-500 to-indigo-600 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl w-full max-w-md space-y-8 border border-slate-100 animate-pop">
        <div class="text-center space-y-2">
            <div class="w-16 h-16 bg-sky-100 rounded-2xl flex items-center justify-center text-sky-600 mx-auto mb-4">
                <i data-lucide="key-round" class="w-8 h-8"></i>
            </div>
            <h1 class="text-2xl font-black text-slate-800 uppercase tracking-tight">Ganti Password</h1>
            <p class="text-slate-400 font-bold text-[10px] uppercase tracking-widest">Amankan akun Anda dengan password baru</p>
        </div>

        <div class="space-y-5 text-left">
            <div class="space-y-1.5">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Password Saat Ini</label>
                <div class="relative group">
                    <i data-lucide="lock" class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-sky-500 transition-colors"></i>
                    <input type="text" id="current-password" placeholder="Masukkan password lama"
                        class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border-2 border-slate-100 focus:border-sky-400 focus:bg-white rounded-2xl font-bold text-sm outline-none transition-all">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Password Baru</label>
                <div class="relative group">
                    <i data-lucide="shield-check" class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-emerald-500 transition-colors"></i>
                    <input type="text" id="new-password" placeholder="Masukkan password baru"
                        class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border-2 border-slate-100 focus:border-emerald-400 focus:bg-white rounded-2xl font-bold text-sm outline-none transition-all">
                </div>
            </div>

            <div class="space-y-1.5">
                <label class="text-[10px] font-black text-slate-500 uppercase tracking-widest ml-1">Konfirmasi Password Baru</label>
                <div class="relative group">
                    <i data-lucide="check-circle-2" class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 group-focus-within:text-emerald-500 transition-colors"></i>
                    <input type="text" id="confirm-password" placeholder="Ulangi password baru"
                        class="w-full pl-11 pr-4 py-3.5 bg-slate-50 border-2 border-slate-100 focus:border-emerald-400 focus:bg-white rounded-2xl font-bold text-sm outline-none transition-all">
                </div>
            </div>
        </div>

        <button onclick="updatePassword()" id="btn-save"
            class="w-full bg-sky-500 text-white font-black py-4 rounded-2xl hover:bg-sky-600 transition-all shadow-lg shadow-sky-100 uppercase tracking-widest text-xs flex items-center justify-center gap-2 group">
            <i data-lucide="save" class="w-4 h-4"></i>
            <span>Simpan Password Baru</span>
        </button>

        <div class="pt-2">
            <button onclick="handleLocalBack()" class="text-[10px] font-black text-slate-400 hover:text-sky-500 uppercase tracking-widest transition-colors">
                Kembali ke Halaman Login
            </button>
        </div>
    </div>

    <!-- Notification Toast -->
    <div id="toast" class="fixed bottom-8 right-8 bg-slate-900 text-white px-6 py-4 rounded-2xl shadow-2xl translate-y-20 opacity-0 transition-all duration-500 z-50 flex items-center gap-3">
        <i id="toast-icon" data-lucide="check-circle" class="w-5 h-5"></i>
        <span id="toast-msg" class="font-bold text-xs uppercase tracking-widest"></span>
    </div>

    <script>
        const supa = supabase.createClient(
            "https://yewkffbatvrbtfliikia.supabase.co",
            "sb_publishable_gh_LzjznODmbTtMBzt5aaA_sFTDMykg"
        );

        const currentNip = localStorage.getItem('sipandu_username');

        function handleLocalBack() {
            // Coba panggil fungsi di parent jika ada (index.html)
            if (window.parent && window.parent.handleBackToLogin) {
                window.parent.handleBackToLogin();
            } else {
                // Fallback jika dibuka langsung
                window.location.href = 'index.html';
            }
        }

        async function updatePassword() {
            const currentPw = document.getElementById('current-password').value;
            const newPw = document.getElementById('new-password').value;
            const confirmPw = document.getElementById('confirm-password').value;
            const btn = document.getElementById('btn-save');

            if (!currentPw || !newPw || !confirmPw) {
                showToast("Semua kolom harus diisi", "alert-triangle", "text-rose-400");
                return;
            }

            if (newPw !== confirmPw) {
                showToast("Konfirmasi password tidak cocok", "alert-circle", "text-rose-400");
                return;
            }

            btn.disabled = true;
            btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> <span>Memproses...</span>`;
            lucide.createIcons();

            try {
                // 1. Verifikasi password lama
                const { data: user, error: fetchError } = await supa
                    .from('user_access')
                    .select('password')
                    .eq('nip', currentNip)
                    .single();

                if (fetchError || !user) throw new Error("Data user tidak ditemukan");

                if (user.password !== currentPw) {
                    showToast("Password lama salah", "x-circle", "text-rose-400");
                    btn.disabled = false;
                    btn.innerHTML = `<i data-lucide="save" class="w-4 h-4"></i> <span>Simpan Password Baru</span>`;
                    lucide.createIcons();
                    return;
                }

                // 2. Update password baru
                const { error: updateError } = await supa
                    .from('user_access')
                    .update({ password: newPw })
                    .eq('nip', currentNip);

                if (updateError) throw updateError;

                showToast("Password berhasil diperbarui!", "check-circle", "text-emerald-400");
                
                // Clear inputs
                document.getElementById('current-password').value = '';
                document.getElementById('new-password').value = '';
                document.getElementById('confirm-password').value = '';

            } catch (err) {
                console.error(err);
                showToast("Gagal memperbarui password", "alert-triangle", "text-rose-400");
            } finally {
                btn.disabled = false;
                btn.innerHTML = `<i data-lucide="save" class="w-4 h-4"></i> <span>Simpan Password Baru</span>`;
                lucide.createIcons();
            }
        }

        function showToast(msg, icon, iconColor) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toast-msg');
            const toastIcon = document.getElementById('toast-icon');
            
            toastMsg.innerText = msg;
            toastIcon.setAttribute('data-lucide', icon);
            toastIcon.className = `w-5 h-5 ${iconColor}`;
            
            lucide.createIcons();
            
            toast.classList.remove('translate-y-20', 'opacity-0');
            toast.classList.add('translate-y-0', 'opacity-100');
            
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
                toast.classList.remove('translate-y-0', 'opacity-100');
            }, 3000);
        }

        lucide.createIcons();
    </script>
</body>
</html>
