        const formatRupiah = (num) => {
            if (num === undefined || num === null || num === '') return '';
            const val = typeof num === 'string' ? parseInt(num.replace(/[^0-9]/g, '')) : num;
            if (isNaN(val)) return '0';
            return new Intl.NumberFormat('id-ID').format(val);
        };

        const parseRupiah = (str) => {
            if (!str) return 0;
            return parseInt(str.toString().replace(/[^0-9]/g, '')) || 0;
        };

        function showNotif(msg, type = 'success') {
            const el = document.getElementById('notif');
            const msgEl = document.getElementById('notif-msg');

            el.style.opacity = '1';

        // --- CORE DATABASE FUNCTIONS ---
        async function init() {
            try {
                console.log("[APBD] Initializing database connection...");
                
                // Wait for supabase to be defined (max 5 seconds)
                let retries = 0;
                while (typeof supabase === 'undefined' && retries < 10) {
                    console.log("[APBD] Waiting for Supabase library... " + (retries + 1));
                    await new Promise(resolve => setTimeout(resolve, 500));
                    retries++;
                }

                if (typeof supabase === 'undefined') {
                    throw new Error("Library Supabase tidak terdeteksi. Silakan periksa koneksi internet dan muat ulang halaman.");
                }

                if (!supa) {
                    console.log("[APBD] Creating Supabase client...");
                    supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
                }

                const { data, error } = await supa
                    .from('sipd_main_document')
                    .select('*')
                    .eq('app_id', appId)
                    .maybeSingle();

                if (error) {
                    console.error("[APBD] Database Fetch Error:", error);
                    if (error.code === '42P01') {
                        throw new Error("Tabel 'sipd_main_document' belum dibuat di database Supabase.");
                    }
                    throw new Error("Gagal mengambil data: " + error.message);
                }

                if (data) {
                    console.log("[APBD] Data loaded successfully");
                    state.data = {
                        pagu: data.pagu || [],
                        realisasi: data.realisasi || [],
                        backups: data.backups || []
                    };

                    updateBackupBadge();
                    updateHierarchyOptions();
                    updateModeUI();
                } else {
                    console.log("[APBD] No data found, creating new entry...");
                    await saveToSupabase({ pagu: [], realisasi: [], backups: [] });
                }
                render();
            } catch (err) {
                console.error("[APBD] Initialization failed:", err);
                const errorMsg = err.message || "Gagal memuat data dari database";
                showNotif(errorMsg, "error");
                
                // Provide a manual retry in console for developers
                window.retryInit = init;
                console.log("Ketik 'retryInit()' untuk mencoba ulang koneksi database.");

                // Fallback to local rendering
                render();
            }
        }

        async function saveToSupabase(newData) {
            try {
                if (!supa) {
                    throw new Error("Koneksi database belum terinisialisasi.");
                }

                // Update local state first for instant UI feedback
                state.data = newData;
                
                const { error } = await supa
                    .from('sipd_main_document')
                    .upsert({ 
                        app_id: appId, 
                        pagu: newData.pagu, 
                        realisasi: newData.realisasi, 
                        backups: newData.backups,
                        updated_at: new Date().toISOString()
                    }, { onConflict: 'app_id' });

                if (error) throw error;
                showNotif("Tersimpan di Database");
                updateBackupBadge();
            } catch (err) {
                console.error("Save Error:", err);
                showNotif("Gagal menyimpan ke Cloud: " + (err.message || "Error tidak dikenal"), "error");
            }
        }

        // --- BACKUP & RESTORE LOGIC ---
        function createBackup() {
            if (!state.data.pagu.length && !state.data.realisasi.length) {
                alert("Tidak ada data untuk dibackup.");
                return;
            }
            
            // Generate SQL snapshot format
            const timestamp = new Date().toISOString();
            const sqlSnapshot = `-- SIPD ULTRA SQL SNAPSHOT
-- Generated: ${timestamp}
BEGIN;
DELETE FROM public.sipd_main_document WHERE app_id = '${appId}';
INSERT INTO public.sipd_main_document (app_id, pagu, realisasi, updated_at)
VALUES (
    '${appId}',
    '${JSON.stringify(state.data.pagu).replace(/'/g, "''")}'::jsonb,
    '${JSON.stringify(state.data.realisasi).replace(/'/g, "''")}'::jsonb,
    '${timestamp}'
);
COMMIT;`;

            const newBackup = {
                id: `backup-${Date.now()}`,
                timestamp: new Date().toLocaleString('id-ID'),
                pagu: JSON.parse(JSON.stringify(state.data.pagu)),
                realisasi: JSON.parse(JSON.stringify(state.data.realisasi)),
                sql_snapshot: sqlSnapshot
            };
            
            const updatedBackups = [newBackup, ...(state.data.backups || [])].slice(0, 10);
            saveToSupabase({ ...state.data, backups: updatedBackups });
        }

        function downloadSqlBackup(id) {
            const backup = state.data.backups.find(b => b.id === id);
            if (!backup || !backup.sql_snapshot) {
                alert("Snapshot SQL tidak ditemukan untuk backup ini.");
                return;
            }
            
            const blob = new Blob([backup.sql_snapshot], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `RESTORE_SIPD_${backup.timestamp.replace(/[/:\s]/g, '_')}.sql`;
            a.click();
            URL.revokeObjectURL(url);
            showNotif("File SQL Restore berhasil diunduh");
        }

        function handleImport(e) {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = async (ev) => {
                try {
                    const imported = JSON.parse(ev.target.result);
                    
                    // Validasi struktur data minimal
                    if (!imported.pagu || !Array.isArray(imported.pagu)) {
                        throw new Error("Format data JSON tidak sesuai (pagu missing)");
                    }

                    if (confirm("Data JSON berhasil dibaca. Pulihkan data ini ke Cloud? (Data saat ini akan diganti)")) {
                        // Gabungkan dengan backups lama jika ada
                        const newData = {
                            pagu: imported.pagu || [],
                            realisasi: imported.realisasi || [],
                            backups: state.data.backups || []
                        };
                        
                        await saveToSupabase(newData);
                        // Reload state lokal
                        state.data = newData;
                        updateHierarchyOptions();
                        render();
                        showNotif("Data JSON berhasil dipulihkan ke Cloud");
                    }
                } catch(err) { 
                    console.error("Import Error:", err);
                    alert("Gagal memulihkan JSON: " + err.message); 
                } finally {
                    e.target.value = ''; // Reset input file
                }
            };
            reader.readAsText(file);
        }
        // --- CALCULATION LOGIC ---
        function getAggregatedData(item) {
            // Jika rekening, ambil nilainya sendiri. Jika bukan rekening, mulai dari 0 (akan dijumlahkan dari anak-anaknya)
            let paguMurni = item.type === 'rekening' ? parseRupiah(item.paguMurni || item.pagu || 0) : 0;
            let paguEfisiensi = item.type === 'rekening' ? parseRupiah(item.paguEfisiensi || 0) : 0;
            let paguPerubahan = item.type === 'rekening' ? parseRupiah(item.paguPerubahan || item.pagu || 0) : 0;
            let belumSP2D = parseRupiah(item.belumSP2D || 0);
            
            const transactions = (state.data.realisasi || []).filter(r => r.rekeningId === item.id);
            
            let realisasi = 0;
            let monthly = Array(12).fill(0);

            transactions.forEach(r => {
                const nilai = parseRupiah(r.nilai);
                realisasi += nilai;
                
                if (r.tanggal) {
                    // Coba berbagai format tanggal (YYYY-MM-DD, DD-MM-YYYY, YYYY/MM/DD, dsb)
                    const dateParts = r.tanggal.split(/[-/.]/);
                    let month = -1;

                    if (dateParts.length === 3) {
                        // Jika format YYYY-MM-DD (bagian pertama > 31)
                        if (parseInt(dateParts[0]) > 31) {
                            month = parseInt(dateParts[1]) - 1;
                        } 
                        // Jika format DD-MM-YYYY (bagian terakhir > 31)
                        else if (parseInt(dateParts[2]) > 31) {
                            month = parseInt(dateParts[1]) - 1;
                        }
                        // Default ambil bagian tengah
                        else {
                            month = parseInt(dateParts[1]) - 1;
                        }
                    }

                    if (month >= 0 && month <= 11) {
                        monthly[month] += nilai;
                    } else {
                        // Jika gagal deteksi bulan, masukkan ke bulan dari sistem/default
                        const fallbackMonth = new Date(r.tanggal).getMonth();
                        if (!isNaN(fallbackMonth)) {
                            monthly[fallbackMonth] += nilai;
                        } else {
                            // Jika benar-benar gagal, masukkan ke bulan Januari sebagai fallback agar total tetap sama
                            monthly[0] += nilai;
                        }
                    }
                } else {
                    // Jika tidak ada tanggal, masukkan ke Januari agar total rekap = total realisasi
                    monthly[0] += nilai;
                }
            });

            let foundDana = new Set();
            let foundMetode = new Set();
            let foundMetode2 = new Set();
            let foundPelaksana = new Set();
            if (item.type === 'rekening') {
                foundDana.add(item.sumberDana || 'DAU');
                foundMetode.add(item.metodeBelanja || 'TIDAK_ADA');
                foundMetode2.add(item.metodeBelanja2 || 'TIDAK_ADA');
                foundPelaksana.add(item.pelaksana || 'TU');
            }

            if (item.children && item.children.length > 0) {
                let sumMurni = 0, sumEfisiensi = 0, sumPerubahan = 0, sumReal = 0, sumBelum = 0;
                let sumMonthly = Array(12).fill(0);

                item.children.forEach(child => {
                    const childData = getAggregatedData(child);
                    sumMurni += childData.paguMurni;
                    sumEfisiensi += childData.paguEfisiensi;
                    sumPerubahan += childData.paguPerubahan;
                    sumReal += childData.realisasi;
                    sumBelum += childData.belumSP2D;
                    childData.monthly.forEach((v, i) => sumMonthly[i] += v);
                    childData.foundDana.forEach(d => foundDana.add(d));
                    childData.foundMetode.forEach(m => foundMetode.add(m));
                    childData.foundMetode2.forEach(m2 => foundMetode2.add(m2));
                    childData.foundPelaksana.forEach(p => foundPelaksana.add(p));
                });

                paguMurni = sumMurni;
                paguEfisiensi = sumEfisiensi;
                paguPerubahan = sumPerubahan;
                realisasi = sumReal;
                belumSP2D = sumBelum;
                monthly = sumMonthly;
            }

            return { paguMurni, paguEfisiensi, paguPerubahan, realisasi, belumSP2D, monthly, foundDana, foundMetode, foundMetode2, foundPelaksana };
        }

        function calculateFilteredTotals(items, forceMatch = false) {
            let murni = 0, efisiensi = 0, perubahan = 0, real = 0, belum = 0;
            let monthly = Array(12).fill(0);
            let foundDana = new Set();
            let foundMetode = new Set();
            let foundMetode2 = new Set();
            let foundPelaksana = new Set();

            items.forEach(item => {
                // Hierarchy filtering logic (pruning)
                let skip = false;
                if (state.filterHierarchy.program !== 'all' && item.type === 'program' && item.id !== state.filterHierarchy.program) skip = true;
                if (state.filterHierarchy.kegiatan !== 'all' && item.type === 'kegiatan' && item.id !== state.filterHierarchy.kegiatan) skip = true;
                if (state.filterHierarchy.sub_kegiatan !== 'all' && item.type === 'sub_kegiatan' && item.id !== state.filterHierarchy.sub_kegiatan) skip = true;
                if (state.filterHierarchy.rekening !== 'all' && item.type === 'rekening' && item.id !== state.filterHierarchy.rekening) skip = true;

                if (skip) return;

                const itemMeetsText = !state.filterText || item.uraian.toLowerCase().includes(state.filterText) || item.kode.includes(state.filterText);
                const currentForceMatch = forceMatch || itemMeetsText;

                if (item.type === 'rekening') {
                    const agg = getAggregatedData(item);
                    const meetsDana = state.filterDana === 'all' || item.sumberDana === state.filterDana;
                    const meetsMetode = state.filterMetode === 'all' || item.metodeBelanja === state.filterMetode;
                    const meetsMetode2 = state.filterMetode2 === 'all' || (item.metodeBelanja2 || 'TIDAK_ADA') === state.filterMetode2;
                    const meetsPelaksana = state.filterPelaksana === 'all' || (item.pelaksana || 'TU') === state.filterPelaksana;
                    
                    if (currentForceMatch && meetsDana && meetsMetode && meetsMetode2 && meetsPelaksana) {
                        murni += agg.paguMurni;
                        efisiensi += agg.paguEfisiensi;
                        perubahan += agg.paguPerubahan;
                        real += agg.realisasi;
                        belum += agg.belumSP2D;
                        agg.monthly.forEach((v, i) => monthly[i] += v);
                        foundDana.add(item.sumberDana || 'DAU');
                        foundMetode.add(item.metodeBelanja || 'TIDAK_ADA');
                        foundMetode2.add(item.metodeBelanja2 || 'TIDAK_ADA');
                        foundPelaksana.add(item.pelaksana || 'TU');
                    }
                } else if (item.children) {
                    const sub = calculateFilteredTotals(item.children, currentForceMatch);
                    murni += sub.paguMurni;
                    efisiensi += sub.paguEfisiensi;
                    perubahan += sub.paguPerubahan;
                    real += sub.realisasi;
                    belum += sub.belumSP2D;
                    sub.monthly.forEach((v, i) => monthly[i] += v);
                    sub.foundDana.forEach(d => foundDana.add(d));
                    sub.foundMetode.forEach(m => foundMetode.add(m));
                    sub.foundMetode2.forEach(m2 => foundMetode2.add(m2));
                    sub.foundPelaksana.forEach(p => foundPelaksana.add(p));
                }
            });

            return { 
                paguMurni: murni, 
                paguEfisiensi: efisiensi, 
                paguPerubahan: perubahan, 
                realisasi: real, 
                belumSP2D: belum, 
                monthly, 
                foundDana, 
                foundMetode, 
                foundMetode2,
                foundPelaksana 
            };
        }

                `;
            }
            
            // Tambahkan cell kosong untuk TOTAL di kolom Aksi
            if (state.activeTab !== 'rekap') {
                html += `<td class="px-2 py-1 border-b ${borderColor} bg-slate-800"></td>`;
            }

            row.innerHTML = html;
            body.appendChild(row);
        }

        function renderRows(items, depth) {
            const body = document.getElementById('table-body');
            const borderColor = 'border-white/60';
            
            const isFiltering = checkIsFiltering();

            items.forEach(item => {
                const agg = isFiltering ? calculateFilteredTotals([item]) : getAggregatedData(item);
                const isExpanded = state.expandedItems[item.id] || 
                                   state.filterLevel !== 'all' || 
                                   state.filterText || 
                                   (state.filterHierarchy.program !== 'all' && item.type === 'program' && item.id === state.filterHierarchy.program) ||
                                   (state.filterHierarchy.kegiatan !== 'all' && item.type === 'kegiatan' && item.id === state.filterHierarchy.kegiatan) ||
                                   (state.filterHierarchy.sub_kegiatan !== 'all' && item.type === 'sub_kegiatan' && item.id === state.filterHierarchy.sub_kegiatan) ||
                                   (state.filterHierarchy.rekening !== 'all' && item.type === 'rekening' && item.id === state.filterHierarchy.rekening);
                
                const meetsText = !state.filterText || item.uraian.toLowerCase().includes(state.filterText) || item.kode.includes(state.filterText);
                const meetsDana = state.filterDana === 'all' || agg.foundDana.has(state.filterDana);
                const meetsMetode = state.filterMetode === 'all' || agg.foundMetode.has(state.filterMetode);
                const meetsMetode2 = state.filterMetode2 === 'all' || agg.foundMetode2.has(state.filterMetode2);
                const meetsPelaksana = state.filterPelaksana === 'all' || agg.foundPelaksana.has(state.filterPelaksana);
                
                let meetsHierarchy = true;
                if (state.filterHierarchy.program !== 'all') {
                    if (item.type === 'program' && item.id !== state.filterHierarchy.program) meetsHierarchy = false;
                }
                if (state.filterHierarchy.kegiatan !== 'all') {
                    if (item.type === 'kegiatan' && item.id !== state.filterHierarchy.kegiatan) meetsHierarchy = false;
                }
                if (state.filterHierarchy.sub_kegiatan !== 'all') {
                    if (item.type === 'sub_kegiatan' && item.id !== state.filterHierarchy.sub_kegiatan) meetsHierarchy = false;
                }
                if (state.filterHierarchy.rekening !== 'all') {
                    if (item.type === 'rekening' && item.id !== state.filterHierarchy.rekening) meetsHierarchy = false;
                }

                const hasMatchingChild = (list) => list?.some(c => {
                    const subAgg = getAggregatedData(c);
                    const subMeetsText = !state.filterText || c.uraian.toLowerCase().includes(state.filterText) || c.kode.includes(state.filterText);
                    const subMeetsDana = state.filterDana === 'all' || subAgg.foundDana.has(state.filterDana);
                    const subMeetsMetode = state.filterMetode === 'all' || subAgg.foundMetode.has(state.filterMetode);
                    const subMeetsMetode2 = state.filterMetode2 === 'all' || subAgg.foundMetode2.has(state.filterMetode2);
                    const subMeetsPelaksana = state.filterPelaksana === 'all' || subAgg.foundPelaksana.has(state.filterPelaksana);
                    
                    let subMeetsHierarchy = true;
                    if (state.filterHierarchy.program !== 'all' && c.type === 'program' && c.id !== state.filterHierarchy.program) subMeetsHierarchy = false;
                    if (state.filterHierarchy.kegiatan !== 'all' && c.type === 'kegiatan' && c.id !== state.filterHierarchy.kegiatan) subMeetsHierarchy = false;
                    if (state.filterHierarchy.sub_kegiatan !== 'all' && c.type === 'sub_kegiatan' && c.id !== state.filterHierarchy.sub_kegiatan) subMeetsHierarchy = false;
                    if (state.filterHierarchy.rekening !== 'all' && c.type === 'rekening' && c.id !== state.filterHierarchy.rekening) subMeetsHierarchy = false;

                    return (subMeetsText && subMeetsDana && subMeetsMetode && subMeetsMetode2 && subMeetsPelaksana && subMeetsHierarchy) || hasMatchingChild(c.children);
                });

                const isVisible = meetsHierarchy && ((meetsText && meetsDana && meetsMetode && meetsMetode2 && meetsPelaksana) || hasMatchingChild(item.children));
                
                let activePagu = 0;
                if (state.viewMode === 'murni') activePagu = agg.paguMurni;
                else if (state.viewMode === 'efisiensi') activePagu = agg.paguEfisiensi;

                // Logika Visibilitas:

                    if (!isVisible) return;
                } else {
                    // Jika di Tab Pagu atau Realisasi: Tampilkan semua agar bisa dikelola
                    // Jika di Tab Rekap: Sembunyikan yang tidak ada anggaran/transaksi agar tidak penuh
                    if (state.activeTab === 'rekap') {
                        const hasValue = activePagu > 0 || agg.realisasi > 0 || agg.belumSP2D > 0 || hasMatchingChild(item.children);

                if (shouldShowSelf) {

                                            const p = PELAKSANA.find(p => p.id === pId);

                        const pctReal = activePagu > 0 ? (agg.realisasi / activePagu * 100).toFixed(1) : '0';
                        const pctSisa = activePagu > 0 ? (sisa / activePagu * 100).toFixed(1) : '0';
                        const pctBlm = activePagu > 0 ? (agg.belumSP2D / activePagu * 100).toFixed(1) : '0';
                        const pctTotalReal = activePagu > 0 ? (realPlusSP2D / activePagu * 100).toFixed(1) : '0';

                        html += `

                                        <span class="font-mono text-[11px] font-black text-emerald-300">${agg.realisasi.toLocaleString('id-ID')}</span>
                                        ${state.showPercentages ? `<span class="text-[6px] font-black px-1 rounded bg-white text-black/80 shadow-sm uppercase">${pctReal}%</span>` : ''}
                                    </div>

                                        ${state.showPercentages ? `<span class="text-[6px] font-black px-1 rounded bg-white text-black/80 shadow-sm uppercase">${pctSisa}%</span>` : ''}
                                    </div>

                                    <div class="flex flex-col items-end pr-2 py-1">
                                        ${item.type === 'rekening' ? `
                                            <input value="${formatRupiah(agg.belumSP2D)}" 
                                                   onfocus="state.editingId = '${item.id}'"
                                                   onblur="state.editingId = null; saveToSupabase(state.data)"
                                                   oninput="updateBelumSP2D('${item.id}', this.value, this)" 
                                                   onpaste="handlePasteBelumSP2D(event, '${item.id}', this)"
                                                   class="w-full text-right bg-transparent outline-none font-mono text-[11px] font-black text-rose-300 focus:bg-white/10" 
                                                   placeholder="0" />
                                        ` : `
                                            <span class="font-mono text-[11px] font-black text-rose-300">${agg.belumSP2D.toLocaleString('id-ID')}</span>
                                        `}
                                        ${state.showPercentages ? `<span class="text-[6px] font-black px-1 rounded bg-white text-black/80 shadow-sm uppercase">${pctBlm}%</span>` : ''}
                                    </div>
                                </td>`;
                        }
                        if (!state.hiddenCols.has('real_plus_sp2d')) {

                                    <div class="flex flex-col items-end">
                                        <span class="font-mono text-[11px] font-black text-indigo-100">${realPlusSP2D.toLocaleString('id-ID')}</span>
                                        ${state.showPercentages ? `<span class="text-[6px] font-black px-1 rounded bg-white text-black/80 shadow-sm uppercase">${pctTotalReal}%</span>` : ''}
                                    </div>
                                </td>`;
                        }
                        if (!state.hiddenCols.has('sisa_real')) {
                            html += `
                                <td class="px-2 py-1 border-r border-b ${borderColor} bg-blue-900/40 w-[80px]">
                                    <div class="flex flex-col items-end">
                                        <span class="font-mono text-[11px] font-black text-blue-100">${sisaReal.toLocaleString('id-ID')}</span>
                                        ${state.showPercentages ? `<span class="text-[6px] font-black px-1 rounded bg-white text-black/80 shadow-sm uppercase">${pctSisaReal}%</span>` : ''}
                                    </div>
                                </td>`;
                        }
                    } else if (state.viewMode === 'perbandingan') {
                        html += `
                            <td class="px-2 py-1.5 text-right font-mono text-[10px] font-bold border-r border-b ${borderColor} sticky-col-3 bg-white/5 text-blue-200 w-[80px]">${agg.paguMurni.toLocaleString('id-ID')}</td>
                            <td class="px-2 py-1.5 text-right font-mono text-[10px] font-bold border-r border-b ${borderColor} sticky-col-4 bg-white/5 text-emerald-200 w-[80px]">${agg.paguEfisiensi.toLocaleString('id-ID')}</td>
                            <td class="px-2 py-1.5 text-right font-mono text-[10px] font-bold border-r border-b ${borderColor} sticky-col-5 bg-white/10 text-amber-200 w-[80px]">${agg.paguPerubahan.toLocaleString('id-ID')}</td>
                        `;
                    } else {
                        const pctReal = activePagu > 0 ? (agg.realisasi / activePagu * 100).toFixed(1) : '0';
                        const pctSisa = activePagu > 0 ? (sisa / activePagu * 100).toFixed(1) : '0';

                        html += `
                            <td class="px-2 py-1 border-r border-b ${borderColor} sticky-col-3 bg-black/5 w-[80px]">
                                <div class="flex flex-col items-end">
                                    <span class="font-mono text-[11px] font-black text-white">${activePagu.toLocaleString('id-ID')}</span>
                                </div>
                            </td>
                            <td class="px-2 py-1 border-r border-b ${borderColor} bg-black/10 w-[80px]">
                                <div class="flex flex-col items-end">
                                    <span class="font-mono text-[11px] font-black text-emerald-300">${agg.realisasi.toLocaleString('id-ID')}</span>
                                    ${state.showPercentages ? `<span class="text-[6px] font-black px-1 rounded bg-white text-black/80 shadow-sm uppercase">${pctReal}%</span>` : ''}

                            <td class="px-2 py-1 border-r border-b ${borderColor} ${sisa < 0 ? 'bg-red-600' : 'bg-black/20'} w-[80px]">
                                <div class="flex flex-col items-end">
                                    <span class="font-mono text-[11px] font-black ${sisa < 0 ? 'text-white' : 'text-yellow-200'}">${sisa.toLocaleString('id-ID')}</span>
                                    ${state.showPercentages ? `<span class="text-[6px] font-black px-1 rounded bg-white text-black/80 shadow-sm uppercase">${pctSisa}%</span>` : ''}

                    // Tambahkan kolom Aksi di akhir baris jika bukan tab rekap
                    if (state.activeTab !== 'rekap') {
                        html += `
                            <td class="px-2 py-1.5 border-b ${borderColor} align-middle">
                                <div class="flex items-center justify-center gap-1.5">
                                    ${state.activeTab === 'pagu' && item.type !== 'rekening' ? `<button onclick="openAddSubModal('${item.id}', '${item.type}')" title="Tambah Sub" class="p-1.5 bg-white/20 rounded-lg hover:bg-white/40 transition-all"><i data-lucide="plus" class="w-3 h-3"></i></button>` : ''}
                                    ${state.activeTab === 'pagu' ? `
                                        <button onclick="openEditModal('${item.id}')" title="Edit" class="p-1.5 bg-white/10 rounded-lg hover:bg-white/40 transition-all"><i data-lucide="edit-3" class="w-3 h-3"></i></button>
                                        <button onclick="confirmDelete('${item.id}')" title="Hapus" class="p-1.5 bg-red-500/30 rounded-lg hover:bg-red-500/50 transition-all"><i data-lucide="trash-2" class="w-3 h-3"></i></button>
                                    ` : ''}
                                    ${state.activeTab === 'realisasi' && item.type === 'rekening' ? `
                                        <button onclick="openRealisasiModal('${item.id}')" title="Transaksi" class="px-2 py-1 bg-white text-black rounded-lg font-black text-[7px] uppercase flex items-center gap-1 hover:scale-105 transition-all shadow-sm"><i data-lucide="receipt" class="w-2.5 h-2.5"></i> Transaksi</button>

                    row.innerHTML = html;
                    body.appendChild(row);

                if ((isExpanded || state.filterLevel !== 'all') && item.children) {

                }
            });
        }

        function toggleExpand(id) {
            state.expandedItems[id] = !state.expandedItems[id];
            render();
        }

        async function updateBelumSP2D(id, rawVal, inputEl) {
            // Save cursor position
            const start = inputEl.selectionStart;
            const end = inputEl.selectionEnd;
            const oldLen = inputEl.value.length;

            const val = parseRupiah(rawVal);
            inputEl.value = formatRupiah(val);
            
            // Adjust cursor position if dots were added/removed
            const newLen = inputEl.value.length;
            const diff = newLen - oldLen;
            inputEl.setSelectionRange(start + diff, end + diff);

            // Helper to update tree locally
            const updateInTree = (list) => {
                return list.map(item => {
                    if (item.id === id) {
                        return { ...item, belumSP2D: val };
                    }
                    if (item.children) {
                        return { ...item, children: updateInTree(item.children) };
                    }
                    return item;
                });
            };

            state.data.pagu = updateInTree(state.data.pagu);
            
            // Re-calculate row stats locally for instant feedback
            const row = inputEl.closest('tr');
            const item = findInTree(state.data.pagu, id);
            const agg = getAggregatedData(item);
            
            let activePagu = 0;
            if (state.viewMode === 'murni') activePagu = agg.paguMurni;
            else if (state.viewMode === 'efisiensi') activePagu = agg.paguEfisiensi;
            else activePagu = agg.paguPerubahan;

            const sisa = activePagu - agg.realisasi;
            const realPlusSP2D = agg.realisasi + agg.belumSP2D;
            const sisaReal = activePagu - realPlusSP2D;

            // Helper to find column index precisely
            const getColIndex = (colType) => {
                let idx = 2; // Start after Kode & Uraian
                idx += (state.viewMode === 'perbandingan' ? 3 : 1); // Add Pagu column(s)
                
                if (state.activeTab === 'rekap') {
                    BULAN_LIST.forEach((_, i) => { if (!state.hiddenMonths.has(i)) idx++; });
                    if (colType === 'real') return idx;
                    if (!state.hiddenCols.has('real')) idx++;
                    if (colType === 'sisa') return idx;
                    if (!state.hiddenCols.has('sisa')) idx++;
                    if (colType === 'belum_sp2d') return idx;
                    if (!state.hiddenCols.has('belum_sp2d')) idx++;
                    if (colType === 'real_plus_sp2d') return idx;
                    if (!state.hiddenCols.has('real_plus_sp2d')) idx++;
                    if (colType === 'sisa_real') return idx;
                }
                return -1;
            };

            const realPlusIdx = getColIndex('real_plus_sp2d');
            if (realPlusIdx !== -1 && row.cells[realPlusIdx]) {
                row.cells[realPlusIdx].innerText = realPlusSP2D.toLocaleString('id-ID');
            }

            const sisaRealIdx = getColIndex('sisa_real');
            if (sisaRealIdx !== -1 && row.cells[sisaRealIdx]) {
                row.cells[sisaRealIdx].innerText = sisaReal.toLocaleString('id-ID');
            }

            // Update parent rows in DOM for instant feedback on aggregation
            const updateParentDOM = (list) => {
                for (const parent of list) {
                    if (parent.children && findInTree(parent.children, id)) {
                        const rows = document.getElementById('table-body').rows;
                        for (let r of rows) {
                            const rowKode = r.cells[0].innerText.trim();
                            if (rowKode === parent.kode) {
                                const parentAgg = getAggregatedData(parent);
                                const pActivePagu = state.viewMode === 'murni' ? parentAgg.paguMurni : (state.viewMode === 'efisiensi' ? parentAgg.paguEfisiensi : parentAgg.paguPerubahan);
                                const pSisa = pActivePagu - parentAgg.realisasi;
                                const pRealPlusSP2D = parentAgg.realisasi + parentAgg.belumSP2D;
                                const pSisaReal = pActivePagu - pRealPlusSP2D;
                                
                                const pRealIdx = getColIndex('real');
                                const pSisaIdx = getColIndex('sisa');
                                const pBlmIdx = getColIndex('belum_sp2d');
                                const pRealPlusIdx = getColIndex('real_plus_sp2d');
                                const pSisaRealIdx = getColIndex('sisa_real');

                                if (pBlmIdx !== -1 && r.cells[pBlmIdx]) {
                                    const target = r.cells[pBlmIdx].querySelector('div') || r.cells[pBlmIdx];
                                    target.innerText = parentAgg.belumSP2D.toLocaleString('id-ID');
                                }
                                if (pRealPlusIdx !== -1 && r.cells[pRealPlusIdx]) r.cells[pRealPlusIdx].innerText = pRealPlusSP2D.toLocaleString('id-ID');
                                if (pSisaRealIdx !== -1 && r.cells[pSisaRealIdx]) r.cells[pSisaRealIdx].innerText = pSisaReal.toLocaleString('id-ID');
                                break;
                            }
                        }
                        updateParentDOM(parent.children);
                    } else if (parent.children) {
                        updateParentDOM(parent.children);
                    }
                }
            };
            updateParentDOM(state.data.pagu);

        async function handlePasteBelumSP2D(e, id, inputEl) {
            e.preventDefault();
            const text = (e.clipboardData || window.clipboardData).getData('text');
            const lines = text.split(/\r?\n/).filter(line => line.trim() !== '');
            
            if (lines.length <= 1) {
                // Single value paste - use standard behavior but manually update to handle formatting
                const val = lines[0] || '';
                updateBelumSP2D(id, val, inputEl);
                return;
            }

            // Bulk paste logic
            const currentTr = inputEl.closest('tr');
            const tbody = document.getElementById('table-body');
            const allTrs = Array.from(tbody.rows);
            const startIdx = allTrs.indexOf(currentTr);

            let lineIdx = 0;
            for (let i = startIdx; i < allTrs.length && lineIdx < lines.length; i++) {
                const tr = allTrs[i];
                const input = tr.querySelector('input[onpaste*="handlePasteBelumSP2D"]');
                
                if (input) {
                    const lineVal = lines[lineIdx].trim();
                    // Extract ID from the input's attributes
                    const match = input.getAttribute('oninput').match(/'([^']+)'/);
                    if (match) {
                        const targetId = match[1];
                        updateBelumSP2D(targetId, lineVal, input);
                    }
                    lineIdx++;
                }
            }
            
            // Final save after bulk update
            saveToSupabase(state.data);
            showNotif(`Bulk input ${lineIdx} data berhasil`);
        }

                const noA = (a.noBp || "").toString().toLowerCase();
                const noB = (b.noBp || "").toString().toLowerCase();
                return noB.localeCompare(noA, undefined, { numeric: true, sensitivity: 'base' });

        function addRealRow() {
            const newRow = { 
                id: `rel-${Date.now()}-${Math.random()}`, 
                rekeningId: state.targetItem.id, 
                noBp: '', 
                tanggal: new Date().toISOString().split('T')[0], 
                keterangan: '', 
                penerima: '', 
                subUk: [], // Checklist Sub Uk: DI, PA, LU, PMKS
                nilai: 0, 
                ppn: 0, 
                pph: 0 
            };
             state.bulkRealisasi.unshift(newRow);
             renderRealisasiTableBody();
         }

        function updateRealRowById(id, field, val) {
            const idx = state.bulkRealisasi.findIndex(r => r.id === id);
            if (idx === -1) return;

            state.bulkRealisasi[idx][field] = val;
            
            // Jika field adalah noBp, render ulang untuk memperbarui warna duplikat
            // Jika field adalah tanggal/keterangan/penerima, jangan render ulang agar kursor tidak hilang
            if (field === 'noBp') {
                renderRealisasiTableBody();
                return;
            }

            // Update Header Stats
            const activePagu = parseFloat(document.getElementById('modal-header-pagu')?.dataset.val || 0);
            const currentTotalReal = state.bulkRealisasi.reduce((acc, r) => acc + (r.nilai || 0), 0);
            const currentSisa = activePagu - currentTotalReal;

            const realEl = document.getElementById('modal-header-real');
            const sisaEl = document.getElementById('modal-header-sisa');

            if (realEl) realEl.innerText = `Rp ${formatRupiah(currentTotalReal)}`;
            if (sisaEl) {
                sisaEl.innerText = `Rp ${formatRupiah(currentSisa)}`;
                sisaEl.className = `text-xs font-mono font-black ${currentSisa < 0 ? 'text-rose-400' : 'text-yellow-100'}`;
            }

            // Jika mengedit nilai/ppn/pph, update kolom Netto di baris tersebut secara langsung
            if (['nilai', 'ppn', 'pph'].includes(field)) {
                const r = state.bulkRealisasi[idx];
                const netto = (r.nilai || 0) - (r.ppn || 0) - (r.pph || 0);
                const nettoEl = document.getElementById(`netto-${id}`);
                if (nettoEl) {
                    nettoEl.innerText = netto.toLocaleString('id-ID');
                }
            }
        }

        function toggleSubUk(id, uk) {
            const idx = state.bulkRealisasi.findIndex(r => r.id === id);
            if (idx === -1) return;

            if (!state.bulkRealisasi[idx].subUk) state.bulkRealisasi[idx].subUk = [];
            
            const current = state.bulkRealisasi[idx].subUk;
            const foundIdx = current.indexOf(uk);
            
            if (foundIdx > -1) {
                current.splice(foundIdx, 1);
            } else {
                current.push(uk);
            }
            // No need to re-render everything, just local state update is enough since checkboxes are already synced with state
        }

        function removeRealRowById(id) {
            const r = state.bulkRealisasi.find(r => r.id === id);
            const label = r && r.noBp ? `Nomor ${r.noBp}` : 'baris ini';
            
            if (confirm(`Apakah Anda yakin ingin menghapus ${label}?`)) {
                state.bulkRealisasi = state.bulkRealisasi.filter(r => r.id !== id);
                renderRealisasiTableBody();
            }
        }

        function saveBulkRealisasi() {
            const others = (state.data.realisasi || []).filter(r => (r.rekeningId || r.subKegiatanId) !== state.targetItem.id);
            const newData = { ...state.data, realisasi: [...others, ...state.bulkRealisasi] };
            
            saveToSupabase(newData);
            closeRealisasiModal();
            render();
        }

        function handleBulkPaste(e) {
            // Check if we are inside the modal container
            if (!document.getElementById('realisasi-modal').contains(e.target)) return;
            
            const text = e.clipboardData.getData('text');
            if (!text || !text.includes('\t')) return; // Only process if it looks like Excel data (contains tabs)

            e.preventDefault();
            const lines = text.trim().split('\n');
            
            const newRows = lines.map(line => {
                const cols = line.split('\t');
                return {
                    id: `rel-${Date.now()}-${Math.random()}`,
                    rekeningId: state.targetItem.id,
                    noBp: cols[0] || '',
                    tanggal: cols[1] || new Date().toISOString().split('T')[0],
                    keterangan: (cols[2] || '').toUpperCase(),
                    penerima: (cols[3] || '').toUpperCase(),
                    subUk: [],
                    nilai: parseRupiah(cols[4] || '0'),
                    ppn: parseRupiah(cols[5] || '0'),
                    pph: parseRupiah(cols[6] || '0')
                };
            });

            if (newRows.length > 0) {
                // If the last row is empty, replace it, otherwise append
                if (state.bulkRealisasi.length > 0) {
                    const last = state.bulkRealisasi[0];
                    if (!last.noBp && !last.keterangan && last.nilai === 0) {
                        state.bulkRealisasi.shift();
                    }
                }
                state.bulkRealisasi = [...newRows, ...state.bulkRealisasi];
                renderRealisasiModal();
                showNotif(`${newRows.length} transaksi berhasil ditambahkan dari Excel`);
            }
        }

        // --- EXPORT LOGIC ---
        function handleExportMain() {
            const table = document.getElementById('main-table');
            const clone = table.cloneNode(true);
            
            // Bersihkan elemen yang tidak diperlukan di Excel & konversi input menjadi teks
            clone.querySelectorAll('button').forEach(b => b.remove());
            clone.querySelectorAll('i').forEach(i => i.remove());
            clone.querySelectorAll('input[type="checkbox"]').forEach(c => c.remove());
            clone.querySelectorAll('input[type="text"], input:not([type])').forEach(input => {
                const span = document.createElement('span');
                span.innerText = input.value;
                input.parentNode.replaceChild(span, input);
            });
            
            // Apply classes to clone rows before generating outerHTML
            const rows = clone.querySelectorAll('tbody tr');
            const originalRows = table.querySelectorAll('tbody tr');
            rows.forEach((row, idx) => {
                const originalRow = originalRows[idx];
                if (originalRow) {
                    if (originalRow.classList.contains('bg-blue-700')) row.classList.add('bg-program');
                    else if (originalRow.classList.contains('bg-emerald-700')) row.classList.add('bg-kegiatan');
                    else if (originalRow.classList.contains('bg-emerald-500')) row.classList.add('bg-sub_kegiatan');
                    else if (originalRow.classList.contains('bg-orange-600')) row.classList.add('bg-rekening');
                }
            });

            // Ambil informasi filter saat ini
            let filterInfo = [];
            if (state.filterText) filterInfo.push(`Pencarian: ${state.filterText}`);
            if (state.filterDana !== 'all') filterInfo.push(`Dana: ${state.filterDana}`);
            if (state.filterMetode !== 'all') filterInfo.push(`Metode: ${state.filterMetode}`);
            
            // Filter Hirarki Detail
            if (state.filterHierarchy.program !== 'all') {
                const item = findInTree(state.data.pagu, state.filterHierarchy.program);
                if (item) filterInfo.push(`Program: ${item.kode} - ${item.uraian}`);
            }
            if (state.filterHierarchy.kegiatan !== 'all') {
                const item = findInTree(state.data.pagu, state.filterHierarchy.kegiatan);
                if (item) filterInfo.push(`Kegiatan: ${item.kode} - ${item.uraian}`);
            }
            if (state.filterHierarchy.sub_kegiatan !== 'all') {
                const item = findInTree(state.data.pagu, state.filterHierarchy.sub_kegiatan);
                if (item) filterInfo.push(`Sub-Kegiatan: ${item.kode} - ${item.uraian}`);
            }
            if (state.filterHierarchy.rekening !== 'all') {
                const item = findInTree(state.data.pagu, state.filterHierarchy.rekening);
                if (item) filterInfo.push(`Rekening: ${item.kode} - ${item.uraian}`);
            }
            
            const title = `LAPORAN APBD - ${state.activeTab.toUpperCase()} (${state.viewMode.toUpperCase()})`;
            const timestamp = new Date().toLocaleString('id-ID');
            
            const html = `
                <html>
                <head>
                    <meta charset="utf-8">
                    <style>
                        table { border-collapse: collapse; width: 100%; }
                        th, td { border: 1px solid #000000; padding: 6px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; font-size: 9pt; }
                        th { background-color: #1e293b; color: #ffffff; font-weight: bold; text-align: center; text-transform: uppercase; }
                        .title { font-size: 14pt; font-weight: bold; text-align: center; margin-bottom: 5px; }
                        .info { font-size: 10pt; font-weight: bold; margin-bottom: 2px; }
                        
                        /* Warna sesuai aplikasi */
                        .bg-program { background-color: #1d4ed8 !important; color: #ffffff !important; } /* Blue-700 */
                        .bg-kegiatan { background-color: #065f46 !important; color: #ffffff !important; } /* Emerald-800 */
                        .bg-sub_kegiatan { background-color: #10b981 !important; color: #ffffff !important; } /* Emerald-500 */
                        .bg-rekening { background-color: #ea580c !important; color: #ffffff !important; } /* Orange-600 */
                        
                        .text-right { text-align: right; }
                        .text-center { text-align: center; }
                        .font-mono { font-family: 'Courier New', Courier, monospace; }
                    </style>
                </head>
                <body>
                    <div class="title">${title}</div>
                    <div style="margin-bottom: 20px;">
                        <div class="info">Dicetak pada: ${timestamp}</div>
                        ${filterInfo.map(info => `<div class="info">${info}</div>`).join('')}
                    </div>
                    ${clone.outerHTML}
                </body>
                </html>
            `;

            const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            const fileName = `APBD_${state.activeTab.toUpperCase()}_${new Date().toISOString().split('T')[0]}.xls`;
            
            a.href = url;
            a.download = fileName;
            a.click();
            URL.revokeObjectURL(url);
            showNotif(`Export berhasil: ${fileName}`);
        }

        function handleExportTransaksi() {
            const table = document.getElementById('transaksi-table');
            const clone = table.cloneNode(true);
            clone.querySelectorAll('button').forEach(b => b.remove());
            clone.querySelectorAll('i').forEach(i => i.remove());
            clone.querySelectorAll('input').forEach(input => {
                const span = document.createElement('span');
                span.innerText = input.value;
                input.parentNode.replaceChild(span, input);
            });
            
            // Cari data hirarki lengkap
            let hierarchy = [];
            const findPath = (list, targetId, path = []) => {
                for (const item of list) {
                    const currentPath = [...path, item];
                    if (item.id === targetId) return currentPath;
                    if (item.children) {
                        const found = findPath(item.children, targetId, currentPath);
                        if (found) return found;
                    }
                }
                return null;
            };

            const path = findPath(state.data.pagu, state.targetItem.id);
            let infoHtml = '';
            if (path) {
                hierarchy = path.map(p => `<div><b style="text-transform: uppercase;">${p.type.replace('_', ' ')}:</b> ${p.kode} - ${p.uraian}</div>`).join('');
                infoHtml = `
                    <div style="margin-bottom: 20px; font-family: sans-serif; font-size: 10pt;">
                        ${hierarchy}
                    </div>
                `;
            }

            const title = `<div style="font-size: 16pt; font-weight: bold; text-align: center; margin-bottom: 10px; font-family: sans-serif;">LAPORAN RINCIAN TRANSAKSI</div>`;
            const timestamp = `<div style="font-size: 9pt; color: #666666; margin-bottom: 15px; font-family: sans-serif;">Dicetak pada: ${new Date().toLocaleString('id-ID')}</div>`;

            const html = `
                <html>
                <head>
                    <meta charset="utf-8">
                    <style>
                        table { border-collapse: collapse; width: 100%; }
                        th, td { border: 1px solid #000000; padding: 8px; font-family: sans-serif; font-size: 9pt; }
                        th { background-color: #1e293b; color: #ffffff; font-weight: bold; text-align: center; text-transform: uppercase; }
                        .text-right { text-align: right; }
                        .font-black { font-weight: 900; }
                    </style>
                </head>
                <body>
                    ${title}
                    ${timestamp}
                    ${infoHtml}
                    ${clone.outerHTML}
                </body>
                </html>
            `;

            const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Transaksi_${state.targetItem.kode}_${new Date().toISOString().split('T')[0]}.xls`;
            a.click();
            URL.revokeObjectURL(url);
            showNotif(`Export transaksi berhasil`);
        }

        // --- START ---
        window.addEventListener('load', () => {
            console.log("[APBD] Page loaded, starting init...");
            init();
        });
    </script>
</body>
</html>
