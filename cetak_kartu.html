<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cetak Kartu Akun - SIPANDU</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="images.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        
        .card-container {
            width: 350px;
            min-height: 550px;
            background: white;
            border-radius: 24px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            padding: 32px 24px;
        }

        .watermark {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-30deg);
            opacity: 0.12;
            width: 280px;
            pointer-events: none;
            z-index: 0;
        }

        .qr-code-container img {
            margin: 0 auto;
        }

        @media print {
            .no-print { display: none; }
            body { background: white; }
            .print-grid {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 20px;
            }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col p-6">
    <!-- Header / Control Panel -->
    <div class="max-w-6xl mx-auto w-full mb-8 no-print">
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white p-6 rounded-3xl shadow-sm border border-slate-200">
            <div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tight uppercase">Cetak Kartu Akun</h1>
                <p class="text-slate-500 font-bold text-[10px] uppercase tracking-widest mt-0.5">SIPANDU - Sistem Informasi Penyimpanan Data Terpadu</p>
            </div>
            <div class="flex gap-3">
                <button onclick="downloadAll()" id="btn-download-all" class="bg-indigo-500 hover:bg-indigo-600 text-white px-5 py-2.5 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all shadow-lg shadow-indigo-100 flex items-center gap-2">
                    <i data-lucide="download-cloud" class="w-3.5 h-3.5"></i>
                    Download Masal (PNG)
                </button>
                <button onclick="window.print()" class="bg-slate-800 hover:bg-slate-900 text-white px-5 py-2.5 rounded-xl font-black text-[10px] uppercase tracking-widest transition-all shadow-lg shadow-slate-100 flex items-center gap-2">
                    <i data-lucide="printer" class="w-3.5 h-3.5"></i>
                    Cetak PDF
                </button>
            </div>
        </div>
        
        <!-- Filter / Search -->
        <div class="mt-4 flex gap-4">
            <div class="relative flex-1">
                <i data-lucide="search" class="w-4 h-4 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                <input type="text" id="search-input" oninput="filterCards()" placeholder="Cari nama atau NIP..." 
                    class="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-2xl text-xs font-bold outline-none focus:border-sky-500 transition-all shadow-sm">
            </div>
            <div id="loading-spinner" class="flex items-center gap-2 text-sky-500 font-bold text-xs">
                <i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i>
                Memuat Data...
            </div>
        </div>
    </div>

    <!-- Cards Grid -->
    <div id="cards-grid" class="max-w-6xl mx-auto grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-8 print-grid">
        <!-- Cards will be injected here -->
    </div>

    <script>
        const SUPABASE_URL = "https://yewkffbatvrbtfliikia.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_gh_LzjznODmbTtMBzt5aaA_sFTDMykg";
        const supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        let allUsers = [];

        async function init() {
            try {
                // Fetch data user access
                const { data: accessData, error: accessError } = await supa
                    .from('user_access')
                    .select('*');
                
                if (accessError) throw accessError;

                // Fetch data pegawai for names and phone numbers
                const { data: pegawaiData, error: pegawaiError } = await supa
                    .from('data_pegawai')
                    .select('nip, nama, no_hp');
                
                if (pegawaiError) throw pegawaiError;

                // Join data
                allUsers = accessData.map(user => {
                    const pegawai = pegawaiData.find(p => p.nip === user.nip);
                    return {
                        ...user,
                        nama: pegawai ? pegawai.nama : 'User SIPANDU',
                        no_hp: pegawai ? pegawai.no_hp : ''
                    };
                });

                document.getElementById('loading-spinner').classList.add('hidden');
                renderCards(allUsers);
                lucide.createIcons();
            } catch (err) {
                console.error("Error:", err);
                alert("Gagal memuat data");
            }
        }

        function renderCards(users) {
            const grid = document.getElementById('cards-grid');
            grid.innerHTML = '';

            users.forEach((user, index) => {
                const cardId = `card-${index}`;
                const cardHtml = `
                    <div class="card-wrapper flex flex-col items-center gap-4 no-break">
                        <div id="${cardId}" class="card-container relative bg-white">
                            <!-- Watermark -->
                            <img src="${logoBase64}" class="watermark" alt="Watermark">
                            
                            <!-- Header -->
                            <div class="flex flex-col items-center gap-3 z-10 text-center mb-6">
                                <img src="${maskotBase64}" class="w-16 h-16 object-contain" alt="Logo Sipandu">
                                <div class="space-y-1">
                                    <h2 class="text-lg font-black text-slate-800 uppercase tracking-tighter leading-tight">Selamat Datang</h2>
                                    <p class="text-[8px] font-bold text-amber-500 uppercase tracking-widest leading-normal">Sistem Informasi Penyimpanan Data Terpadu</p>
                                    <p class="text-[6px] font-bold text-sky-600 uppercase tracking-tight mt-0.5">PPS Raharjo - RPS Mojomulyo - RPS Pamardi Siwi - RPS Gondang</p>
                                </div>
                            </div>

                            <!-- Body -->
                            <div class="flex-1 space-y-4 z-10 w-full">
                                <div class="space-y-1 w-full">
                                    <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest">Nama Lengkap</label>
                                    <p class="user-name-text text-[11px] font-black text-slate-800 uppercase leading-normal break-words overflow-visible whitespace-normal pb-1">${user.nama}</p>
                                </div>
                                <div class="space-y-0.5">
                                    <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest">Role / Jabatan</label>
                                    <p class="text-xs font-bold text-indigo-600 uppercase break-words">${user.role}</p>
                                </div>
                                <div class="grid grid-cols-2 gap-4">
                                    <div class="space-y-0.5">
                                        <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest">Username (NIP)</label>
                                        <p class="text-xs font-black text-slate-800">${user.nip}</p>
                                    </div>
                                    <div class="space-y-0.5">
                                        <label class="text-[7px] font-black text-slate-400 uppercase tracking-widest">Password</label>
                                        <p class="text-xs font-black text-slate-800 tracking-widest">${user.password}</p>
                                    </div>
                                </div>
                                <div class="pt-2">
                                    <p class="text-[8px] font-bold text-slate-400 text-center">Akses Sistem Melalui:</p>
                                    <p class="text-[9px] font-black text-sky-600 text-center">https://sipandu-ppsraharjo.vercel.app</p>
                                </div>
                            </div>

                            <!-- Footer -->
                            <div class="mt-auto flex flex-col items-center gap-3 z-10 pt-4 border-t border-slate-100">
                                <div id="qr-${index}" class="qr-code-container"></div>
                                <div class="text-center">
                                    <p class="text-[9px] font-black text-slate-800 uppercase">PPS Raharjo Sragen</p>
                                    <p class="text-[7px] font-bold text-slate-400 uppercase tracking-[0.2em]"></p>
                                </div>
                            </div>
                        </div>
                        
                        <!-- Action Buttons -->
                        <div class="no-print w-full flex gap-2">
                            <button onclick="downloadCard('${cardId}', '${user.nama}')" class="flex-1 bg-sky-100 hover:bg-sky-200 text-sky-600 py-2.5 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2">
                                <i data-lucide="download" class="w-3.5 h-3.5"></i>
                                PNG
                            </button>
                            <button onclick="sendWhatsAppText('${user.no_hp}', '${user.nama}', '${user.role}', '${user.nip}', '${user.password}')" class="flex-1 bg-emerald-100 hover:bg-emerald-200 text-emerald-600 py-2.5 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-2">
                                <i data-lucide="message-circle" class="w-3.5 h-3.5"></i>
                                WhatsApp
                            </button>
                        </div>
                    </div>
                `;
                grid.insertAdjacentHTML('beforeend', cardHtml);

                // Generate QR Code
                new QRCode(document.getElementById(`qr-${index}`), {
                    text: "https://sipandu-ppsraharjo.vercel.app",
                    width: 70,
                    height: 70,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            });
            lucide.createIcons();
        }

        function filterCards() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = allUsers.filter(u => 
                u.nama.toLowerCase().includes(term) || 
                u.nip.includes(term)
            );
            renderCards(filtered);
        }

        async function downloadCard(cardId, name) {
            const btn = event.currentTarget;
            const originalContent = btn.innerHTML;
            const card = document.getElementById(cardId);
            
            try {
                btn.disabled = true;
                btn.innerHTML = `<i data-lucide="loader-2" class="w-3.5 h-3.5 animate-spin"></i>`;
                lucide.createIcons();

                // Pastikan gambar terload
                const images = card.getElementsByTagName('img');
                await Promise.all(Array.from(images).map(img => {
                    if (img.complete) return Promise.resolve();
                    return new Promise(resolve => {
                        img.onload = resolve;
                        img.onerror = resolve;
                    });
                }));

                const canvas = await html2canvas(card, {
                    scale: 2,
                    logging: false,
                    letterRendering: true,
                    imageTimeout: 15000,
                    backgroundColor: null,
                    onclone: (clonedDoc) => {
                        const clonedCard = clonedDoc.getElementById(cardId);
                        if (clonedCard) {
                            clonedCard.style.borderRadius = '24px';
                            clonedCard.style.boxShadow = 'none';
                            clonedCard.style.border = '1px solid #e2e8f0';
                            clonedCard.style.display = 'flex';
                            clonedCard.style.flexDirection = 'column';
                        }
                    }
                });
                
                const dataUrl = canvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = `KARTU_SIPANDU_${name.replace(/\s+/g, '_').toUpperCase()}.png`;
                link.href = dataUrl;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            } catch (err) {
                console.error("Download Error:", err);
                alert("Gagal mengunduh: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalContent;
                lucide.createIcons();
            }
        }

        function sendWhatsAppText(noHp, nama, role, user, pass) {
            if (!noHp) {
                alert("Nomor telepon tidak ditemukan!");
                return;
            }

            // Bersihkan nomor HP
            let cleanNoHp = noHp.replace(/\D/g, '');
            if (cleanNoHp.startsWith('0')) cleanNoHp = '62' + cleanNoHp.substring(1);

            const pesan = `Halo ${nama},\n\nBerikut adalah informasi akun SIPANDU Anda:\n\n` +
                          `Nama: ${nama}\n` +
                          `Role: ${role}\n` +
                          `User: ${user}\n` +
                          `Password: ${pass}\n\n` +
                          `Silakan login melalui link berikut:\n` +
                          `https://sipandu-ppsraharjo.vercel.app\n\n` +
                          `_PPS Raharjo Sragen_`;

            const waUrl = `https://wa.me/${cleanNoHp}?text=${encodeURIComponent(pesan)}`;
            window.open(waUrl, '_blank');
        }

        async function downloadAll() {
            const btn = document.getElementById('btn-download-all');
            const originalText = btn.innerHTML;
            
            try {
                btn.disabled = true;
                btn.innerHTML = `<i data-lucide="loader-2" class="w-3.5 h-3.5 animate-spin"></i> Memproses...`;
                lucide.createIcons();

                const wrappers = document.querySelectorAll('.card-wrapper');
                if (wrappers.length === 0) {
                    alert("Tidak ada kartu untuk diunduh.");
                    return;
                }

                for (let i = 0; i < wrappers.length; i++) {
                    const wrapper = wrappers[i];
                    const card = wrapper.querySelector('.card-container');
                    const nameElement = card.querySelector('.user-name-text');
                    const name = nameElement ? nameElement.innerText : `USER_${i}`;
                    
                    // Tunggu gambar terload per kartu
                    const images = card.getElementsByTagName('img');
                    await Promise.all(Array.from(images).map(img => {
                        if (img.complete) return Promise.resolve();
                        return new Promise(resolve => {
                            img.onload = resolve;
                            img.onerror = resolve;
                        });
                    }));

                    const canvas = await html2canvas(card, {
                        scale: 2,
                        logging: false,
                        letterRendering: true,
                        imageTimeout: 15000,
                        backgroundColor: null,
                        onclone: (clonedDoc) => {
                            const clonedCard = clonedDoc.getElementById(card.id);
                            if (clonedCard) {
                                clonedCard.style.borderRadius = '24px';
                                clonedCard.style.boxShadow = 'none';
                                clonedCard.style.border = '1px solid #e2e8f0';
                                clonedCard.style.display = 'flex';
                                clonedCard.style.flexDirection = 'column';
                            }
                        }
                    });
                    
                    const dataUrl = canvas.toDataURL('image/png');
                    const link = document.createElement('a');
                    link.download = `KARTU_SIPANDU_${name.replace(/\s+/g, '_').toUpperCase()}.png`;
                    link.href = dataUrl;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    
                    // Jeda untuk stabilitas download masal
                    await new Promise(r => setTimeout(r, 800));
                }
                
                alert("Proses unduhan masal selesai.");
            } catch (err) {
                console.error("Download All Error:", err);
                alert("Terjadi kesalahan: " + err.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = originalText;
                lucide.createIcons();
            }
        }

        init();
    </script>
</body>
</html>
