        const Settings = (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>} />;
        const UploadCloud = (props) => <Icon {...props} path={<><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/></>} />;
        const AlertCircle = (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>} />;

        const Database = (props) => <Icon {...props} path={<><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/><path d="M3 12c0 1.66 4 3 9 3s9-1.34 9-3"/></>} />;

        const PieChart = (props) => <Icon {...props} path={<><path d="M21.21 15.89A10 10 0 1 1 8 2.83"/><path d="M22 12A10 10 0 0 0 12 2v10z"/></>} />;
        const X = (props) => <Icon {...props} path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />;
        const Calculator = (props) => <Icon {...props} path={<><rect x="4" y="2" width="16" height="20" rx="2"/><line x1="8" y1="6" x2="16" y2="6"/><line x1="16" y1="14" x2="16" y2="18"/><path d="M16 10h.01"/><path d="M12 10h.01"/><path d="M8 10h.01"/><path d="M12 14h.01"/><path d="M8 14h.01"/><path d="M12 18h.01"/><path d="M8 18h.01"/></>} />;
        const RotateCcw = (props) => <Icon {...props} path={<><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><polyline points="3 3 3 8 8 8"/></>} />;
        const Info = (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>} />;

        // --- APP CONSTANTS ---
        const MASTER_PIN = '888';
        const HARGA_SATUAN_PM = 23000;

        // --- UTILS ---
        const formatToRupiah = (value) => {
            if (!value && value !== 0) return "0";
            const numberString = Math.floor(value).toString().replace(/[^0-9]/g, "");
            return numberString.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        };

        const formatBulanIndo = (bulanTahun) => {
            if (!bulanTahun) return "-";
            const [year, month] = bulanTahun.split('-');
            const namaBulan = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            return `${namaBulan[parseInt(month) - 1]} ${year}`;
        };

        const parseTimestamp = (val) => {
            if (!val) return new Date().toISOString();
            if (typeof val === 'string') return val;
            if (typeof val === 'object') {
                const s = val.seconds ?? val.SECONDS ?? val._seconds;
                const n = val.nanoseconds ?? val.NANOSECONDS ?? val._nanoseconds ?? 0;
                if (s !== undefined) return new Date(s * 1000 + Math.floor(n / 1000000)).toISOString();
            }
            return new Date().toISOString();
        };

        // --- MAIN COMPONENT ---
        function App() {
            const [activeTab, setActiveTab] = useState('history');
            const [loading, setLoading] = useState(true);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [notification, setNotification] = useState({ show: false, message: '', type: 'success' });
            const [listBelanja, setListBelanja] = useState([]);
            const [editId, setEditId] = useState(null);
            
            const [showSummary, setShowSummary] = useState(false);
            const [showPMAlert, setShowPMAlert] = useState(false);
            const [showDaysInput, setShowDaysInput] = useState(false);
            const [totalDaysInput, setTotalDaysInput] = useState(30);
            
            const [searchTerm, setSearchTerm] = useState('');
            const [filterUnit, setFilterUnit] = useState('Semua');
            const [filterBulan, setFilterBulan] = useState('');
            const [filterPeriode, setFilterPeriode] = useState('Semua');
            const [sortOrder, setSortOrder] = useState('desc'); 
            
            const [pinModal, setPinModal] = useState({ show: false, type: '', dataId: null, targetLockState: null, payload: null });
            const [pinInput, setPinInput] = useState('');
            
            const [currentPage, setCurrentPage] = useState(1);
            const itemsPerPage = 20; 
            const fileInputRef = useRef(null);

            const [showTokoSuggestions, setShowTokoSuggestions] = useState(false);
            const masterToko = [
                "TOKO MAKANAN JOKO", "UD. SUMBER MAKMUR", "TOKO MIRAH JAYA", "UD. DODO JAYA",
                "DAGING AYAM & SAPI \"BU TARMI\"", "KIOS IKAN SEGAR \"YANTI\""
            ];
            
            const [form, setForm] = useState({
                unit_pelayanan: '',
                bulan_tahun: '',
                periode_laporan: '',
                uraian_belanja: '',
                nominal: '',
                penyedia_toko: '',
                no_bp: '',
                rec_bayar: '',
                surat_pesanan: ''
            });

            const unitOptions = ["PPSDI Raharjo", "RPSLU Mojomulyo", "RPS PMKS Gondang", "RPSA Pamardi Siwi"];
            const periodeOptions = ["1 (Satu)", "2 (Dua)", "3 (Tiga)"];

            const showNotif = (message, type = 'success') => {
                setNotification({ show: true, message, type });
                setTimeout(() => setNotification({ show: false, message: '', type: 'success' }), 3000);
            };

            const fetchData = async () => {
                setLoading(true);
                const { data, error } = await supabaseClient
                    .from('belanja_sosh')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) {
                    showNotif("Gagal Memuat Data", "error");
                    console.error(error);
                } else {
                    setListBelanja(data || []);
                }
                setLoading(false);
            };

            useEffect(() => {
                fetchData();
            }, []);

            const handleNominalInput = (e) => {
                const rawValue = e.target.value.replace(/[^0-9]/g, "");
                const formatted = formatToRupiah(rawValue);
                setForm(prev => ({ ...prev, nominal: formatted }));
            };

            const handleInlineUpdate = async (id, field, value) => {
                try {
                    const { error } = await supabaseClient
                        .from('belanja_sosh')
                        .update({ [field]: value, updated_at: new Date().toISOString() })
                        .eq('id', id);
                    if (error) throw error;
                    fetchData();
                } catch (err) {
                    showNotif("Gagal memperbarui data", "error");
                }
            };

            const filteredData = useMemo(() => {
                return listBelanja.filter(item => {
                    const matchSearch = (item.uraian_belanja?.toLowerCase() || '').includes(searchTerm.toLowerCase()) || 
                                        (item.penyedia_toko?.toLowerCase() || '').includes(searchTerm.toLowerCase()) ||
                                        (item.no_bp?.toLowerCase() || '').includes(searchTerm.toLowerCase()) ||
                                        (item.surat_pesanan?.toLowerCase() || '').includes(searchTerm.toLowerCase());
                    const matchUnit = filterUnit === 'Semua' || item.unit_pelayanan === filterUnit;
                    const matchBulan = filterBulan === '' || item.bulan_tahun === filterBulan;
                    const matchPeriode = filterPeriode === 'Semua' || item.periode_laporan?.includes(filterPeriode);
                    return matchSearch && matchUnit && matchBulan && matchPeriode;
                });
            }, [listBelanja, searchTerm, filterUnit, filterBulan, filterPeriode]);

            const sortedAndFilteredData = useMemo(() => {
                return [...filteredData].sort((a, b) => {
                    if (a.is_locked !== b.is_locked) return a.is_locked ? 1 : -1;
                    if (sortOrder === 'asc') return new Date(a.created_at) - new Date(b.created_at);
                    return new Date(b.created_at) - new Date(a.created_at);
                });
            }, [filteredData, sortOrder]);

            const totalNominal = useMemo(() => {
                return sortedAndFilteredData.reduce((acc, item) => acc + (parseInt(item.nominal) || 0), 0);
            }, [sortedAndFilteredData]);

            const summaryData = useMemo(() => {
                const groups = {};
                filteredData.forEach(item => {
                    const key = `${item.unit_pelayanan}|${item.periode_laporan}`;
                    if (!groups[key]) {
                        groups[key] = {
                            unit: item.unit_pelayanan,
                            periode: item.periode_laporan,
                            totalNominal: 0
                        };
                    }
                    groups[key].totalNominal += (parseInt(item.nominal) || 0);
                });
                
                return Object.values(groups).sort((a, b) => {
                    if (a.unit !== b.unit) return a.unit.localeCompare(b.unit);
                    return a.periode.localeCompare(b.periode);
                });
            }, [filteredData]);

            const unitTotals = useMemo(() => {
                const totals = {};
                summaryData.forEach(item => {
                    if (!totals[item.unit]) totals[item.unit] = 0;
                    totals[item.unit] += item.totalNominal;
                });
                return totals;
            }, [summaryData]);

            const grandTotal = useMemo(() => {
                return summaryData.reduce((acc, item) => acc + item.totalNominal, 0);
            }, [summaryData]);

            // Reset ke halaman 1 jika filter berubah
            useEffect(() => {
                setCurrentPage(1);
            }, [searchTerm, filterUnit, filterBulan, filterPeriode]);

            const totalPages = Math.ceil(sortedAndFilteredData.length / itemsPerPage);
            const currentItems = useMemo(() => {
                const startIndex = (currentPage - 1) * itemsPerPage;
                return sortedAndFilteredData.slice(startIndex, startIndex + itemsPerPage);
            }, [sortedAndFilteredData, currentPage]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (isSubmitting) return; 
                setIsSubmitting(true);
                try {
                    // Pastikan nominal bersih dari titik dan dikonversi ke angka
                    const rawNominal = form.nominal ? form.nominal.toString().replace(/\./g, '') : '0';
                    const cleanNominal = parseInt(rawNominal) || 0;
                    
                    const cleanToko = form.penyedia_toko?.toUpperCase().trim() || '-';
                    
                    // Buat payload bersih tanpa ID agar tidak bentrok dengan primary key di database
                    const payload = { 
                        unit_pelayanan: form.unit_pelayanan,
                        bulan_tahun: form.bulan_tahun,
                        periode_laporan: form.periode_laporan,
                        uraian_belanja: form.uraian_belanja,
                        nominal: cleanNominal,
                        penyedia_toko: cleanToko,
                        no_bp: form.no_bp || '-',
                        rec_bayar: form.rec_bayar || '-',
                        surat_pesanan: form.surat_pesanan || '-',
                        updated_at: new Date().toISOString() 
                    };

                    console.log("Sending payload:", payload); // Debugging

                    let result;
                    if (editId) {
                        result = await supabaseClient.from('belanja_sosh').update(payload).eq('id', editId);
                    } else {
                        result = await supabaseClient.from('belanja_sosh').insert([payload]);
                    }

                    if (result.error) {
                        console.error("Supabase Error:", result.error);
                        throw new Error(result.error.message || "Gagal menyimpan ke database");
                    }

                    showNotif(editId ? "Berhasil Diperbarui" : "Berhasil Disimpan");
                    setEditId(null);
                    setForm({ unit_pelayanan: '', bulan_tahun: '', periode_laporan: '', uraian_belanja: '', nominal: '', penyedia_toko: '', no_bp: '', rec_bayar: '', surat_pesanan: '' });
                    fetchData();
                    setActiveTab('history');
                } catch (err) { 
                    console.error("Submit Error:", err);
                    showNotif("Gagal simpan: " + err.message, "error"); 
                } finally { setIsSubmitting(false); }
            };

            const handleEdit = (item) => {
                setForm({
                    ...item,
                    nominal: formatToRupiah(item.nominal)
                });
                setEditId(item.id);
                setActiveTab('input');
                showNotif("Mode Edit Aktif");
            };

            const handleActionWithPin = async () => {
                if (pinInput !== MASTER_PIN) { showNotif("PIN Salah", "error"); setPinInput(''); return; }
                try {
                    if (pinModal.type === 'delete') {
                        await supabaseClient.from('belanja_sosh').delete().eq('id', pinModal.dataId);
                        showNotif("Data Berhasil Dihapus");
                    } else if (pinModal.type === 'lock_toggle') {
                        await supabaseClient.from('belanja_sosh').update({ is_locked: pinModal.targetLockState }).eq('id', pinModal.dataId);
                        showNotif(pinModal.targetLockState ? "Data Berhasil Dikunci" : "Kunci Berhasil Dibuka");
                    } else if (pinModal.type === 'restore' && pinModal.payload) {
                        const payload = pinModal.payload;
                        
                        // Mode Replace: Hapus semua data lama sebelum restore
                        showNotif("Membersihkan data lama...", "info");
                        const { error: deleteError } = await supabaseClient.from('belanja_sosh').delete().not('id', 'is', null);
                        if (deleteError) throw new Error("Gagal membersihkan data lama: " + deleteError.message);

                        showNotif(`Memproses ${payload.length} data baru...`, "info");
                        
                        // Sistem Batching: Masukkan data per 50 baris agar tidak gagal/berat
                        const chunkSize = 50;
                        let successCount = 0;
                        let errorOccurred = null;

                        for (let i = 0; i < payload.length; i += chunkSize) {
                            const chunk = payload.slice(i, i + chunkSize);
                            const { error } = await supabaseClient.from('belanja_sosh').insert(chunk);
                            
                            if (error) {
                                errorOccurred = error;
                                break;
                            }
                            successCount += chunk.length;
                        }

                        if (errorOccurred) {
                            console.error("Restore Error:", errorOccurred);
                            throw new Error(`Gagal di baris ke-${successCount}: ${errorOccurred.message}`);
                        }

                        showNotif(`Berhasil restore ${successCount} data!`);
                        setCurrentPage(1);
                    }
                    fetchData();
                } catch (error) { 
                    console.error("Pin Action Error:", error);
                    const errorMsg = error.message || (error.error_description) || "Aksi Gagal Dilakukan";
                    showNotif("Gagal: " + errorMsg, "error"); 
                } finally { 
                    setPinModal({ show: false, type: '', dataId: null, targetLockState: null, payload: null }); 
                    setPinInput('');
                }
            };

            const handleBackup = () => {
                const dataStr = JSON.stringify(listBelanja, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `Backup_SOSH_Supabase_${new Date().toISOString().split('T')[0]}.json`;
                link.click();
                URL.revokeObjectURL(url);
                showNotif("Backup File Berhasil Diunduh");
            };

            const handleExportExcel = () => {
                if (sortedAndFilteredData.length === 0) { showNotif("Tidak ada data untuk diexport", "error"); return; }
                const dataToExport = sortedAndFilteredData.map((item, index) => ({
                    'No': sortedAndFilteredData.length - index,
                    'Unit Pelayanan': item.unit_pelayanan,
                    'Bulan': formatBulanIndo(item.bulan_tahun),
                    'Periode': item.periode_laporan,
                    'Uraian Belanja': item.uraian_belanja,
                    'Penyedia/Toko': item.penyedia_toko || '-',
                    'Nominal (Rp)': item.nominal,
                    'Surat Pesanan': item.surat_pesanan || '-',
                    'No BP': item.no_bp || '-',
                    'Rec Bayar': item.rec_bayar || '-',
                    'Status': item.is_locked ? 'TERKUNCI' : 'TERBUKA'
                }));
                const worksheet = window.XLSX.utils.json_to_sheet(dataToExport);
                const workbook = window.XLSX.utils.book_new();
                window.XLSX.utils.book_append_sheet(workbook, worksheet, "Laporan Belanja");
                window.XLSX.writeFile(workbook, `Laporan_SOSH_${new Date().getTime()}.xlsx`);
                showNotif("Laporan Excel Berhasil Dibuat");
            };

            const calculatePM = (item) => {

                                    <div className="flex items-center gap-1.5 ml-auto">
                                        <button onClick={() => { if (sortedAndFilteredData.length === 0) return; setShowPMAlert(true); }} className="flex items-center gap-2 px-4 py-2.5 bg-blue-50 text-blue-600 rounded-md font-black uppercase text-[7.5px] hover:bg-blue-100 transition-all shadow-sm"><PieChart size={12} /> Ringkasan</button>
                                        <button onClick={handleExportExcel} className="flex items-center gap-2 px-4 py-2.5 bg-emerald-600 text-white rounded-md font-black uppercase text-[7.5px] hover:bg-emerald-700 transition-all shadow-sm"><Download size={12} /> Excel</button>
                                    </div>
                                </div>

                                {/* TOTALS */}
                                <div className="flex items-center gap-4 px-2">
                                    <div className="flex items-center gap-2 bg-blue-600 text-white px-4 py-1.5 rounded-full shadow-sm">
                                        <Database size={10} className="text-slate-400"/>
                                        <span className="text-[10px] font-black tracking-tight">{sortedAndFilteredData.length} RECORD</span>
                                    </div>
                                    <div className="flex items-center gap-2 bg-blue-600 text-white px-4 py-1.5 rounded-full shadow-lg shadow-blue-600/10">
                                        <TrendingUp size={10} className="text-blue-100"/>
                                        <span className="text-[10px] font-black tracking-tight">TOTAL: Rp {formatToRupiah(totalNominal)}</span>
                                    </div>
                                </div>

                                {/* DATA TABLE */}
                                <div className="bg-white rounded-md border border-slate-200 shadow-xl overflow-hidden">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left border-collapse table-auto">
                                            <thead>
                                                <tr className="bg-blue-700 text-white border-b border-blue-800">
                                                    <th className="w-[40px] pl-4 py-4 text-[8px] font-black uppercase text-center tracking-widest">No</th>
                                                    <th className="w-[120px] px-2 py-4 text-[8px] font-black uppercase tracking-widest">Unit Pelayanan</th>
                                                    <th className="w-[100px] px-2 py-4 text-[8px] font-black uppercase text-center tracking-widest">Bulan</th>
                                                    <th className="w-[30px] px-1 py-4 text-[8px] font-black uppercase text-center tracking-widest">P</th>
                                                    <th className="px-2 py-4 text-[8px] font-black uppercase tracking-widest">Uraian Belanja</th>
                                                    <th className="w-[130px] px-2 py-4 text-[8px] font-black uppercase text-center tracking-widest">Penyedia</th>
                                                    <th className="w-[110px] px-2 py-4 text-[8px] font-black uppercase text-right tracking-widest">Nominal</th>
                                                    <th className="w-[130px] px-2 py-4 text-[8px] font-black uppercase text-center tracking-widest text-orange-200">Pesanan</th>
                                                    <th className="w-[160px] px-2 py-4 text-[8px] font-black uppercase text-center tracking-widest text-blue-200">No BP</th>
                                                    <th className="w-[160px] px-2 py-4 text-[8px] font-black uppercase text-center tracking-widest text-emerald-200">Rec Bayar</th>
                                                    <th className="w-[90px] px-4 py-4 text-[8px] font-black uppercase text-center tracking-widest">Aksi</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100">
                                                {currentItems.length > 0 ? currentItems.map((item, i) => {
                                                    const totalInView = sortedAndFilteredData.length;
                                                    const displayIndex = totalInView - i;
                                                    const textColor = item.is_locked ? 'text-slate-900' : 'text-slate-950';
                                                    return (
                                                        <tr key={item.id} className={`group transition-all ${item.is_locked ? 'bg-purple-50/50' : 'hover:bg-slate-50/80'}`}>
                                                            <td className="pl-4 py-3 text-center align-middle border-r border-slate-50">
                                                                <span className={`text-[9px] font-black ${item.is_locked ? 'text-slate-900' : 'text-slate-300 group-hover:text-slate-500'}`}>{displayIndex}</span>
                                                            </td>
                                                            <td className={`px-2 py-3 font-black text-[10px] align-middle border-r border-slate-50 ${textColor}`}>{item.unit_pelayanan}</td>
                                                            <td className={`px-2 py-3 text-center font-black uppercase text-[9px] align-middle border-r border-slate-50 ${textColor}`}>{formatBulanIndo(item.bulan_tahun)}</td>
                                                            <td className={`px-1 py-3 text-center font-black text-[9px] align-middle border-r border-slate-50 ${textColor}`}>{item.periode_laporan?.charAt(0)}</td>
                                                            <td className={`px-2 py-3 font-black text-[10px] leading-relaxed align-middle border-r border-slate-50 ${textColor} ${item.is_locked ? 'italic' : ''}`}>{item.uraian_belanja}</td>
                                                            <td className={`px-2 py-3 text-center font-black text-[9px] uppercase align-middle border-r border-slate-50 ${textColor}`}>{item.penyedia_toko || '-'}</td>
                                                            <td className={`px-2 py-3 text-right font-black text-[11px] align-middle border-r border-slate-50 ${textColor}`}>Rp {formatToRupiah(item.nominal)}</td>
                                                            <td className="px-2 py-3 border-r border-slate-50">
                                                                <input disabled={item.is_locked} value={item.surat_pesanan || ''} onChange={(e) => handleInlineUpdate(item.id, 'surat_pesanan', e.target.value)} className="w-full bg-transparent text-center font-black text-[9px] uppercase outline-none focus:bg-white p-1 rounded-md text-orange-600" placeholder="-" />
                                                            </td>
                                                            <td className="px-2 py-3 border-r border-slate-50">
                                                                <input disabled={item.is_locked} value={item.no_bp || ''} onChange={(e) => handleInlineUpdate(item.id, 'no_bp', e.target.value)} className="w-full bg-transparent text-center font-black text-[9px] uppercase outline-none focus:bg-white p-1 rounded-md text-blue-600" placeholder="-" />
                                                            </td>
                                                            <td className="px-2 py-3 border-r border-slate-50">
                                                                <input disabled={item.is_locked} value={item.rec_bayar || ''} onChange={(e) => handleInlineUpdate(item.id, 'rec_bayar', e.target.value)} className="w-full bg-transparent text-center font-black text-[9px] uppercase outline-none focus:bg-white p-1 rounded-md text-emerald-600" placeholder="-" />
                                                            </td>
                                                            <td className="px-4 py-3 align-middle">
                                                                <div className="flex justify-center items-center gap-1">
                                                                    {!item.is_locked && (
                                                                        <>
                                                                            <button onClick={() => handleEdit(item)} className="p-2 text-blue-600 hover:bg-blue-100 rounded-md transition-all" title="Edit Data">
                                                                                <Edit3 size={13}/>
                                                                            </button>
                                                                            <button onClick={()=>setPinModal({show: true, type: 'delete', dataId: item.id})} className="p-2 text-red-500 hover:bg-red-50 rounded-md transition-all" title="Hapus (Perlu PIN)">
                                                                                <Trash2 size={13}/>
                                                                            </button>
                                                                        </>
                                                                    )}
                                                                    <button onClick={()=>setPinModal({show: true, type: 'lock_toggle', dataId: item.id, targetLockState: !item.is_locked})} className={`p-2 rounded-md transition-all ${item.is_locked ? 'text-purple-600 bg-purple-100' : 'text-slate-300'}`} title={item.is_locked ? "Buka Kunci (Perlu PIN)" : "Kunci Data (Perlu PIN)"}>
                                                                        {item.is_locked ? <Lock size={13} /> : <Unlock size={13} />}
                                                                    </button>
                                                                </div>
                                                            </td>
                                                        </tr>
                                                    );
                                                }) : (
                                                    <tr><td colSpan="11" className="py-24 text-center text-slate-200 font-black uppercase text-[10px]">Tidak Ada Data</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                    
                                    {/* PAGINATION */}
                                    {totalPages > 1 && (
                                        <div className="bg-slate-50 border-t border-slate-100 px-4 py-3 flex items-center justify-between">
                                            <div className="text-[10px] font-bold text-slate-400 uppercase tracking-tight">
                                                Halaman {currentPage} dari {totalPages}
                                            </div>
                                            <div className="flex gap-2">
                                                <button 
                                                    onClick={() => setCurrentPage(prev => Math.max(1, prev - 1))}
                                                    disabled={currentPage === 1}
                                                    className={`px-3 py-1.5 rounded-md font-black uppercase text-[9px] transition-all ${currentPage === 1 ? 'text-slate-300 cursor-not-allowed' : 'bg-white text-slate-600 border border-slate-200 hover:bg-slate-100'}`}
                                                >
                                                    Prev
                                                </button>
                                                <button 
                                                    onClick={() => setCurrentPage(prev => Math.min(totalPages, prev + 1))}
                                                    disabled={currentPage === totalPages}
                                                    className={`px-3 py-1.5 rounded-md font-black uppercase text-[9px] transition-all ${currentPage === totalPages ? 'text-slate-300 cursor-not-allowed' : 'bg-blue-600 text-white shadow-md shadow-blue-600/10 hover:bg-blue-700'}`}
                                                >
                                                    Next
                                                </button>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {activeTab === 'admin' && (
                            <div className="max-w-md mx-auto mt-12">
                                <div className="bg-white rounded-md border border-slate-200 shadow-2xl overflow-hidden text-center">
                                    <div className="bg-slate-900 p-8">
                                        <div className="w-16 h-16 bg-blue-600 rounded-md flex items-center justify-center mx-auto mb-4 shadow-xl shadow-blue-600/20"><ShieldCheck size={32} className="text-white" /></div>
                                        <h2 className="text-white font-black uppercase text-[14px]">Admin Only</h2>
                                    </div>
                                    <div className="p-8 space-y-4">
                                        <button onClick={handleBackup} className="w-full py-4 bg-blue-600 text-white rounded-md font-black uppercase text-[10px] flex items-center justify-center gap-3"><Download size={16} /> Backup Data</button>
                                        <button onClick={()=>fileInputRef.current?.click()} className="w-full py-4 bg-slate-100 text-slate-600 rounded-md font-black uppercase text-[10px] flex items-center justify-center gap-3"><UploadCloud size={16} /> Restore Data</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
        // Sinyal aktivitas ke induk untuk mencegah logout otomatis
        ['mousedown', 'keypress', 'touchstart'].forEach(evt => {
            document.addEventListener(evt, () => {
                if (window.parent !== window) {
                    window.parent.postMessage('resetSession', '*');
                }
            }, true);
        });
    </script>
</body>
</html>
