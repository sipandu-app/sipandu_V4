        // --- KONFIGURASI SUPABASE ---
        const SUPABASE_URL = "https://yewkffbatvrbtfliikia.supabase.co";

        const Unlock = (props) => <Icon {...props} path={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></>} />;
        const Clock = (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} />;

        const CreditCard = (props) => <Icon {...props} path={<><rect x="1" y="4" width="22" height="16" rx="2" ry="2"/><line x1="1" y1="10" x2="23" y2="10"/></>} />;
        const Banknote = (props) => <Icon {...props} path={<><rect x="2" y="5" width="20" height="14" rx="2"/><circle cx="12" cy="12" r="3"/><path d="M6 12h.01M18 12h.01"/></>} />;
        const ImageIcon = (props) => <Icon {...props} path={<><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></>} />;

        const X = (props) => <Icon {...props} path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />;

        const DownloadCloud = (props) => <Icon {...props} path={<><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/></>} />;
        const Eraser = (props) => <Icon {...props} path={<><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></>} />;
        const AlertTriangle = (props) => <Icon {...props} path={<><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>} />;
        const CheckCircle2 = (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></>} />;
        const UserIcon = (props) => <Icon {...props} path={<><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>} />;
        const Calendar = (props) => <Icon {...props} path={<><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>} />;
        const CopyPlus = (props) => <Icon {...props} path={<><rect x="8" y="8" width="12" height="12" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/><line x1="14" y1="11" x2="14" y2="17"/><line x1="11" y1="14" x2="17" y2="14"/></>} />;
        const Replace = (props) => <Icon {...props} path={<><path d="M14 4c0-1.1.9-2 2-2"/><path d="M20 2c1.1 0 2 .9 2 2"/><path d="M22 8c0 1.1-.9 2-2 2"/><path d="M16 10c-1.1 0-2-.9-2-2"/><path d="m3 7 3 3 3-3"/><path d="M6 10V5c0-1.7 1.3-3 3-3h1"/><path d="m21 17-3-3-3 3"/><path d="M18 14v5c0 1.7-1.3 3-3 3h-1"/></>} />;

        // --- APP CONSTANTS ---
        const MASTER_PIN = '888';
        const LIST_GOLONGAN = [
            "-", "I/a - Juru Muda", "I/b - Juru Muda Tk. I", "I/c - Juru", "I/d - Juru Tk. I",
            "II/a - Pengatur Muda", "II/b - Pengatur Muda Tk. I", "II/c - Pengatur", "II/d - Pengatur Tk. I",
            "III/a - Penata Muda", "III/b - Penata Muda Tk. I", "III/c - Penata", "III/d - Penata Tk. I",
            "IV/a - Pembina", "IV/b - Pembina Tk. I", "IV/c - Pembina Utama Muda", "IV/d - Pembina Utama Madya", "IV/e - Pembina Utama", "Gol V", "Gol VI", "Gol VII", "Gol IX", "Gol X", "Gol XI"
        ];

        // --- UTILS ---
        const formatRibuan = (num) => {
            if (!num && num !== 0) return "0";
            const value = num.toString().replace(/\./g, "");
            return value.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        };

        const parseRibuan = (str) => {
            if (!str) return 0;
            return parseInt(str.toString().replace(/\./g, "")) || 0;
        };

        const calculateNextSchedule = (dateString, yearsToAdd) => {
            if (!dateString) return null;
            const date = new Date(dateString);
            if (isNaN(date.getTime())) return null;
            date.setFullYear(date.getFullYear() + yearsToAdd);
            return date;
        };

        const isNearDate = (targetDate, isRetirement = false) => {
            if (!targetDate) return false;
            const today = new Date();
            const diffTime = targetDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            
            // Tetap true untuk yang sudah lewat (overdue) agar label di tabel tetap berwarna
            return diffDays <= 90;
        };

        const isBlinkingDate = (targetDate) => {
            if (!targetDate) return false;
            const today = new Date();
            const diffTime = targetDate - today;
            const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            // Hanya berkedip jika jadwal dalam 90 hari ke depan (tidak berkedip jika sudah lewat)
            return diffDays <= 90 && diffDays >= 0;
        };

        const formatIDDate = (date) => {
            if (!date) return "-";
            return new Intl.DateTimeFormat('id-ID', { day: '2-digit', month: 'short', year: 'numeric' }).format(date);
        };

        const calculateAge = (birthDate) => {
            if (!birthDate) return 0;
            const today = new Date();
            const birth = new Date(birthDate);
            let age = today.getFullYear() - birth.getFullYear();
            const m = today.getMonth() - birth.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
            return age;
        };

        // --- MAIN COMPONENT ---
        function App() {
            const [activeTab, setActiveTab] = useState('history');
            const [loading, setLoading] = useState(true);
            const [listPegawai, setListPegawai] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [showSettings, setShowSettings] = useState(false);
            const [pinModal, setPinModal] = useState({ show: false, type: '', payload: null });
            const [pinInput, setPinInput] = useState('');
            const [notification, setNotification] = useState({ show: false, message: '', type: 'success' });
            const [isProcessing, setIsProcessing] = useState(false);
            const [restoreProgress, setRestoreProgress] = useState(0);
            const [showResetConfirm, setShowResetConfirm] = useState(false);
            const [previewImage, setPreviewImage] = useState(null);
            
            const [selectedPegawai, setSelectedPegawai] = useState(null);
            const [form, setForm] = useState({});
            const [sortBy, setSortBy] = useState('default');
            const [filterPurnaTugas, setFilterPurnaTugas] = useState(false);
            const [filterKP, setFilterKP] = useState(false);
            const [filterKGB, setFilterKGB] = useState(false);

            const fileInputRef = useRef(null);
            const restoreMergeRef = useRef(null);
            const restoreOverwriteRef = useRef(null);

            const showNotif = (message, type = 'success') => {
                setNotification({ show: true, message, type });
                setTimeout(() => setNotification({ show: false, message: '', type: 'success' }), 4000);
            };

            const [masterPegawai, setMasterPegawai] = useState([]);

            const fetchData = async () => {
                setLoading(true);
                try {
                    // 1. Ambil data utama dari data_kp_kgb
                    const { data: kgbData, error: kgbError } = await supabaseClient
                        .from('data_kp_kgb')
                        .select('*')
                        .order('order_index', { ascending: true });
                    
                    if (kgbError) throw kgbError;

                    // 2. Ambil referensi dari data_pegawai
                    const { data: pegData, error: pegError } = await supabaseClient
                        .from('data_pegawai')
                        .select('nama, nip, pangkat, tanggal_lahir');
                    
                    if (!pegError && pegData) {
                        setMasterPegawai(pegData);
                        // 3. Gabungkan data: Utamakan tanggal_lahir dari tabel data_pegawai
                        const enrichedData = kgbData.map(item => {
                            const refPegawai = pegData.find(p => p.nip === item.nip);
                            return {
                                ...item,
                                tanggal_lahir: refPegawai?.tanggal_lahir || item.tanggal_lahir
                            };
                        });
                        setListPegawai(enrichedData);
                    } else {
                        setListPegawai(kgbData || []);
                    }
                } catch (error) {
                    console.error("Fetch error:", error);
                    showNotif("Gagal Memuat Data", "error");
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchData();
            }, []);

            const handlePinSubmit = (val) => {
                setPinInput(val);
                if (val === MASTER_PIN) {
                    const type = pinModal.type;
                    const payload = pinModal.payload;
                    setPinModal({ show: false, type: '', payload: null });
                    setPinInput('');

                    if (type === 'settings') setShowSettings(true);
                    else if (type === 'toggle_lock') performToggleLock(payload);
                    else if (type === 'delete_row') performDelete(payload);
                    else if (type === 'restore_merge') performRestore(payload, 'merge');
                    else if (type === 'restore_overwrite') performRestore(payload, 'overwrite');
                }
            };

            const performToggleLock = async (p) => {
                try {
                    const { error } = await supabaseClient
                        .from('data_kp_kgb')
                        .update({ is_locked: !p.is_locked })
                        .eq('id', p.id);
                    if (error) throw error;
                    showNotif(`Data ${p.nama} ${!p.is_locked ? 'Dikunci' : 'Dibuka'}`);
                    fetchData();
                } catch (e) { showNotif("Gagal mengubah status kunci", "error"); }
            };

            const performDelete = async (id) => {
                try {
                    const { error } = await supabaseClient.from('data_kp_kgb').delete().eq('id', id);
                    if (error) throw error;
                    showNotif("Pegawai berhasil dihapus");
                    fetchData();
                } catch (e) { showNotif("Gagal menghapus data", "error"); }
            };

            const handleNipLookup = (input) => {
                if (!input) return;
                const found = masterPegawai.find(p => 
                    (p.nip && p.nip.includes(input)) || 
                    (p.nama && p.nama.toLowerCase().includes(input.toLowerCase()))
                );
                if (found) {
                    setForm(prev => ({
                        ...prev,
                        nama: found.nama.toUpperCase(),
                        nip: found.nip,
                        pangkat: found.pangkat,
                        tanggal_lahir: found.tanggal_lahir
                    }));
                    showNotif("Data Pegawai ditemukan!", "info");
                } else {
                    showNotif("Pegawai tidak ditemukan", "info");
                }
            };

            const handleSave = async () => {
                if (isProcessing) return;
                setIsProcessing(true);
                try {
                    // Konstruksi payload - pastikan field sesuai schema
                    const payload = {
                        nama: (form.nama || '').toUpperCase(),
                        nip: form.nip || '',
                        pangkat: form.pangkat || '',
                        tmt_pangkat: form.tmt_pangkat || null,
                        tanggal_lahir: form.tanggal_lahir || null,
                        gaji_berkala: parseRibuan(form.gaji_berkala || '0'),
                        tmt_gaji: form.tmt_gaji || null,
                        npwp: form.npwp || '',
                        rek_bank: form.rek_bank || '',
                        ktp_data: form.ktp_data || null,
                        kk_data: form.kk_data || null,
                        is_locked: form.is_locked || false,
                        updated_at: new Date().toISOString()
                    };

                    let result;
                    if (selectedPegawai?.id && !selectedPegawai.isNew) {
                        result = await supabaseClient.from('data_kp_kgb').update(payload).eq('id', selectedPegawai.id);
                    } else {
                        result = await supabaseClient.from('data_kp_kgb').insert([{ ...payload, order_index: listPegawai.length }]);
                    }

                    if (result.error) throw result.error;

                    showNotif(selectedPegawai?.id && !selectedPegawai.isNew ? "Data diperbarui!" : "Pegawai baru ditambahkan!");
                    setSelectedPegawai(null);
                    setForm({});
                    fetchData();
                } catch (e) {
                    console.error("Save Error:", e);
                    showNotif("Gagal: " + (e.message || "Terjadi kesalahan database"), "error");
                } finally {
                    setIsProcessing(false);
                }
            };

            const performRestore = async (data, mode) => {
                setIsProcessing(true);
                setRestoreProgress(0);
                try {
                    showNotif("Memulai proses restore...", "info");
                    
                    if (mode === 'overwrite') {
                        showNotif("Membersihkan database lama...", "info");
                        const { error: delErr } = await supabaseClient.from('data_kp_kgb').delete().neq('nama', '___EMPTY___');
                        if (delErr) throw delErr;
                    }

                    const cleanData = data.map((p, i) => {
                        // Hilangkan field sistem agar tidak bentrok
                        const { id, created_at, updated_at, ...rest } = p;
                        
                        // Pemetaan kolom dari JSON Pegawai ke Tabel KP_KGB
                        // p.pangkat -> pangkat
                        // p.gaji_berkala (jika ada) atau p.gaji -> gaji_berkala
                        // p.rek_bank (jika ada) atau p.no_rekening -> rek_bank
                        
                        const mappedData = {
                            nama: rest.nama,
                            nip: rest.nip,
                            pangkat: rest.pangkat,
                            tmt_pangkat: rest.tmt_pangkat || rest.tmt_golongan,
                            gaji_berkala: rest.gaji_berkala || rest.gaji || 0,
                            tmt_gaji: rest.tmt_gaji || rest.tmt_berkala,
                            npwp: rest.npwp,
                            rek_bank: rest.rek_bank || rest.no_rekening || rest.rekening,
                            ktp_data: rest.ktp_data,
                            kk_data: rest.kk_data,
                            is_locked: rest.is_locked || false
                        };

                        return { 
                            ...mappedData, 
                            updated_at: new Date().toISOString(),
                            order_index: rest.order_index ?? i 
                        };
                    });

                    showNotif(`Mengunggah ${cleanData.length} data...`, "info");

                    // Gunakan batch kecil (10) untuk menghindari error payload size (terutama jika ada base64)
                    const chunkSize = 10;
                    
                    // Jalankan secara sekuensial agar lebih stabil dan progress terbaca jelas
                    for (let i = 0; i < cleanData.length; i += chunkSize) {
                        const chunk = cleanData.slice(i, i + chunkSize);
                        const { error: insErr } = await supabaseClient.from('data_kp_kgb').insert(chunk);
                        
                        if (insErr) {
                            console.error(`Gagal restore pada baris ${i + 1}`, insErr);
                            throw new Error(`Gagal pada data ke-${i + 1}: ${insErr.message}`);
                        }
                        
                        const percent = Math.round(((i + chunk.length) / cleanData.length) * 100);
                        setRestoreProgress(percent);
                        showNotif(`Restore: ${percent}%...`, "info");
                    }

                    showNotif(`Restore Berhasil! ${cleanData.length} data dimuat.`, "success");
                    setShowSettings(false);
                    fetchData();
                } catch (err) { 
                    console.error("Restore Error:", err);
                    showNotif("Gagal: " + (err.message || "Format JSON tidak sesuai"), "error"); 
                } finally { 
                    setIsProcessing(false);
                    setTimeout(() => setRestoreProgress(0), 500);
                }
            };

            const handleExportExcel = () => {
                if (listPegawai.length === 0) return;
                const exportData = listPegawai.map((p, idx) => {
                    const nextPangkat = calculateNextSchedule(p.tmt_pangkat, 4);
                    const nextGaji = calculateNextSchedule(p.tmt_gaji, 2);
                    return {
                        "No": idx + 1,
                        "Nama Pegawai": p.nama,
                        "NIP": p.nip,
                        "Pangkat": p.pangkat,
                        "TMT Pangkat": p.tmt_pangkat,
                        "Estimasi KP": nextPangkat ? formatIDDate(nextPangkat) : "-",
                        "Gaji Pokok": formatRibuan(p.gaji_berkala),
                        "TMT KGB": p.tmt_gaji,
                        "Estimasi KGB": nextGaji ? formatIDDate(nextGaji) : "-",
                        "NPWP": p.npwp,
                        "Rekening Bank": p.rek_bank
                    };
                });
                const ws = XLSX.utils.json_to_sheet(exportData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Database Pegawai");
                XLSX.writeFile(wb, `Database_KP_KGB_${new Date().getTime()}.xlsx`);
                showNotif("Excel berhasil diunduh!");
            };

            const handleFileUpload = async (e, field) => {
                const file = e.target.files[0];
                if (!file) return;
                
                // Batas ukuran file (misal 2MB)
                if (file.size > 2000000) return showNotif("File terlalu besar (Maks 2MB)", "error");
                
                setIsProcessing(true);
                showNotif(`Mengunggah ${field.split('_')[0].toUpperCase()}...`, "info");

                try {
                    const fileExt = file.name.split('.').pop();
                    const fileName = `${Date.now()}-${Math.random().toString(36).substring(2)}.${fileExt}`;
                    const filePath = `${field}/${fileName}`;

                    // Upload ke Supabase Storage
                    const { data, error } = await supabaseClient.storage
                        .from('arsip-pegawai')
                        .upload(filePath, file);

                    if (error) throw error;

                    // Dapatkan Public URL
                    const { data: { publicUrl } } = supabaseClient.storage
                        .from('arsip-pegawai')
                        .getPublicUrl(filePath);

                    setForm(prev => ({ ...prev, [field]: publicUrl }));
                    showNotif(`${field.split('_')[0].toUpperCase()} berhasil diunggah`, "success");
                } catch (err) {
                    console.error("Upload Error:", err);
                    showNotif("Gagal mengunggah file ke Storage", "error");
                } finally {
                    setIsProcessing(false);
                }
            };

            const filteredData = useMemo(() => {
                 let data = listPegawai.filter(p => 
                     p.nama?.toLowerCase().includes(searchTerm.toLowerCase()) || 
                     p.nip?.includes(searchTerm)
                 );
 
                 const today = new Date();

                 if (filterPurnaTugas) {
                     data = data.filter(p => {
                         if (!p.tanggal_lahir) return false;
                         const purnaDate = calculateNextSchedule(p.tanggal_lahir, 58);
                         return isNearDate(purnaDate, true);
                     });
                     // Urutkan otomatis dari yang terdekat saat filter Purna aktif
                     data.sort((a, b) => {
                         const dateA = calculateNextSchedule(a.tanggal_lahir, 58);
                         const dateB = calculateNextSchedule(b.tanggal_lahir, 58);
                         if (!dateA) return 1;
                         if (!dateB) return -1;
 
                         // Prioritaskan yang sudah lewat (lebih 58 tahun) paling atas
                         const isPastA = dateA < today;
                         const isPastB = dateB < today;
                         if (isPastA && !isPastB) return -1;
                         if (!isPastA && isPastB) return 1;
 
                         return dateA - dateB;
                     });
                 }

                 if (filterKP) {
                     data = data.filter(p => {
                         if (!p.tmt_pangkat) return false;
                         const kpDate = calculateNextSchedule(p.tmt_pangkat, 4);
                         const diffDays = Math.ceil((kpDate - today) / (1000 * 60 * 60 * 24));
                         return diffDays <= 90 && diffDays >= 0; // Hanya yang belum terlewati
                     });
                 }

                 if (filterKGB) {
                     data = data.filter(p => {
                         if (!p.tmt_gaji) return false;
                         const kgbDate = calculateNextSchedule(p.tmt_gaji, 2);
                         const diffDays = Math.ceil((kgbDate - today) / (1000 * 60 * 60 * 24));
                         return diffDays <= 90 && diffDays >= 0; // Hanya yang belum terlewati
                     });
                 }
 
                 if (sortBy === 'kp') {
                     data.sort((a, b) => {
                         const dateA = calculateNextSchedule(a.tmt_pangkat, 4);
                         const dateB = calculateNextSchedule(b.tmt_pangkat, 4);
                         if (!dateA) return 1;
                         if (!dateB) return -1;
                         
                         // Prioritaskan yang belum lewat (mendatang)
                         const isPastA = dateA < today;
                         const isPastB = dateB < today;
                         if (isPastA && !isPastB) return 1;
                         if (!isPastA && isPastB) return -1;
                         
                         return dateA - dateB;
                     });
                 } else if (sortBy === 'kgb') {
                     data.sort((a, b) => {
                         const dateA = calculateNextSchedule(a.tmt_gaji, 2);
                         const dateB = calculateNextSchedule(b.tmt_gaji, 2);
                         if (!dateA) return 1;
                         if (!dateB) return -1;

                         const isPastA = dateA < today;
                         const isPastB = dateB < today;
                         if (isPastA && !isPastB) return 1;
                         if (!isPastA && isPastB) return -1;

                         return dateA - dateB;
                     });
                 } else if (sortBy === 'purna') {
                     data.sort((a, b) => {
                         const dateA = calculateNextSchedule(a.tanggal_lahir, 58);
                         const dateB = calculateNextSchedule(b.tanggal_lahir, 58);
                         if (!dateA) return 1;
                         if (!dateB) return -1;

                         // Prioritaskan yang sudah lewat (lebih 58 tahun) paling atas
                         const isPastA = dateA < today;
                         const isPastB = dateB < today;
                         if (isPastA && !isPastB) return -1;
                         if (!isPastA && isPastB) return 1;

                         return dateA - dateB;
                     });
                 }
 
                 return data;
             }, [listPegawai, searchTerm, sortBy, filterPurnaTugas, filterKP, filterKGB]);

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-white gap-4">
                    <Loader2 className="animate-spin text-slate-900" size={40}/>
                    <p className="text-[10px] font-black uppercase tracking-widest text-slate-400">Memuat Sistem KP KGB...</p>
                </div>
            );

            return (
                <div className="min-h-screen bg-[#FDFDFD] text-slate-950 pb-12 font-sans text-[13px]">
                    {notification.show && (
                        <div className={`fixed top-6 right-6 z-[999] px-6 py-4 rounded-2xl text-[11px] font-black flex items-center gap-4 shadow-2xl border border-white/10 animate-in 
                            ${notification.type === 'error' ? 'bg-rose-600 text-white' : 
                              notification.type === 'info' ? 'bg-indigo-600 text-white' : 
                              'bg-slate-900 text-white'}`}>
                            {notification.type === 'error' ? <AlertCircle size={18} className="text-rose-200" /> : 
                             notification.type === 'info' ? <Clock size={18} className="text-indigo-200" /> :
                             <CheckCircle2 size={18} className="text-emerald-400" />}
                            <span className="uppercase tracking-widest">{notification.message}</span>
                        </div>
                    )}

                    <header className="sticky top-0 z-40 bg-white border-b border-slate-100 px-8 py-5 flex items-center justify-between shadow-sm">
                        <div className="flex items-center gap-5">
                            <div className="w-12 h-12 bg-slate-950 rounded-2xl flex items-center justify-center text-white shadow-xl"><Users size={24} /></div>
                            <div>
                                <h1 className="text-[16px] font-black tracking-tighter uppercase leading-none text-slate-950">Manajemen KP & KGB</h1>
                                <p className="text-[9px] font-bold text-slate-400 uppercase mt-1 tracking-widest italic">Kenaikan Pangkat dan Gaji Berkala</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="flex items-center gap-2 bg-slate-100 p-1.5 rounded-xl border border-slate-200">
                                <select 
                                     className="bg-transparent px-3 py-1 font-black uppercase text-[9px] outline-none text-slate-600"
                                     value={sortBy}
                                     onChange={e => setSortBy(e.target.value)}
                                 >
                                     <option value="default">Urutkan: Default</option>
                                     <option value="kp">KP Terdekat</option>
                                     <option value="kgb">KGB Terdekat</option>
                                     <option value="purna">Purna Tugas Terdekat</option>
                                 </select>
                                 <div className="w-[1px] h-4 bg-slate-200 mx-1"></div>
                                 <div className="flex gap-1">
                                       <button 
                                            onClick={() => {
                                                const nextState = !filterKP;
                                                setFilterKP(nextState);
                                                setFilterKGB(false);
                                                setFilterPurnaTugas(false);
                                                setSortBy(nextState ? 'kp' : 'default');
                                            }}
                                            className={`px-3 py-1 rounded-lg font-black uppercase text-[9px] transition-all ${filterKP ? 'bg-blue-600 text-white shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}
                                            title="Filter KP dalam 90 hari"
                                        >
                                            KP Dekat
                                        </button>
                                        <button 
                                            onClick={() => {
                                                const nextState = !filterKGB;
                                                setFilterKGB(nextState);
                                                setFilterKP(false);
                                                setFilterPurnaTugas(false);
                                                setSortBy(nextState ? 'kgb' : 'default');
                                            }}
                                            className={`px-3 py-1 rounded-lg font-black uppercase text-[9px] transition-all ${filterKGB ? 'bg-amber-600 text-white shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}
                                            title="Filter KGB dalam 90 hari"
                                        >
                                            KGB Dekat
                                        </button>
                                        <button 
                                            onClick={() => {
                                                const nextState = !filterPurnaTugas;
                                                setFilterPurnaTugas(nextState);
                                                setFilterKP(false);
                                                setFilterKGB(false);
                                                setSortBy(nextState ? 'purna' : 'default');
                                            }}
                                            className={`px-3 py-1 rounded-lg font-black uppercase text-[9px] transition-all ${filterPurnaTugas ? 'bg-rose-600 text-white shadow-sm' : 'text-slate-400 hover:text-slate-600'}`}
                                            title="Filter Purna Tugas dalam 90 hari"
                                        >
                                            Purna (58)
                                        </button>
                                       {(filterKP || filterKGB || filterPurnaTugas || sortBy !== 'default' || searchTerm !== '') && (
                                           <button 
                                               onClick={() => {
                                                   setFilterKP(false);
                                                   setFilterKGB(false);
                                                   setFilterPurnaTugas(false);
                                                   setSortBy('default');
                                                   setSearchTerm('');
                                               }}
                                               className="px-3 py-1 rounded-lg font-black uppercase text-[9px] bg-slate-900 text-white shadow-sm hover:bg-slate-800 transition-all flex items-center gap-1"
                                           >
                                               <X size={10} /> Reset
                                           </button>
                                       )}
                                   </div>
                            </div>
                            <div className="relative">
                                <Search size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                                <input type="text" placeholder="CARI NAMA / NIP..." className="pl-11 pr-4 py-2.5 bg-slate-100 rounded-xl w-48 outline-none border border-transparent focus:border-slate-950 transition-all font-bold uppercase text-[10px]" value={searchTerm} onChange={e => setSearchTerm(e.target.value)} autoComplete="off" />
                            </div>
                            <button onClick={handleExportExcel} className="flex items-center gap-2 px-5 py-2.5 bg-emerald-600 text-white rounded-xl font-black uppercase text-[10px] tracking-widest hover:bg-emerald-700 transition-all shadow-lg shadow-emerald-200">
                                <FileSpreadsheet size={16} /> <span>UNDUH EXCEL</span>
                            </button>
                            <button onClick={() => { setForm({ pangkat: LIST_GOLONGAN[0] }); setSelectedPegawai({isNew: true}); }} className="flex items-center gap-2 px-5 py-2.5 bg-slate-950 text-white rounded-xl font-black uppercase text-[10px] tracking-widest hover:bg-slate-800 transition-all">
                                <Plus size={16} /> <span>TAMBAH</span>
                            </button>
                            <button onClick={() => setPinModal({ show: true, type: 'settings' })} className="p-3 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded-xl transition-all"><Settings size={18} /></button>
                        </div>
                    </header>

                    <main className="p-8">
                        <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden">
                            <div className="overflow-x-auto">
                                <table className="w-full text-left border-collapse">
                                    <thead className="bg-slate-50 border-b border-slate-200 text-[9px] font-black uppercase text-slate-500 tracking-widest">
                                        <tr>
                                            <th className="px-6 py-5 w-12 text-center">No</th>
                                            <th className="px-6 py-5">Identitas</th>
                                            <th className="px-6 py-5">Pangkat (TMT)</th>
                                            <th className="px-6 py-5">Gaji Pokok (TMT)</th>
                                            <th className="px-6 py-5">Pajak & Bank</th>
                                            <th className="px-6 py-5">Arsip Dokumen</th>
                                            <th className="px-6 py-5 text-right">Aksi</th>
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-slate-100">
                                        {filteredData.map((p, i) => {
                                            const nextPangkat = calculateNextSchedule(p.tmt_pangkat, 4);
                                            const nextGaji = calculateNextSchedule(p.tmt_gaji, 2);
                                            const purnaTugas = calculateNextSchedule(p.tanggal_lahir, 58);
                                            const age = calculateAge(p.tanggal_lahir);
                                            
                                            const isWithinOneYearPurna = purnaTugas && (Math.ceil((purnaTugas - new Date()) / (1000 * 60 * 60 * 24)) <= 365);

                                            const kpNear = isNearDate(nextPangkat);
                                            const kgbNear = isNearDate(nextGaji);
                                            const purnaNear = isNearDate(purnaTugas, true);
                                            
                                            const kpBlink = isBlinkingDate(nextPangkat);
                                            const kgbBlink = isBlinkingDate(nextGaji);
                                            const purnaBlink = isBlinkingDate(purnaTugas);

                                            return (
                                                <tr key={p.id} className={`transition-all hover:bg-slate-50/50 ${p.is_locked ? 'bg-amber-50/30' : ''}`}>
                                                    <td className="px-6 py-6 text-center font-black text-slate-400">{i + 1}</td>
                                                    <td className="px-6 py-6">
                                                        <div className="flex flex-col">
                                                            <p className="font-black uppercase text-slate-950 leading-none">{p.nama}</p>
                                                            <p className="text-[10px] font-bold text-slate-500 mt-1 uppercase tracking-tighter">NIP. {p.nip || "-"}</p>
                                                            
                                                            {/* Informasi Purna Tugas di Kolom Identitas */}
                                                             {purnaTugas ? (
                                                                 isWithinOneYearPurna && (
                                                                     <div className="mt-2 space-y-1">
                                                                         <div className={`flex items-center gap-2 text-[8px] font-black uppercase p-1.5 rounded-lg w-fit ${purnaNear ? (purnaBlink ? 'bg-orange-500 text-white animate-pulse' : 'bg-orange-500 text-white') : 'bg-orange-50 text-orange-600 border border-orange-100'}`}>
                                                                             <Calendar size={10} /> PURNA: {formatIDDate(purnaTugas)}
                                                                         </div>
                                                                         {age >= 58 && (
                                                                            <div className={`flex items-center gap-1.5 px-2 py-1 bg-orange-500 text-white rounded text-[7px] font-black uppercase w-fit ${age === 58 && purnaBlink ? 'animate-pulse' : ''}`}>
                                                                                <AlertTriangle size={10} /> Purna tugas fungsional
                                                                            </div>
                                                                        )}
                                                                    </div>
                                                                 )
                                                             ) : (
                                                                 <p className="text-[8px] font-bold text-slate-300 uppercase mt-1">Data lahir tidak tersedia</p>
                                                             )}
                                                        </div>
                                                    </td>
                                                    <td className="px-6 py-6">
                                                        <p className="font-black text-slate-950 uppercase">{p.pangkat || "-"}</p>
                                                        <p className="text-[10px] text-slate-500 font-bold tracking-tighter italic">TMT: {p.tmt_pangkat || "-"}</p>
                                                        {nextPangkat && (
                                                            <div className={`mt-2 flex items-center gap-2 text-[8px] font-black uppercase p-2 rounded-lg ${kpNear ? (kpBlink ? 'bg-blue-600 text-white animate-pulse' : 'bg-blue-600 text-white') : 'bg-blue-50 text-blue-600 border border-blue-100'}`}>
                                                                <AlertCircle size={10} /> ESTIMASI KP: {formatIDDate(nextPangkat)}
                                                            </div>
                                                        )}
                                                    </td>
                                                    <td className="px-6 py-6">
                                                        <p className="font-black text-slate-950 uppercase">{p.gaji_berkala > 0 ? 'Rp. Terinput' : 'Kosong'}</p>
                                                        <p className="text-[10px] text-slate-500 font-bold tracking-tighter italic">TMT: {p.tmt_gaji || "-"}</p>
                                                        {nextGaji && (
                                                            <div className={`mt-2 flex items-center gap-2 text-[8px] font-black uppercase p-2 rounded-lg ${kgbNear ? (kgbBlink ? 'bg-blue-600 text-white animate-pulse' : 'bg-blue-600 text-white') : 'bg-blue-50 text-blue-600 border border-blue-100'}`}>
                                                                <Clock size={10} /> ESTIMASI KGB: {formatIDDate(nextGaji)}
                                                            </div>
                                                        )}
                                                    </td>
                                                    <td className="px-6 py-6">
                                                        <div className="flex flex-col gap-1.5">
                                                            <span className="text-[10px] font-bold text-slate-950 flex items-center gap-2">
                                                                <div className="p-1 bg-orange-100 text-orange-600 rounded"><CreditCard size={12}/></div>
                                                                <span className="opacity-60 text-[8px] w-8 uppercase">NPWP</span> {p.npwp || "-"}
                                                            </span>
                                                            <span className="text-[10px] font-bold text-slate-950 flex items-center gap-2">
                                                                <div className="p-1 bg-blue-100 text-blue-600 rounded"><Banknote size={12}/></div>
                                                                <span className="opacity-60 text-[8px] w-8 uppercase">REK</span> {p.rek_bank || "-"}
                                                            </span>
                                                        </div>
                                                    </td>
                                                    <td className="px-6 py-6">
                                                        <div className="flex flex-col gap-1.5">
                                                            <button onClick={() => p.ktp_data && setPreviewImage({data: p.ktp_data, label: 'KTP: ' + p.nama})} className={`flex items-center gap-2 px-2 py-1.5 rounded-lg border transition-all ${p.ktp_data ? 'bg-rose-50 border-rose-100 text-rose-600 hover:bg-rose-100' : 'bg-slate-50 border-slate-100 text-slate-300 opacity-50 cursor-not-allowed'}`}>
                                                                <FileText size={14} /> <span className="text-[9px] font-black uppercase tracking-widest">KTP (PDF)</span>
                                                            </button>
                                                            <button onClick={() => p.kk_data && setPreviewImage({data: p.kk_data, label: 'KK: ' + p.nama})} className={`flex items-center gap-2 px-2 py-1.5 rounded-lg border transition-all ${p.kk_data ? 'bg-indigo-50 border-indigo-100 text-indigo-600 hover:bg-indigo-100' : 'bg-slate-50 border-slate-100 text-slate-300 opacity-50 cursor-not-allowed'}`}>
                                                                <FileText size={14} /> <span className="text-[9px] font-black uppercase tracking-widest">KK (PDF)</span>
                                                            </button>
                                                        </div>
                                                    </td>
                                                    <td className="px-6 py-6 text-right">
                                                        <div className="flex items-center justify-end gap-2">
                                                            <button onClick={() => setPinModal({ show: true, type: 'toggle_lock', payload: p })} className={`p-2.5 rounded-xl transition-all shadow-sm ${p.is_locked ? 'bg-amber-500 text-white' : 'bg-slate-100 text-slate-400'}`}>
                                                                {p.is_locked ? <Lock size={16} /> : <Unlock size={16} />}
                                                            </button>
                                                            <button onClick={() => { if(p.is_locked) return showNotif("Data Terkunci!","error"); setForm(p); setSelectedPegawai(p); }} className={`p-2.5 rounded-xl transition-all shadow-sm ${p.is_locked ? 'bg-slate-50 text-slate-200' : 'bg-indigo-600 text-white hover:bg-indigo-700'}`}>
                                                                <Edit3 size={16} />
                                                            </button>
                                                            <button onClick={() => setPinModal({ show: true, type: 'delete_row', payload: p.id })} className="p-2.5 bg-rose-50 text-rose-600 rounded-xl hover:bg-rose-600 hover:text-white transition-all shadow-sm">
                                                                <Trash2 size={16} />
                                                            </button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            )
                                        })}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </main>

                    {/* FORM MODAL */}
                    {selectedPegawai && (
                        <div className="fixed inset-0 z-[500] bg-slate-900/70 backdrop-blur-md flex items-center justify-center p-4">
                            <div className="bg-white rounded-[3rem] w-full max-w-2xl flex flex-col shadow-2xl overflow-hidden animate-in">
                                <div className="p-6 border-b border-slate-100 flex items-center justify-between bg-slate-50/50">
                                    <div className="flex items-center gap-4">
                                        <div className="w-10 h-10 bg-slate-950 text-white rounded-xl flex items-center justify-center shadow-lg"><UserIcon size={20}/></div>
                                        <div>
                                            <h2 className="text-[16px] font-black uppercase leading-tight">{selectedPegawai.isNew ? 'Tambah Pegawai' : 'Edit Data Pegawai'}</h2>
                                            <p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Database KP & KGB</p>
                                        </div>
                                    </div>
                                    <button onClick={() => setSelectedPegawai(null)} className="p-3 bg-white rounded-full border border-slate-100 text-slate-400 hover:text-slate-950 transition-all"><X size={20}/></button>
                                </div>
                                <div className="p-6 space-y-6 overflow-y-auto max-h-[75vh]">
                                    {/* SECTION 1: IDENTITAS */}
                                    <div className="bg-slate-50/50 p-5 rounded-2xl border border-slate-100 space-y-4">
                                        <div className="flex items-center gap-2 mb-1">
                                            <div className="p-1.5 bg-slate-800 text-white rounded-lg"><UserIcon size={14}/></div>
                                            <h3 className="text-[10px] font-black uppercase tracking-widest text-slate-700">Identitas Pegawai</h3>
                                        </div>
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-black text-slate-400 uppercase px-1">NIP Pegawai</label>
                                                <div className="relative">
                                                    <input 
                                                        type="text" 
                                                        className="w-full bg-white px-4 py-2.5 rounded-xl font-bold border border-slate-200 focus:border-slate-900 outline-none transition-all text-sm shadow-sm" 
                                                        value={form.nip || ''} 
                                                        list="list-master-nip"
                                                        onChange={e => {
                                                            const val = e.target.value.replace(/\D/g,'');
                                                            let updates = { nip: val };
                                                            if (val.length >= 8) {
                                                                const yyyy = val.substring(0, 4);
                                                                const mm = val.substring(4, 6);
                                                                const dd = val.substring(6, 8);
                                                                const birthDate = `${yyyy}-${mm}-${dd}`;
                                                                const d = new Date(birthDate);
                                                                if (!isNaN(d.getTime())) updates.tanggal_lahir = birthDate;
                                                            }
                                                            setForm(prev => ({...prev, ...updates}));
                                                        }} 
                                                        onBlur={e => handleNipLookup(e.target.value)}
                                                        placeholder="NIP..."
                                                        autoComplete="off"
                                                    />
                                                    <button onClick={() => handleNipLookup(form.nip)} className="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 bg-slate-900 text-white rounded-lg hover:bg-slate-700 transition-all shadow-sm"><Search size={12} /></button>
                                                </div>
                                            </div>
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-black text-slate-400 uppercase px-1">Nama Lengkap</label>
                                                <input type="text" className="w-full bg-white px-4 py-2.5 rounded-xl font-bold uppercase border border-slate-200 focus:border-slate-900 outline-none transition-all text-sm shadow-sm" value={form.nama || ''} onChange={e => setForm({...form, nama: e.target.value.toUpperCase()})} />
                                            </div>
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-black text-slate-400 uppercase px-1">Tgl Lahir</label>
                                                <input type="date" className="w-full bg-white px-4 py-2.5 rounded-xl font-bold border border-slate-200 focus:border-slate-900 outline-none transition-all text-sm shadow-sm" value={form.tanggal_lahir || ''} onChange={e => setForm({...form, tanggal_lahir: e.target.value})} />
                                            </div>
                                        </div>
                                    </div>

                                    {/* SECTION 2: KEPEGAWAIAN (TMT & GAJI) */}
                                    <div className="bg-amber-50/30 p-5 rounded-2xl border border-amber-100 space-y-4">
                                        <div className="flex items-center gap-2 mb-1">
                                            <div className="p-1.5 bg-amber-500 text-white rounded-lg"><Clock size={14}/></div>
                                            <h3 className="text-[10px] font-black uppercase tracking-widest text-amber-700">TMT & Gaji</h3>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-black text-slate-400 uppercase px-1">Pangkat / Golongan</label>
                                                <select className="w-full bg-white px-4 py-2.5 rounded-xl font-bold border border-slate-200 focus:border-amber-600 outline-none transition-all text-sm shadow-sm" value={form.pangkat || ''} onChange={e => setForm({...form, pangkat: e.target.value})}>
                                                    {LIST_GOLONGAN.map(g => <option key={g} value={g}>{g}</option>)}
                                                </select>
                                            </div>
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-black text-slate-400 uppercase px-1">TMT KP</label>
                                                <input type="date" className="w-full bg-white px-4 py-2.5 rounded-xl font-bold border border-slate-200 focus:border-amber-600 outline-none transition-all text-sm shadow-sm" value={form.tmt_pangkat || ''} onChange={e => setForm({...form, tmt_pangkat: e.target.value})} />
                                            </div>
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-black text-slate-400 uppercase px-1">Gaji Pokok</label>
                                                <input type="text" className="w-full bg-white px-4 py-2.5 rounded-xl font-bold border border-slate-200 focus:border-amber-600 outline-none transition-all text-sm shadow-sm" value={formatRibuan(form.gaji_berkala)} onChange={e => setForm({...form, gaji_berkala: parseRibuan(e.target.value)})} />
                                            </div>
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-black text-slate-400 uppercase px-1">TMT KGB</label>
                                                <input type="date" className="w-full bg-white px-4 py-2.5 rounded-xl font-bold border border-slate-200 focus:border-amber-600 outline-none transition-all text-sm shadow-sm" value={form.tmt_gaji || ''} onChange={e => setForm({...form, tmt_gaji: e.target.value})} />
                                            </div>
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-black text-slate-400 uppercase px-1">NPWP</label>
                                                <input type="text" className="w-full bg-white px-4 py-2.5 rounded-xl font-bold border border-slate-200 focus:border-amber-600 outline-none transition-all text-sm shadow-sm" value={form.npwp || ''} onChange={e => setForm({...form, npwp: e.target.value})} />
                                            </div>
                                            <div className="space-y-1.5">
                                                <label className="text-[10px] font-black text-slate-400 uppercase px-1">Rekening Bank</label>
                                                <input type="text" className="w-full bg-white px-4 py-2.5 rounded-xl font-bold border border-slate-200 focus:border-amber-600 outline-none transition-all text-sm shadow-sm" value={form.rek_bank || ''} onChange={e => setForm({...form, rek_bank: e.target.value})} />
                                            </div>
                                        </div>
                                    </div>

                                    {/* SECTION 3: DOKUMEN (BERKAS) */}
                                    <div className="bg-rose-50/30 p-5 rounded-2xl border border-rose-100 space-y-4">
                                        <div className="flex items-center gap-2 mb-1">
                                            <div className="p-1.5 bg-rose-500 text-white rounded-lg"><FileText size={14}/></div>
                                            <h3 className="text-[10px] font-black uppercase tracking-widest text-rose-700">Berkas Pendukung</h3>
                                        </div>
                                        <div className="grid grid-cols-2 gap-4">
                                            <label className="flex items-center gap-3 p-3 bg-white rounded-xl border border-rose-200 hover:border-rose-400 cursor-pointer transition-all shadow-sm">
                                                <div className="p-2 bg-rose-50 rounded-lg">
                                                    {form.ktp_data ? <Check size={16} className="text-rose-600" /> : <Plus size={16} className="text-rose-300" />}
                                                </div>
                                                <span className="text-[10px] font-black uppercase text-slate-500">{form.ktp_data ? 'KTP SIAP' : 'UNGGAH KTP'}</span>
                                                <input type="file" className="hidden" accept="application/pdf" onChange={e => handleFileUpload(e, 'ktp_data')} />
                                            </label>
                                            <label className="flex items-center gap-3 p-3 bg-white rounded-xl border border-indigo-200 hover:border-indigo-400 cursor-pointer transition-all shadow-sm">
                                                <div className="p-2 bg-indigo-50 rounded-lg">
                                                    {form.kk_data ? <Check size={16} className="text-indigo-600" /> : <Plus size={16} className="text-indigo-300" />}
                                                </div>
                                                <span className="text-[10px] font-black uppercase text-slate-500">{form.kk_data ? 'KK SIAP' : 'UNGGAH KK'}</span>
                                                <input type="file" className="hidden" accept="application/pdf" onChange={e => handleFileUpload(e, 'kk_data')} />
                                            </label>
                                        </div>
                                    </div>
                                </div>
                                <div className="p-6 bg-slate-50 border-t flex gap-3">
                                    <button onClick={handleSave} disabled={isProcessing} className="flex-1 bg-slate-900 text-white py-4 rounded-xl font-black uppercase tracking-widest text-[11px] hover:bg-sky-600 transition-all shadow-lg">
                                        {isProcessing ? 'MEMPROSES...' : 'SIMPAN DATA'}
                                    </button>
                                    <button onClick={() => setSelectedPegawai(null)} className="px-6 py-4 bg-white text-slate-500 rounded-xl font-black uppercase tracking-widest text-[10px] border border-slate-200 hover:bg-slate-100 transition-all">
                                        BATAL
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* PIN MODAL */}
                    {pinModal.show && (
                        <div className="fixed inset-0 z-[600] bg-slate-950/90 backdrop-blur-md flex items-center justify-center p-6">
                            <div className="bg-white rounded-[3rem] w-full max-w-sm p-12 text-center space-y-8 shadow-2xl animate-in">
                                <div className="w-20 h-20 bg-slate-950 text-white rounded-3xl flex items-center justify-center mx-auto shadow-xl"><KeyRound size={32} /></div>
                                <div>
                                    <h3 className="text-[16px] font-black uppercase tracking-tight text-slate-950">PIN Otentikasi</h3>
                                    <p className="text-[9px] font-bold text-slate-400 mt-2 uppercase tracking-widest">Masukkan PIN </p>
                                </div>
                                <input type="password" autoFocus maxLength={3} className="w-full text-center text-6xl font-black outline-none bg-slate-50 py-5 rounded-[2rem] tracking-[1.5rem] border-2 border-transparent focus:border-slate-950 shadow-inner" placeholder="···" value={pinInput} onChange={e => handlePinSubmit(e.target.value)} autoComplete="new-password" />
                                <button onClick={() => { setPinModal({show: false}); setPinInput(''); }} className="text-[10px] font-black text-rose-600 uppercase tracking-widest hover:underline">Batal</button>
                            </div>
                        </div>
                    )}

                    {/* SETTINGS MODAL */}
                    {showSettings && (
                        <div className="fixed inset-0 z-[600] bg-slate-950/80 backdrop-blur-xl flex items-center justify-center p-6">
                            <div className="bg-white rounded-[4rem] w-full max-w-2xl p-16 relative shadow-2xl animate-in">
                                <button onClick={() => setShowSettings(false)} className="absolute top-12 right-12 text-slate-300 hover:text-slate-950 transition-all"><X size={32}/></button>
                                <div className="text-center space-y-2 mb-16 text-slate-950">
                                    <h2 className="text-[22px] font-black uppercase tracking-tighter">Manajemen Database</h2>
                                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Ekspor & Restore Data</p>
                                </div>
                                <div className="grid grid-cols-3 gap-6">
                                    <button onClick={() => {
                                        const blob = new Blob([JSON.stringify(listPegawai, null, 2)], {type: 'application/json'});
                                        const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `BACKUP_KP_KGB.json`; a.click();
                                    }} className="p-8 bg-slate-50 rounded-[3rem] border-2 border-slate-100 hover:bg-indigo-50 hover:border-indigo-200 transition-all flex flex-col items-center gap-5 group">
                                        <div className="p-4 bg-indigo-100 text-indigo-600 rounded-2xl group-hover:bg-indigo-600 group-hover:text-white transition-all"><DownloadCloud size={28} /></div>
                                        <span className="text-[9px] font-black uppercase tracking-widest text-center">Ekspor JSON</span>
                                    </button>
                                    <button onClick={() => restoreMergeRef.current.click()} className="p-8 bg-slate-50 rounded-[3rem] border-2 border-slate-100 hover:bg-amber-50 hover:border-amber-200 transition-all flex flex-col items-center gap-5 group">
                                        <div className="p-4 bg-amber-100 text-amber-600 rounded-2xl group-hover:bg-amber-600 group-hover:text-white transition-all"><CopyPlus size={28} /></div>
                                        <span className="text-[9px] font-black uppercase tracking-widest text-center">Impor Gabung</span>
                                        <input type="file" ref={restoreMergeRef} className="hidden" accept=".json" onChange={e => {
                                            const file = e.target.files[0];
                                            const reader = new FileReader();
                                            reader.onload = (ev) => setPinModal({ show: true, type: 'restore_merge', payload: JSON.parse(ev.target.result) });
                                            reader.readAsText(file);
                                        }} />
                                    </button>
                                    <button onClick={() => restoreOverwriteRef.current.click()} className="p-8 bg-slate-50 rounded-[3rem] border-2 border-slate-100 hover:bg-emerald-50 hover:border-emerald-200 transition-all flex flex-col items-center gap-5 group">
                                        <div className="p-4 bg-emerald-100 text-emerald-600 rounded-2xl group-hover:bg-emerald-600 group-hover:text-white transition-all"><Replace size={28} /></div>
                                        <span className="text-[9px] font-black uppercase tracking-widest text-center">Impor Ganti</span>
                                        <input type="file" ref={restoreOverwriteRef} className="hidden" accept=".json" onChange={e => {
                                            const file = e.target.files[0];
                                            const reader = new FileReader();
                                            reader.onload = (ev) => setPinModal({ show: true, type: 'restore_overwrite', payload: JSON.parse(ev.target.result) });
                                            reader.readAsText(file);
                                        }} />
                                    </button>
                                    <button onClick={() => setShowResetConfirm(true)} className="col-span-3 p-8 bg-rose-50 rounded-[3rem] border-2 border-rose-100 hover:bg-rose-600 hover:text-white transition-all flex items-center justify-center gap-6 text-rose-600 group">
                                        <Eraser size={28} />
                                        <span className="text-[12px] font-black uppercase tracking-widest">Bersihkan Seluruh Database</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* PDF PREVIEW MODAL */}
                    {previewImage && (
                        <div className="fixed inset-0 z-[1000] bg-slate-950/95 flex flex-col items-center justify-center p-8 animate-in duration-300">
                            <div className="w-full max-w-6xl flex items-center justify-between mb-6 text-white">
                                <h3 className="font-black uppercase tracking-widest text-[12px]">{previewImage.label}</h3>
                                <div className="flex items-center gap-4">
                                    <a href={previewImage.data} target="_blank" className="px-6 py-3 bg-white/10 hover:bg-white/20 rounded-xl text-[10px] font-black uppercase tracking-widest transition-all">Buka di Tab Baru</a>
                                    <button onClick={() => setPreviewImage(null)} className="p-4 bg-white/10 hover:bg-white/20 rounded-full transition-all"><X size={32}/></button>
                                </div>
                            </div>
                            <div className="w-full max-w-6xl h-full bg-white rounded-2xl overflow-hidden shadow-2xl">
                                <iframe src={previewImage.data} className="w-full h-full border-none"></iframe>
                            </div>
                        </div>
                    )}

                    {/* RESET CONFIRMATION */}
                    {showResetConfirm && (
                        <div className="fixed inset-0 z-[700] bg-rose-600/98 backdrop-blur-3xl flex flex-col items-center justify-center p-6 text-white text-center animate-in">
                            <AlertTriangle size={80} className="mb-8 animate-pulse" />
                            <h3 className="text-4xl font-black uppercase tracking-tighter mb-4">HAPUS TOTAL?</h3>
                            <p className="text-[12px] font-bold text-white/60 mb-10 uppercase tracking-widest">Seluruh data pegawai akan hilang secara permanen!</p>
                            <div className="flex flex-col w-full max-w-sm gap-4">
                                <button onClick={async () => {
                                    await supabaseClient.from('data_kp_kgb').delete().neq('nama', '___EMPTY___');
                                    showNotif("Database dikosongkan");
                                    setShowResetConfirm(false);
                                    setShowSettings(false);
                                    fetchData();
                                }} className="w-full bg-white text-rose-600 py-7 rounded-[2.5rem] font-black uppercase tracking-widest">KONFIRMASI HAPUS</button>
                                <button onClick={() => setShowResetConfirm(false)} className="w-full border-2 border-white/20 py-7 rounded-[2.5rem] font-black uppercase tracking-widest">BATALKAN</button>
                            </div>
                        </div>
                    )}

                    {/* RESTORE LOADING OVERLAY */}
                    {isProcessing && !selectedPegawai && (
                        <div className="fixed inset-0 z-[2000] bg-slate-950/80 backdrop-blur-sm flex flex-col items-center justify-center p-6 text-white text-center animate-in">
                            <div className="w-24 h-24 bg-white/10 rounded-[2rem] flex items-center justify-center mb-6 shadow-2xl border border-white/10">
                                <Loader2 className="animate-spin text-white" size={48} />
                            </div>
                            <h3 className="text-xl font-black uppercase tracking-widest mb-2">PROSES RESTORE...</h3>
                            <p className="text-[10px] font-bold text-white/60 uppercase tracking-[0.3em] animate-pulse">Mohon tunggu sebentar, data sedang diunggah</p>
                            
                            {/* Progress bar visual */}
                            <div className="w-64 h-1.5 bg-white/10 rounded-full mt-8 overflow-hidden relative">
                                <div className="h-full bg-indigo-500 transition-all duration-500" style={{ width: `${restoreProgress}%` }}></div>
                            </div>
                            <div className="mt-4 text-[24px] font-black font-mono text-indigo-400">
                                {restoreProgress}%
                            </div>
                        </div>
                    )}
                    <datalist id="list-master-nip">
                        {masterPegawai.map(p => <option key={p.nip} value={p.nip}>{p.nama}</option>)}
                    </datalist>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
        // Sinyal aktivitas ke induk untuk mencegah logout otomatis
        ['mousedown', 'keypress', 'touchstart'].forEach(evt => {
            document.addEventListener(evt, () => {
                if (window.parent !== window) {
                    window.parent.postMessage('resetSession', '*');
                }
            }, true);
        });
    </script>
</body>
</html>
