<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAPORAN BMD - SIPANDU</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #555; }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.3s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- KONFIGURASI SUPABASE ---
        const SUPABASE_URL = "https://yewkffbatvrbtfliikia.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_gh_LzjznODmbTtMBzt5aaA_sFTDMykg";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- MOCK LUCIDE ICONS (SVG) ---
        const Icon = ({ path, size = 24, className = '', viewBox = "0 0 24 24", strokeWidth = 2 }) => (
            <svg className={className} width={size} height={size} fill="none" viewBox={viewBox} stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round">
                {path}
            </svg>
        );

        const Plus = (props) => <Icon {...props} path={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />;
        const Trash2 = (props) => <Icon {...props} path={<><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>} />;
        const Edit3 = (props) => <Icon {...props} path={<path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>} />;
        const Search = (props) => <Icon {...props} path={<><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>} />;
        const X = (props) => <Icon {...props} path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />;
        const FileDown = (props) => <Icon {...props} path={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>} />;
        const ExternalLink = (props) => <Icon {...props} path={<><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></>} />;
        const AlertCircle = (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></>} />;
        const ShieldCheck = (props) => <Icon {...props} path={<><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></>} />;
        const Lock = (props) => <Icon {...props} path={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>} />;
        const Unlock = (props) => <Icon {...props} path={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 9.9-1"/></>} />;
        const CheckCircle2 = (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></>} />;
        const StickyNote = (props) => <Icon {...props} path={<><path d="M12 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M14 3l7 7"/></>} />;
        const AlertTriangle = (props) => <Icon {...props} path={<><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>} />;
        const FileText = (props) => <Icon {...props} path={<><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></>} />;

        const UNIT_OPTIONS = [
          "PPSDI Raharjo Sragen", 
          "RPSLU Mojomulyo Sragen", 
          "RPSLU Pamardi Siwi Sragen", 
          "RPS PMKS Gondang"
        ];

        const PERIODE_OPTIONS = [
          "SEMESTER I", "SEMESTER II"
        ];

        const JENIS_LAPORAN_OPTIONS = [
          "KIB A (Tanah)", 
          "KIB B (Peralatan & Mesin)", 
          "KIB C (Gedung & Bangunan)", 
          "KIB D (Jalan, Irigasi & Jaringan)", 
          "KIB E (Aset Tetap Lainnya)", 
          "KIB F (Konstruksi Dalam Pengerjaan)",
        ];

        function App() {
          const [reports, setReports] = useState([]);
          const [loading, setLoading] = useState(true);
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [searchTerm, setSearchTerm] = useState('');
          const [uploading, setUploading] = useState(false);
          const [editingId, setEditingId] = useState(null);
          const [notification, setNotification] = useState(null);
          const [viewNote, setViewNote] = useState(null);

          // State Filter
          const [filters, setFilters] = useState({
            unit: 'all',
            dokumen: 'all',
            tahun: 'all',
            semester: 'all'
          });
          
          // Fitur Saran Nama Pelapor
          const [pelaporSuggestions, setPelaporSuggestions] = useState({ show: false, list: [] });
          const pelaporRef = useRef(null);

          // Security & Pin System States
          const [pinInput, setPinInput] = useState('');
          const [securityModal, setSecurityModal] = useState({
            show: false,
            targetId: null,
            type: null, // 'lock', 'unlock', 'delete'
            currentLockStatus: false
          });

          const initialFormState = {
            jenisLaporan: JENIS_LAPORAN_OPTIONS[0],
            subKategori: PERIODE_OPTIONS[0],
            unitKerja: UNIT_OPTIONS[0],
            tahun: new Date().getFullYear().toString(),
            pelapor: '',
            catatan: '',
            externalLink: '', 
            pdfData: '', 
            pdfName: '',
            isLocked: false 
          };
          
          const [formData, setFormData] = useState(initialFormState);

          const fetchReports = async () => {
            try {
              const { data, error } = await supabaseClient
                .from('bmd_reports')
                .select('*')
                .order('created_at', { ascending: false });
              
              if (error) throw error;
              
              // Map database fields to state fields
              const mappedData = data.map(item => ({
                id: item.id,
                unitKerja: item.unit_kerja,
                jenisLaporan: item.jenis_laporan,
                subKategori: item.periode,
                tahun: item.tahun,
                pelapor: item.pelapor,
                catatan: item.catatan,
                externalLink: item.external_link,
                pdfData: item.pdf_data,
                pdfName: item.pdf_name,
                isLocked: item.is_locked,
                lockedAt: item.locked_at,
                createdAt: new Date(item.created_at).getTime()
              }));
              
              setReports(mappedData);
              setLoading(false);
            } catch (error) {
              console.error("Supabase Error:", error);
              setLoading(false);
            }
          };

          useEffect(() => {
            fetchReports();
            
            // Realtime subscription
            const subscription = supabaseClient
              .channel('bmd_changes')
              .on('postgres_changes', { event: '*', schema: 'public', table: 'bmd_reports' }, () => {
                fetchReports();
              })
              .subscribe();

            return () => {
              supabaseClient.removeChannel(subscription);
            };
          }, []);

          const showToast = (message, type = 'success') => {
            setNotification({ message, type });
            setTimeout(() => setNotification(null), 3000);
          };

          const handleFileChange = (e) => {
            const file = e.target.files[0];
            if (!file) return;
            if (file.type !== 'application/pdf') {
              showToast("Hanya PDF diperbolehkan", "error");
              return;
            }
            setUploading(true);
            const reader = new FileReader();
            reader.onload = (event) => {
              setFormData(prev => ({ ...prev, pdfData: event.target.result, pdfName: file.name }));
              setUploading(false);
            };
            reader.readAsDataURL(file);
          };

          const handleEdit = (report) => {
            if (report.isLocked) {
              showToast("Data terkunci. Buka kunci terlebih dahulu.", "error");
              return;
            }
            setFormData(report);
            setEditingId(report.id);
            setIsModalOpen(true);
          };

          const openSecurityCheck = (id, type, currentLockStatus = false) => {
            setSecurityModal({
              show: true,
              targetId: id,
              type: type,
              currentLockStatus: currentLockStatus
            });
            setPinInput('');
          };

          const handleSecurityConfirm = async () => {
            if (pinInput !== '888') {
              showToast("PIN Salah!", "error");
              setPinInput('');
              return;
            }

            const { targetId, type, currentLockStatus } = securityModal;

            try {
              if (type === 'delete') {
                const { error } = await supabaseClient
                  .from('bmd_reports')
                  .delete()
                  .eq('id', targetId);
                if (error) throw error;
                showToast("Data Berhasil Dihapus Permanen", "success");
              } else if (type === 'lock_toggle') {
                const { error } = await supabaseClient
                  .from('bmd_reports')
                  .update({
                    is_locked: !currentLockStatus
                  })
                  .eq('id', targetId);
                if (error) throw error;
                showToast(currentLockStatus ? "Kunci Dibuka" : "Data Dikunci", "success");
                setTimeout(() => fetchReports(), 500);
              }
              
              setSecurityModal({ show: false, targetId: null, type: null, currentLockStatus: false });
            } catch (err) {
              showToast("Proses Gagal: " + err.message, "error");
            }
          };

          const handleSubmit = async (e) => {
            e.preventDefault();

            if (!formData.externalLink.trim() && !formData.pdfData) {
              showToast("Gagal: Link Drive atau File PDF wajib diisi salah satu!", "error");
              return;
            }

            if (!formData.pelapor.trim()) {
              showToast("Nama Pelapor wajib diisi", "error");
              return;
            }

            try {
              const payload = {
                unit_kerja: formData.unitKerja,
                jenis_laporan: formData.jenisLaporan,
                periode: formData.subKategori,
                tahun: parseInt(formData.tahun) || new Date().getFullYear(),
                pelapor: formData.pelapor,
                catatan: formData.catatan,
                external_link: formData.externalLink,
                pdf_data: formData.pdfData,
                pdf_name: formData.pdfName,
                is_locked: !!formData.isLocked
              };
              
              let result;
              if (editingId) {
                result = await supabaseClient
                  .from('bmd_reports')
                  .update(payload)
                  .eq('id', editingId);
              } else {
                result = await supabaseClient
                  .from('bmd_reports')
                  .insert([payload]);
              }

              if (result.error) throw result.error;

              showToast(editingId ? "Perubahan Disimpan" : "Data Baru Ditambahkan", "success");
              setIsModalOpen(false);
              setEditingId(null);
              setFormData(initialFormState);
              fetchReports();
            } catch (error) { 
              console.error("Database Error:", error);
              // Tampilkan pesan yang lebih membantu untuk RLS
              const errorMsg = error.message && error.message.includes('row-level security') 
                ? "Izin Simpan Ditolak (RLS). Pastikan Policy 'Enable Insert for Anon' sudah diaktifkan di Supabase Dashboard."
                : (error.details || error.message || "Kesalahan Database");
              showToast("Gagal: " + errorMsg, "error");
            }
          };

          const filteredReports = useMemo(() => {
            return reports.filter(r => {
              const matchSearch = Object.values(r).some(val => String(val).toLowerCase().includes(searchTerm.toLowerCase()));
              const matchUnit = filters.unit === 'all' || r.unitKerja === filters.unit;
              const matchDokumen = filters.dokumen === 'all' || r.jenisLaporan === filters.dokumen;
              const matchTahun = filters.tahun === 'all' || String(r.tahun) === filters.tahun;
              const matchSemester = filters.semester === 'all' || r.subKategori === filters.semester;
              
              return matchSearch && matchUnit && matchDokumen && matchTahun && matchSemester;
            });
          }, [reports, searchTerm, filters]);

          const resetFilters = () => {
            setFilters({
              unit: 'all',
              dokumen: 'all',
              tahun: 'all',
              semester: 'all'
            });
            setSearchTerm('');
          };

          // Ambil daftar tahun unik untuk filter
          const uniqueYears = useMemo(() => {
            const years = reports.map(r => String(r.tahun)).filter(y => y && y !== 'null');
            return [...new Set(years)].sort((a, b) => b - a);
          }, [reports]);

          // Ambil daftar nama pelapor unik dari data yang sudah ada
          const uniquePelaporList = useMemo(() => {
            const names = reports.map(r => (r.pelapor || '').toUpperCase().trim()).filter(n => n.length > 0);
            return [...new Set(names)].sort();
          }, [reports]);

          const handlePelaporChange = (val) => {
            const upperVal = val.toUpperCase();
            setFormData({ ...formData, pelapor: upperVal });
            
            if (upperVal.trim().length > 0) {
              const filtered = uniquePelaporList.filter(name => 
                name.includes(upperVal) && name !== upperVal
              );
              setPelaporSuggestions({ show: filtered.length > 0, list: filtered });
            } else {
              setPelaporSuggestions({ show: false, list: [] });
            }
          };

          const selectPelapor = (name) => {
            setFormData({ ...formData, pelapor: name });
            setPelaporSuggestions({ show: false, list: [] });
          };

          // Tutup dropdown jika klik di luar
          useEffect(() => {
            const handleClickOutside = (e) => {
              if (pelaporRef.current && !pelaporRef.current.contains(e.target)) {
                setPelaporSuggestions({ show: false, list: [] });
              }
            };
            document.addEventListener('mousedown', handleClickOutside);
            return () => document.removeEventListener('mousedown', handleClickOutside);
          }, []);

          return (
            <div className="min-h-screen bg-slate-50 text-slate-900 font-sans text-[11px]">
              {/* Toast Notifikasi */}
              {notification && (
                <div className={`fixed top-6 left-1/2 -translate-x-1/2 z-[100] px-4 py-3 rounded-xl shadow-xl flex items-center gap-2 border animate-in slide-in-from-top-4 ${
                  notification.type === 'success' ? 'bg-emerald-600 border-emerald-500 text-white' : 'bg-rose-600 border-rose-500 text-white'
                }`}>
                  {notification.type === 'success' ? <CheckCircle2 size={16} /> : <AlertCircle size={16} />}
                  <span className="font-bold uppercase tracking-tight">{notification.message}</span>
                </div>
              )}

              {/* Header */}
              <nav className="bg-white border-b border-slate-200 sticky top-0 z-40 px-4 py-3 shadow-sm">
                <div className="max-w-7xl mx-auto flex items-center justify-between">
                  <div className="flex items-center gap-2">
                    <div className="bg-blue-600 p-1.5 rounded-lg">
                      <ShieldCheck size={18} className="text-white" />
                    </div>
                    <div className="hidden sm:block">
                      <h1 className="font-black text-slate-800 uppercase leading-none tracking-tight">LAPORAN BMD</h1>
                      <p className="text-[8px] font-bold text-slate-400 uppercase tracking-widest mt-0.5">Laporan Aset Barang Milik Daerah</p>
                    </div>
                  </div>
                  
                  <div className="flex items-center gap-3">
                    <div className="relative w-48 lg:w-64">
                      <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400" size={14} />
                      <input 
                        type="text" placeholder="Cari arsip BMD..."
                        className="w-full pl-9 pr-3 py-1.5 bg-slate-100 border-none rounded-lg outline-none font-medium"
                        value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)}
                      />
                    </div>
                    <button 
                      onClick={() => { setEditingId(null); setFormData(initialFormState); setIsModalOpen(true); }}
                      className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-lg font-black flex items-center gap-1.5 shadow-md uppercase transition-all active:scale-95"
                    >
                      <Plus size={14} strokeWidth={3} /> INPUT LAPORAN BMD
                    </button>
                  </div>
                </div>
              </nav>

              <main className="max-w-7xl mx-auto p-4">
                {/* Filter Bar */}
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-4 mb-4 animate-in">
                  <div className="flex flex-wrap items-end gap-3">
                    <div className="flex-1 min-w-[150px] space-y-1">
                      <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Unit Kerja</label>
                      <select 
                        className="w-full px-3 py-2 bg-slate-50 border border-slate-100 rounded-xl font-bold text-slate-700 outline-none focus:bg-white focus:ring-2 focus:ring-blue-500/10 transition-all appearance-none"
                        value={filters.unit}
                        onChange={(e) => setFilters({...filters, unit: e.target.value})}
                      >
                        <option value="all">SEMUA UNIT</option>
                        {UNIT_OPTIONS.map(opt => <option key={opt} value={opt}>{opt.toUpperCase()}</option>)}
                      </select>
                    </div>
                    
                    <div className="flex-1 min-w-[150px] space-y-1">
                      <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Jenis Dokumen</label>
                      <select 
                        className="w-full px-3 py-2 bg-slate-50 border border-slate-100 rounded-xl font-bold text-slate-700 outline-none focus:bg-white focus:ring-2 focus:ring-blue-500/10 transition-all appearance-none"
                        value={filters.dokumen}
                        onChange={(e) => setFilters({...filters, dokumen: e.target.value})}
                      >
                        <option value="all">SEMUA DOKUMEN</option>
                        {JENIS_LAPORAN_OPTIONS.map(opt => <option key={opt} value={opt}>{opt.toUpperCase()}</option>)}
                      </select>
                    </div>

                    <div className="w-24 space-y-1">
                      <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Tahun</label>
                      <select 
                        className="w-full px-3 py-2 bg-slate-50 border border-slate-100 rounded-xl font-bold text-slate-700 outline-none focus:bg-white focus:ring-2 focus:ring-blue-500/10 transition-all appearance-none"
                        value={filters.tahun}
                        onChange={(e) => setFilters({...filters, tahun: e.target.value})}
                      >
                        <option value="all">SEMUA</option>
                        {uniqueYears.map(year => <option key={year} value={year}>{year}</option>)}
                      </select>
                    </div>

                    <div className="w-32 space-y-1">
                      <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest ml-1">Semester</label>
                      <select 
                        className="w-full px-3 py-2 bg-slate-50 border border-slate-100 rounded-xl font-bold text-slate-700 outline-none focus:bg-white focus:ring-2 focus:ring-blue-500/10 transition-all appearance-none"
                        value={filters.semester}
                        onChange={(e) => setFilters({...filters, semester: e.target.value})}
                      >
                        <option value="all">SEMUA</option>
                        {PERIODE_OPTIONS.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                      </select>
                    </div>

                    <button 
                      onClick={resetFilters}
                      className="px-4 py-2 bg-slate-100 hover:bg-slate-200 text-slate-500 rounded-xl font-black uppercase text-[9px] transition-all flex items-center gap-2"
                    >
                      <X size={14} strokeWidth={3} /> RESET
                    </button>
                    
                    <div className="ml-auto pl-4 border-l border-slate-100 flex flex-col items-end">
                      <span className="text-[18px] font-black text-blue-600 leading-none">{filteredReports.length}</span>
                      <span className="text-[8px] font-black text-slate-400 uppercase tracking-widest mt-1">Total Baris</span>
                    </div>
                  </div>
                </div>

                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                  <div className="overflow-x-auto">
                    <table className="w-full text-left border-collapse table-fixed min-w-[950px]">
                      <thead className="bg-slate-50 text-[9px] font-black uppercase text-slate-400 tracking-widest border-b border-slate-200">
                        <tr>
                          <th className="px-4 py-3 w-[18%]">Unit Kerja</th>
                          <th className="px-4 py-3 w-[20%]">Dokumen / Periode</th>
                          <th className="px-4 py-3 w-[15%]">Catatan</th>
                          <th className="px-4 py-3 w-[7%] text-center">Tahun</th>
                          <th className="px-4 py-3 w-[12%]">Petugas</th>
                          <th className="px-4 py-3 w-[13%] text-center">Akses Berkas</th>
                          <th className="px-4 py-3 w-[15%] text-right bg-slate-100/50">Keamanan & Opsi</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100">
                        {loading ? (
                          <tr><td colSpan="7" className="p-16 text-center text-slate-300 font-black uppercase tracking-widest animate-pulse">Sinkronisasi Server BMD...</td></tr>
                        ) : filteredReports.length === 0 ? (
                          <tr><td colSpan="7" className="p-16 text-center text-slate-300 font-bold">DATA BMD TIDAK DITEMUKAN</td></tr>
                        ) : filteredReports.map((report) => (
                          <tr key={report.id} className={`transition-colors ${report.isLocked ? 'bg-slate-50/50' : 'hover:bg-slate-50/30'}`}>
                            <td className="px-4 py-4">
                              <div className="font-bold text-slate-800 uppercase leading-tight">{report.unitKerja}</div>
                            </td>
                            <td className="px-4 py-4">
                              <div className="font-black text-blue-700 uppercase leading-none">{report.jenisLaporan}</div>
                              <div className="mt-1 text-[9px] font-bold text-slate-400 uppercase tracking-wider">{report.subKategori}</div>
                            </td>
                            <td className="px-4 py-4">
                              <div className="flex items-start gap-2">
                                <button 
                                  onClick={() => setViewNote(report.catatan || "Tidak ada catatan.")}
                                  className="mt-0.5 p-1 bg-slate-100 text-slate-500 hover:text-blue-600 hover:bg-blue-50 rounded transition-colors flex-shrink-0"
                                >
                                  <FileText size={12} />
                                </button>
                                <div className="text-slate-500 italic line-clamp-2 leading-relaxed">{report.catatan || "-"}</div>
                              </div>
                            </td>
                            <td className="px-4 py-4 text-center font-mono font-bold text-slate-500">{report.tahun}</td>
                            <td className="px-4 py-4">
                               <span className="font-bold text-slate-600 uppercase text-[9px] bg-slate-100 px-2 py-0.5 rounded-md">{report.pelapor}</span>
                            </td>
                            <td className="px-4 py-4 text-center">
                              <div className="flex justify-center gap-1.5">
                                {report.pdfData && (
                                  <button onClick={() => {
                                    const win = window.open();
                                    win.document.write(`<iframe src="${report.pdfData}" frameborder="0" style="width:100%; height:100vh;"></iframe>`);
                                  }} className="p-1.5 bg-blue-50 text-blue-600 rounded-md border border-blue-100 flex items-center gap-1">
                                    <FileDown size={14} /> <span className="text-[8px] font-black uppercase">PDF</span>
                                  </button>
                                )}
                                {report.externalLink && (
                                  <button onClick={() => window.open(report.externalLink, '_blank')} className="p-1.5 bg-emerald-50 text-emerald-600 rounded-md border border-emerald-100 flex items-center gap-1">
                                    <ExternalLink size={14} /> <span className="text-[8px] font-black uppercase">LINK</span>
                                  </button>
                                )}
                              </div>
                            </td>
                            <td className="px-4 py-4 text-right bg-slate-100/30">
                              <div className="flex justify-end items-center gap-1">
                                {report.isLocked ? (
                                  <>
                                    <div className="flex items-center gap-1.5 px-2 py-1 bg-white rounded-lg border border-slate-200 shadow-sm mr-1">
                                      <Lock size={12} className="text-rose-500" />
                                      <span className="text-[8px] font-black text-slate-400 uppercase tracking-tighter">DIKUNCI</span>
                                    </div>
                                    <button onClick={() => openSecurityCheck(report.id, 'lock_toggle', true)} className="p-2 text-rose-300 hover:text-blue-600 transition-colors">
                                       <Lock size={15} />
                                    </button>
                                    <button onClick={() => openSecurityCheck(report.id, 'delete')} className="p-2 text-rose-200 hover:text-rose-600 transition-colors">
                                       <Trash2 size={15} />
                                    </button>
                                  </>
                                ) : (
                                  <>
                                    <button onClick={() => handleEdit(report)} className="p-2 text-slate-400 hover:text-blue-600 hover:bg-white rounded-lg transition-all">
                                      <Edit3 size={15}/>
                                    </button>
                                    <button onClick={() => openSecurityCheck(report.id, 'delete')} className="p-2 text-slate-400 hover:text-rose-600 hover:bg-white rounded-lg transition-all">
                                      <Trash2 size={15}/>
                                    </button>
                                    <div className="w-px h-4 bg-slate-200 mx-1"></div>
                                    <button onClick={() => openSecurityCheck(report.id, 'lock_toggle', false)} className="p-2 text-slate-400 hover:text-emerald-600 hover:bg-emerald-50 rounded-lg transition-all">
                                      <Unlock size={15}/>
                                    </button>
                                  </>
                                )}
                              </div>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  </div>
                </div>
              </main>

              {/* DETAIL NOTE MODAL */}
              {viewNote && (
                <div className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4">
                  <div className="bg-white rounded-2xl p-6 max-w-md w-full shadow-2xl border border-slate-100 animate-in zoom-in-95">
                    <div className="flex justify-between items-center mb-4">
                      <div className="flex items-center gap-2">
                        <FileText className="text-blue-600" size={18} />
                        <h3 className="font-black text-slate-800 uppercase tracking-tight text-xs">Detail Catatan BMD</h3>
                      </div>
                      <button onClick={() => setViewNote(null)} className="text-slate-400 hover:text-rose-500 transition-colors">
                        <X size={18} />
                      </button>
                    </div>
                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100">
                      <p className="text-slate-600 leading-relaxed font-medium whitespace-pre-wrap text-[11px]">{viewNote}</p>
                    </div>
                    <button 
                      onClick={() => setViewNote(null)}
                      className="mt-5 w-full bg-slate-100 hover:bg-slate-200 text-slate-500 font-black uppercase py-2.5 rounded-xl transition-colors"
                    >
                      Tutup
                    </button>
                  </div>
                </div>
              )}

              {/* SECURITY MODAL (PIN CHECK) */}
              {securityModal.show && (
                <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/60 backdrop-blur-md p-4">
                  <div className="bg-white rounded-2xl p-6 max-w-[320px] w-full shadow-2xl border border-white animate-in zoom-in-95 duration-200">
                    <div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-5 border-4 ${
                      securityModal.type === 'delete' ? 'bg-rose-50 text-rose-600 border-rose-100' : 
                      securityModal.currentLockStatus ? 'bg-blue-50 text-blue-600 border-blue-100' : 'bg-emerald-50 text-emerald-600 border-emerald-100'
                    }`}>
                      {securityModal.type === 'delete' ? <AlertTriangle size={32} /> : 
                       securityModal.currentLockStatus ? <Unlock size={32} /> : <ShieldCheck size={32} />}
                    </div>
                    
                    <h3 className="font-black text-slate-800 uppercase tracking-tight text-center text-sm mb-1">
                      {securityModal.type === 'delete' ? 'Hapus Data BMD Permanen?' : 
                       securityModal.currentLockStatus ? 'Buka Kunci Data?' : 'Kunci Data Final?'}
                    </h3>
                    <p className="text-[10px] text-slate-400 font-bold uppercase text-center mb-6 leading-tight">
                      Masukkan PIN.
                    </p>

                    <input 
                      type="password" maxLength="3" autoFocus placeholder="PIN"
                      className="w-full text-center text-4xl font-black py-3 bg-slate-50 border-2 border-slate-100 rounded-2xl outline-none focus:border-blue-500 focus:bg-white mb-6 tracking-[0.6em] transition-all"
                      value={pinInput} onChange={(e) => setPinInput(e.target.value)}
                      onKeyDown={(e) => e.key === 'Enter' && handleSecurityConfirm()}
                    />

                    <div className="flex gap-3">
                      <button 
                        onClick={() => setSecurityModal({ show: false, targetId: null, type: null, currentLockStatus: false })} 
                        className="flex-1 font-black text-slate-400 uppercase py-3 rounded-xl border border-slate-100 hover:bg-slate-50 transition-colors"
                      >
                        Batal
                      </button>
                      <button 
                        onClick={handleSecurityConfirm} 
                        className={`flex-1 py-3 text-white rounded-xl font-black uppercase shadow-lg shadow-blue-100 transition-all active:scale-95 ${
                          securityModal.type === 'delete' ? 'bg-rose-600 hover:bg-rose-700' : 
                          securityModal.currentLockStatus ? 'bg-blue-600 hover:bg-blue-700' : 'bg-emerald-600 hover:bg-emerald-700'
                        }`}
                      >
                        Konfirmasi
                      </button>
                    </div>
                  </div>
                </div>
              )}

              {/* FORM MODAL (ADD/EDIT) */}
              {isModalOpen && (
                <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/30 backdrop-blur-sm p-4 overflow-y-auto">
                  <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg my-auto border border-slate-100 animate-in slide-in-from-bottom-4">
                    <div className="px-6 py-4 bg-slate-50 border-b border-slate-100 flex justify-between items-center">
                      <div className="flex items-center gap-3">
                        <div className="w-8 h-8 bg-blue-600 text-white rounded-lg flex items-center justify-center shadow-md">
                          {editingId ? <Edit3 size={16}/> : <Plus size={16}/>}
                        </div>
                        <h2 className="font-black text-slate-800 uppercase tracking-tight">
                          {editingId ? 'Edit Laporan BMD' : 'Input Laporan BMD'}
                        </h2>
                      </div>
                      <button onClick={() => setIsModalOpen(false)} className="text-slate-400 hover:text-rose-500"><X size={20}/></button>
                    </div>
                    
                    <form onSubmit={handleSubmit} className="p-6 space-y-4">
                      <div className="grid grid-cols-2 gap-4">
                        <div className="col-span-2 space-y-1">
                          <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Unit Kerja </label>
                          <select className="w-full px-3 py-2 rounded-lg border border-slate-200 bg-white font-bold text-slate-700 outline-none focus:border-blue-500 appearance-none" value={formData.unitKerja} onChange={(e) => setFormData({...formData, unitKerja: e.target.value})}>
                            {UNIT_OPTIONS.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                          </select>
                        </div>
                        <div className="space-y-1">
                          <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Jenis Laporan / KIB</label>
                          <select className="w-full px-3 py-2 rounded-lg border border-slate-200 bg-white font-bold text-slate-700 outline-none focus:border-blue-500 appearance-none" value={formData.jenisLaporan} onChange={(e) => setFormData({...formData, jenisLaporan: e.target.value})}>
                            {JENIS_LAPORAN_OPTIONS.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                          </select>
                        </div>
                        <div className="space-y-1">
                          <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Periode</label>
                          <select className="w-full px-3 py-2 rounded-lg border border-slate-200 bg-white font-bold text-slate-700 outline-none focus:border-blue-500 appearance-none" value={formData.subKategori} onChange={(e) => setFormData({...formData, subKategori: e.target.value})}>
                            {PERIODE_OPTIONS.map(opt => <option key={opt} value={opt}>{opt}</option>)}
                          </select>
                        </div>
                        <div className="space-y-1">
                          <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Tahun</label>
                          <input type="number" className="w-full px-3 py-2 rounded-lg border border-slate-200 font-bold outline-none focus:border-blue-500" value={formData.tahun} onChange={(e) => setFormData({...formData, tahun: e.target.value})}/>
                        </div>
                        <div className="space-y-1 relative" ref={pelaporRef}>
                          <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Nama Pelapor *</label>
                          <input 
                            type="text" 
                            placeholder="Nama Lengkap" 
                            className="w-full px-3 py-2 rounded-lg border border-slate-200 font-bold outline-none focus:border-blue-500 uppercase" 
                            value={formData.pelapor} 
                            onChange={(e) => handlePelaporChange(e.target.value)}
                            onFocus={(e) => handlePelaporChange(e.target.value)}
                          />
                          {pelaporSuggestions.show && (
                            <div className="absolute z-[100] w-full mt-1 bg-white border border-slate-200 rounded-xl shadow-2xl max-h-40 overflow-y-auto animate-in fade-in zoom-in-95 duration-100">
                              {pelaporSuggestions.list.map((name, i) => (
                                <button
                                  key={i}
                                  type="button"
                                  onClick={() => selectPelapor(name)}
                                  className="w-full px-4 py-2.5 text-left hover:bg-blue-50 text-[10px] font-bold text-slate-700 uppercase border-b border-slate-50 last:border-none transition-colors"
                                >
                                  {name}
                                </button>
                              ))}
                            </div>
                          )}
                        </div>

                        <div className="col-span-2 space-y-1">
                          <label className="text-[9px] font-black text-slate-400 uppercase tracking-widest">Catatan</label>
                          <div className="relative">
                            <StickyNote size={14} className="absolute left-3 top-3 text-slate-300" />
                            <textarea 
                              placeholder="..." 
                              className="w-full pl-9 pr-3 py-2 rounded-lg border border-slate-200 font-medium outline-none focus:border-blue-500 min-h-[60px] resize-none" 
                              value={formData.catatan} 
                              onChange={(e) => setFormData({...formData, catatan: e.target.value})}
                            />
                          </div>
                        </div>
                      </div>

                      <div className="p-4 bg-blue-50/50 rounded-xl border border-blue-100 space-y-3">
                        <div className="text-[8px] font-black text-blue-600 uppercase tracking-widest leading-normal flex items-center gap-2">
                          <AlertCircle size={12} />
                          WAJIB ISI SALAH SATU: LINK DRIVE ATAU FILE PDF 
                        </div>
                        <input 
                          type="url" 
                          placeholder="Link Google Drive / Spreadsheet (https://...) " 
                          className="w-full px-3 py-2 bg-white border border-slate-200 rounded-lg outline-none focus:border-blue-500 font-medium text-[10px]" 
                          value={formData.externalLink} 
                          onChange={(e) => setFormData({...formData, externalLink: e.target.value})}
                        />
                        <div className="relative h-10">
                          <input type="file" accept=".pdf" onChange={handleFileChange} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-10" />
                          <div className={`h-full border-2 border-dashed rounded-lg flex items-center justify-center gap-2 transition-colors ${formData.pdfData ? 'bg-emerald-50 border-emerald-200' : 'bg-white border-slate-200'}`}>
                            {formData.pdfData ? <CheckCircle2 size={14} className="text-emerald-500" /> : <FileDown size={14} className="text-blue-500" />}
                            <span className={`text-[8px] font-black uppercase truncate px-4 ${formData.pdfData ? 'text-emerald-600' : 'text-slate-400'}`}>
                              {formData.pdfName || 'Klik Unggah Scan PDF KIB (Max 3 Mb)'}
                            </span>
                          </div>
                        </div>
                      </div>

                      <div className="flex gap-3 pt-2">
                        <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 font-bold text-slate-400 uppercase py-3 hover:text-rose-500 transition-colors">Batal</button>
                        <button type="submit" className="flex-1 py-3 bg-blue-600 text-white font-black uppercase rounded-xl hover:bg-blue-700 transition-all shadow-lg shadow-blue-100 active:scale-95">
                          {editingId ? 'Simpan Perubahan' : 'SIMPAN DATA BMD'}
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              )}
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
