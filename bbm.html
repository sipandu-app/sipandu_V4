        const Settings = (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1-2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></>} />;

        const History = (props) => <Icon {...props} path={<><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></>} />;
        const ClipboardCheck = (props) => <Icon {...props} path={<><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><path d="m9 14 2 2 4-4"/></>} />;
        const X = (props) => <Icon {...props} path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />;
        const FileSpreadsheet = (props) => <Icon {...props} path={<><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></>} />;
        const Download = (props) => <Icon {...props} path={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>} />;

        const BarChart3 = (props) => <Icon {...props} path={<><path d="M3 3v18h18"/><path d="M18 17V9"/><path d="M13 17V5"/><path d="M8 17v-3"/></>} />;
        const Wallet = (props) => <Icon {...props} path={<><path d="M20 12V8H6a2 2 0 0 1-2-2c0-1.1.9-2 2-2h12v4"/><path d="M4 6v12c0 1.1.9 2 2 2h14v-4"/><rect x="14" y="11" width="6" height="6" rx="2"/></>} />;
        const Layers = (props) => <Icon {...props} path={<><polygon points="12 2 2 7 12 12 22 7 12 2"/><polygon points="2 12 12 17 22 12"/><polygon points="2 17 12 22 22 17"/></>} />;
        const CheckSquare = (props) => <Icon {...props} path={<><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></>} />;
        const ChevronRight = (props) => <Icon {...props} path={<polyline points="9 18 15 12 9 6"/>} />;
        const ChevronLeft = (props) => <Icon {...props} path={<polyline points="15 18 9 12 15 6"/>} />;
        const Droplets = (props) => <Icon {...props} path={<><path d="M7 16.3c2.2 0 4-1.8 4-4 0-3.3-4.5-8-4.5-8S2 8.7 2 12.3c0 2.2 1.8 4 4 4z"/><path d="M17.5 22c2.5 0 4.5-2 4.5-4.5 0-3.7-5-9-5-9s-5 5.3-5 9c0 2.5 2 4.5 4.5 4.5z"/></>} />;
        const Clock = (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} />;
        const Hash = (props) => <Icon {...props} path={<><line x1="4" y1="9" x2="20" y2="9"/><line x1="4" y1="15" x2="20" y2="15"/><line x1="10" y1="3" x2="8" y2="21"/><line x1="16" y1="3" x2="14" y2="21"/></>} />;
        const Activity = (props) => <Icon {...props} path={<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>} />;
        const MapPin = (props) => <Icon {...props} path={<><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></>} />;
        const Tag = (props) => <Icon {...props} path={<><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></>} />;
        const SaveIcon = (props) => <Icon {...props} path={<><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"/><polyline points="17 21 17 13 7 13 7 21"/><polyline points="7 3 7 8 15 8"/></>} />;
        const User = (props) => <Icon {...props} path={<><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></>} />;
        const RotateCcw = (props) => <Icon {...props} path={<><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></>} />;
        const Filter = (props) => <Icon {...props} path={<polygon points="22 3 2 3 10 12.46 10 19 14 21 14 12.46 22 3"/>} />;
        const Calendar = (props) => <Icon {...props} path={<><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></>} />;

        // --- UTILS ---
        const formatToRupiah = (value) => {
            if (value === null || value === undefined || isNaN(value)) return "0";
            return value.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ".");
        };

        const formatDateTimeIndo = (dateTimeStr) => {
            if (!dateTimeStr) return "-";
            try {
                const date = new Date(dateTimeStr);
                return date.toLocaleDateString('id-ID', { 
                    day: '2-digit', 
                    month: '2-digit', 
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                }).replace(/\./g, ':');
            } catch (e) {
                return dateTimeStr;
            }
        };

        const splitDateTime = (dateTimeStr) => {
            if (!dateTimeStr) return { date: "-", time: "-" };
            try {
                const d = new Date(dateTimeStr);
                const datePart = d.toLocaleDateString('id-ID', { day: '2-digit', month: '2-digit', year: 'numeric' });
                const timePart = d.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }).replace(/\./g, ':');
                return { date: datePart, time: timePart };
            } catch (e) {
                return { date: dateTimeStr, time: "-" };
            }
        };

        // --- MAIN APP ---
        function App() {
            const [activeTab, setActiveTab] = useState('history'); 
            const [loading, setLoading] = useState(true);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [notification, setNotification] = useState({ show: false, message: '', type: 'success' });
            
            const [vouchers, setVouchers] = useState([]);
            const [quotaLogs, setQuotaLogs] = useState([]);
            const [pegawaiList, setPegawaiList] = useState([]);
            const [editId, setEditId] = useState(null);
            const [editQuotaId, setEditQuotaId] = useState(null);
            
            const [pinModal, setPinModal] = useState({ show: false, type: '', dataId: null, targetColl: '', extra: null });
            const [pinInput, setPinInput] = useState('');
            
            const [detailModal, setDetailModal] = useState({ show: false, voucher: null });
            
            const [detailForm, setDetailForm] = useState({
                waktuRealisasi: '', 
                spbu: '', 
                noStruk: '', 
                noPompa: '', 
                jenisBbm: 'Pertalite', 
                noKendaraan: '', 
                hargaBbm: 10000, 
                totalLiter: 0
            });
            
            const [searchTerm, setSearchTerm] = useState('');
            const [filterUnit, setFilterUnit] = useState('Semua');
            const [startDate, setStartDate] = useState('');
            const [endDate, setEndDate] = useState('');
            const [currentPage, setCurrentPage] = useState(1);

            const fileInputRef = useRef(null);

            const unitOptions = ["Tata Usaha", "Resos Disabilitas", "Resos Lanjut Usia", "Resos Anak", "Resos PMKS"];
            const nilaiVoucherOptions = [25000, 50000, 100000];
            const bbmOptions = Object.keys(HARGA_BBM_REF);

            const savedSPBUs = useMemo(() => {
                const spbus = vouchers.map(v => v.usage_details?.spbu).filter(Boolean);
                return [...new Set(spbus)].sort();
            }, [vouchers]);

            const savedPlatNomor = useMemo(() => {
                const plats = vouchers.map(v => v.usage_details?.noKendaraan).filter(Boolean);
                return [...new Set(plats)].sort();
            }, [vouchers]);

            const [form, setForm] = useState({
                unitPengguna: '', 
                tanggal: new Date().toISOString().slice(0, 16),
                uraianKegiatan: '', 
                nilaiVoucher: '25000', 
                volume: '', 
                penerima: ''
            });

            const [quotaForm, setQuotaForm] = useState({
                unit: '', 
                nilaiVoucher: '25000', 
                lembar: ''
            });

            const showNotif = (message, type = 'success') => {
                setNotification({ show: true, message, type });
                setTimeout(() => setNotification({ show: false, message: '', type: 'success' }), 3000);
            };

            const fetchData = async () => {
                try {
                    const { data: vData, error: vError } = await supabaseClient
                        .from(COLLECTION_VOUCHERS)
                        .select('*')
                        .order('tanggal', { ascending: false })
                        .order('created_at', { ascending: false });
                    if (vError) throw vError;
                    setVouchers(vData || []);

                    const { data: qData, error: qError } = await supabaseClient.from(COLLECTION_QUOTAS).select('*').order('created_at', { ascending: false });
                    if (qError) throw qError;
                    setQuotaLogs(qData || []);

                    const { data: pData, error: pError } = await supabaseClient.from(COLLECTION_PEGAWAI).select('nama');
                    if (!pError) setPegawaiList(pData || []);
                } catch (err) {
                    console.error(err);
                    showNotif("Gagal sinkron database", "error");
                } finally {
                    setLoading(false);
                }
            };

            useEffect(() => {
                fetchData();
            }, []);

            const unitQuotas = useMemo(() => {
                const summary = {};
                unitOptions.forEach(u => {
                    summary[u] = { totalLembar: 0, totalNominal: 0, details: { 25000: 0, 50000: 0, 100000: 0 } };
                });
                quotaLogs.forEach(log => {
                    if (summary[log.unit]) {
                        const val = parseInt(log.nilai_voucher);
                        const lbr = parseInt(log.lembar);
                        summary[log.unit].details[val] += lbr;
                        summary[log.unit].totalLembar += lbr;
                        summary[log.unit].totalNominal += (val * lbr);
                    }
                });
                return summary;
            }, [quotaLogs]);

            const unitUsage = useMemo(() => {
                const usage = {};
                unitOptions.forEach(u => {
                    usage[u] = { usedLembar: 0, usedNominal: 0, realizedLembar: 0, details: { 25000: 0, 50000: 0, 100000: 0 } };
                });
                vouchers.forEach(v => {
                    if (usage[v.unit_pengguna]) {
                        const val = parseInt(v.nilai_voucher);
                        const lbr = parseInt(v.volume);
                        usage[v.unit_pengguna].details[val] += lbr;
                        usage[v.unit_pengguna].usedLembar += lbr;
                        usage[v.unit_pengguna].usedNominal += (val * lbr);
                        if (v.has_details) usage[v.unit_pengguna].realizedLembar += lbr;
                    }
                });
                return usage;
            }, [vouchers]);

            const filteredVouchers = useMemo(() => {
                const term = (searchTerm || '').toLowerCase();
                return vouchers.filter(v => {
                    const p = (v.penerima || '').toString();
                    const u = (v.uraian_kegiatan || '').toString();
                    const un = (v.unit_pengguna || '').toString();
                    const n = (v.usage_details?.noKendaraan || '').toString();
                    const searchStr = `${p} ${u} ${un} ${n}`.toLowerCase();
                    const matchSearch = searchStr.includes(term);
                    const matchUnit = filterUnit === 'Semua' || v.unit_pengguna === filterUnit;
                    
                    let matchMonth = true;
                    if (v.tanggal && (startDate || endDate)) {
                        const parts = v.tanggal.split('-');
                        const vY = parseInt(parts[0]);
                        const vM = parseInt(parts[1]);
                        const monthVal = vY * 12 + (vM - 1);
                        
                        if (startDate) {
                            const [sY, sM] = startDate.split('-').map(Number);
                            const sVal = sY * 12 + (sM - 1);
                            if (monthVal < sVal) matchMonth = false;
                        }
                        if (endDate) {
                            const [eY, eM] = endDate.split('-').map(Number);
                            const eVal = eY * 12 + (eM - 1);
                            if (monthVal > eVal) matchMonth = false;
                        }
                    }
                    
                    return matchSearch && matchUnit && matchMonth;
                });
            }, [vouchers, searchTerm, filterUnit, startDate, endDate]);

            const paginatedVouchers = useMemo(() => {
                const startIndex = (currentPage - 1) * ITEMS_PER_PAGE;
                return filteredVouchers.slice(startIndex, startIndex + ITEMS_PER_PAGE);
            }, [filteredVouchers, currentPage]);

            const totalPages = Math.ceil(filteredVouchers.length / ITEMS_PER_PAGE) || 1;

            const stats = useMemo(() => {
                let totalNominal = 0, totalLembar = 0, totalRealisasi = 0;
                filteredVouchers.forEach(v => {
                    totalNominal += (parseInt(v.nilai_voucher) || 0) * (parseInt(v.volume) || 0);
                    totalLembar += (parseInt(v.volume) || 0);
                    if (v.has_details) totalRealisasi += (parseInt(v.volume) || 0);
                });
                return { totalNominal, totalLembar, totalRealisasi };
            }, [filteredVouchers]);

            const handleAddQuota = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                try {
                    const payload = {
                        unit: quotaForm.unit,
                        nilai_voucher: parseInt(quotaForm.nilaiVoucher),
                        lembar: parseInt(quotaForm.lembar)
                    };
                    let error;
                    if (editQuotaId) {
                        ({ error } = await supabaseClient.from(COLLECTION_QUOTAS).update(payload).eq('id', editQuotaId));
                    } else {
                        ({ error } = await supabaseClient.from(COLLECTION_QUOTAS).insert([payload]));
                    }
                    if (error) throw error;
                    showNotif(editQuotaId ? "Input kuota diperbarui" : "Kuota ditambahkan");
                    setEditQuotaId(null);
                    setQuotaForm({ ...quotaForm, lembar: '' });
                    fetchData();
                } catch (err) { 
                    showNotif("Gagal menyimpan", "error"); 
                } finally { setIsSubmitting(false); }
            };

            const handleActionWithPin = async (inputVal) => {
                const currentPin = inputVal || pinInput;
                const targetPin = (pinModal.type === 'lock' || pinModal.type === 'unlock') ? LOCK_PIN : MASTER_PIN;
                
                if (currentPin !== targetPin) { 
                    showNotif("PIN Salah", "error"); 
                    setPinInput('');
                    return; 
                }

                try {
                    if (pinModal.type === 'restore') {
                        await performRestore(pinModal.extra);
                        return;
                    }

                    let error;
                    if (pinModal.type === 'delete') {
                        ({ error } = await supabaseClient.from(pinModal.targetColl).delete().eq('id', pinModal.dataId));
                    } else if (pinModal.type === 'lock') {
                        ({ error } = await supabaseClient.from(pinModal.targetColl).update({ is_locked: true }).eq('id', pinModal.dataId));
                    } else if (pinModal.type === 'unlock') {
                        ({ error } = await supabaseClient.from(pinModal.targetColl).update({ is_locked: false }).eq('id', pinModal.dataId));
                    }
                    if (error) throw error;
                    showNotif("Aksi berhasil");
                    fetchData();
                } catch (err) { 
                    showNotif("Gagal aksi", "error"); 
                } finally { 
                    setPinModal({ show: false, type: '', dataId: null, targetColl: '', extra: null }); 
                    setPinInput(''); 
                }
            };

            const handleSubmitVoucher = async (e) => {
                e.preventDefault();
                const val = parseInt(form.nilaiVoucher), vol = parseInt(form.volume);
                let available = (unitQuotas[form.unitPengguna]?.details[val] || 0) - (unitUsage[form.unitPengguna]?.details[val] || 0);
                if (editId) {
                    const oldDoc = vouchers.find(v => v.id === editId);
                    if (oldDoc && oldDoc.unit_pengguna === form.unitPengguna && parseInt(oldDoc.nilai_voucher) === val) available += parseInt(oldDoc.volume);
                }
                if (vol > available) { showNotif("Kuota tidak cukup! Sisa: " + available, "error"); return; }
                setIsSubmitting(true);
                try {
                    const payload = { 
                        unit_pengguna: form.unitPengguna,
                        tanggal: form.tanggal,
                        nilai_voucher: val,
                        volume: vol,
                        penerima: (form.penerima || '').toUpperCase(),
                        uraian_kegiatan: (form.uraianKegiatan || '').toUpperCase()
                    };
                    let error;
                    if (editId) { 
                        ({ error } = await supabaseClient.from(COLLECTION_VOUCHERS).update(payload).eq('id', editId));
                    } else { 
                        ({ error } = await supabaseClient.from(COLLECTION_VOUCHERS).insert([payload]));
                    }
                    if (error) throw error;
                    showNotif(editId ? "Data diperbarui" : "Voucher dicatat");
                    setEditId(null);
                    setForm({ ...form, uraianKegiatan: '', volume: '', penerima: '', tanggal: new Date().toISOString().slice(0, 16) });
                    fetchData();
                    setActiveTab('history');
                } catch (err) { 
                    showNotif("Gagal simpan", "error"); 
                } finally { setIsSubmitting(false); }
            };

            const handleSaveUsageDetail = async (e) => {
                e.preventDefault();
                setIsSubmitting(true);
                try {
                    const { error } = await supabaseClient
                        .from(COLLECTION_VOUCHERS)
                        .update({
                            usage_details: {
                                ...detailForm,
                                spbu: (detailForm.spbu || '').toUpperCase(),
                                noKendaraan: (detailForm.noKendaraan || '').toUpperCase(),
                                noStruk: (detailForm.noStruk || '').toUpperCase(),
                                waktuRealisasi: detailForm.waktuRealisasi || new Date().toISOString()
                            },
                            has_details: true,
                            is_locked: true
                        })
                        .eq('id', detailModal.voucher.id);
                    
                    if (error) throw error;
                    showNotif("Realisasi disimpan");
                    setDetailModal({ show: false, voucher: null });
                    fetchData();
                } catch (err) { 
                    showNotif("Gagal simpan", "error"); 
                } finally { setIsSubmitting(false); }
            };

            const exportToExcel = () => {
                const exportData = filteredVouchers.map((v, idx) => {
                    const rd = v.usage_details || {}, keluarTime = splitDateTime(v.tanggal), realTime = splitDateTime(rd.waktuRealisasi);
                    return {
                        "No": idx + 1, "Tgl Keluar": keluarTime.date, "Jam Keluar": keluarTime.time,
                        "Unit Kerja": v.unit_pengguna, "Penerima": v.penerima, "Kegiatan": v.uraian_kegiatan || "-",
                        "Nilai Voucher": parseInt(v.nilai_voucher) || 0, "Status": v.has_details ? 'SUDAH' : 'BELUM', 
                        "Tgl Struk": v.has_details ? realTime.date : "-", "Jam Struk": v.has_details ? realTime.time : "-",
                        "SPBU": rd.spbu || "-", "Kode Struk": rd.noStruk || "-", "No Pompa": rd.noPompa || "-",
                        "Nopol": rd.noKendaraan || "-", "BBM": rd.jenisBbm || "-", "Harga": rd.hargaBbm || 0, "Liter": rd.totalLiter || 0
                    };
                });
                const ws = XLSX.utils.json_to_sheet(exportData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Rekap");
                XLSX.writeFile(wb, `LAPORAN_BBM_${new Date().toISOString().split('T')[0]}.xlsx`);
            };

            const handleResetFilter = () => {
                setSearchTerm('');
                setFilterUnit('Semua');
                setStartDate('');
                setEndDate('');
                setCurrentPage(1);
                showNotif("Filter direset");
            };

            const handleRestoreFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = async (e) => {
                    try {
                        const json = JSON.parse(e.target.result);
                        if (!json.vouchers && !json.quotas) throw new Error("Format JSON tidak valid");
                        setPinModal({ show: true, type: 'restore', extra: json });
                    } catch (err) {
                        showNotif("Gagal membaca file JSON", "error");
                    }
                };
                reader.readAsText(file);
                e.target.value = ''; // Reset input
            };

            const performRestore = async (data) => {
                setIsSubmitting(true);
                try {
                    showNotif("Memulai pemulihan data...", "info");
                    
                    // Restore Vouchers dengan Chunking (per 20 data)
                    if (data.vouchers && data.vouchers.length > 0) {
                        const vChunks = [];
                        for (let i = 0; i < data.vouchers.length; i += 20) {
                            vChunks.push(data.vouchers.slice(i, i + 20).map(v => {
                                // Pemetaan kolom snake_case
                                const mapped = {
                                    unit_pengguna: v.unit_pengguna || v.unitPengguna,
                                    tanggal: v.tanggal,
                                    uraian_kegiatan: v.uraian_kegiatan || v.uraianKegiatan,
                                    nilai_voucher: parseInt(v.nilai_voucher || v.nilaiVoucher),
                                    volume: parseInt(v.volume),
                                    penerima: v.penerima,
                                    usage_details: v.usage_details || v.usageDetails,
                                    has_details: v.has_details || v.hasDetails || false,
                                    is_locked: v.is_locked || v.isLocked || false,
                                    created_at: v.created_at || v.createdAt || new Date().toISOString()
                                };
                                return mapped;
                            }));
                        }
                        for (const chunk of vChunks) {
                            const { error } = await supabaseClient.from(COLLECTION_VOUCHERS).insert(chunk);
                            if (error) throw error;
                        }
                    }

                    // Restore Quotas
                    if (data.quotas && data.quotas.length > 0) {
                        const qChunks = [];
                        for (let i = 0; i < data.quotas.length; i += 20) {
                            qChunks.push(data.quotas.slice(i, i + 20).map(q => {
                                const mapped = {
                                    unit: q.unit,
                                    nilai_voucher: parseInt(q.nilai_voucher || q.nilaiVoucher),
                                    lembar: parseInt(q.lembar),
                                    created_at: q.created_at || q.createdAt || new Date().toISOString()
                                };
                                return mapped;
                            }));
                        }
                        for (const chunk of qChunks) {
                            const { error } = await supabaseClient.from(COLLECTION_QUOTAS).insert(chunk);
                            if (error) throw error;
                        }
                    }

                    showNotif("Database berhasil dipulihkan", "success");
                    fetchData();
                    setActiveTab('history');
                } catch (err) {
                    console.error(err);
                    showNotif("Gagal: " + (err.message || "Format data tidak cocok"), "error");
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-900 pb-20">
                    {/* Notification */}
                    {notification.show && (
                        <div className={`fixed top-6 right-6 z-[999] px-6 py-4 rounded-2xl text-[10px] font-black flex items-center gap-4 shadow-2xl border border-white/10 animate-in ${notification.type === 'error' ? 'bg-rose-600 text-white' : 'bg-slate-900 text-white'}`}>
                            {notification.type === 'error' ? <AlertCircle size={18} /> : <CheckCircle2 size={18} className="text-emerald-400" />}
                            <span className="uppercase tracking-widest">{notification.message}</span>
                        </div>
                    )}

                    {/* Loading Overlay */}
                    {loading && (
                        <div className="fixed inset-0 z-[1000] bg-white flex flex-col items-center justify-center gap-4">
                            <Droplets className="animate-bounce text-blue-600" size={40}/>
                            <p className="text-[10px] font-black uppercase tracking-widest text-slate-400 animate-pulse">Sinkronisasi Database BBM...</p>
                        </div>
                    )}

                    {/* PIN Modal */}
                    {pinModal.show && (
                        <div className="fixed inset-0 z-[600] bg-slate-950/90 backdrop-blur-md flex items-center justify-center p-6">
                            <div className="bg-white rounded-[3rem] w-full max-w-sm p-12 text-center space-y-8 shadow-2xl animate-in">
                                <div className="w-20 h-20 bg-slate-950 text-white rounded-3xl flex items-center justify-center mx-auto shadow-xl"><Unlock size={32}/></div>
                                <div><h3 className="text-[16px] font-black uppercase tracking-tight text-slate-950">Otentikasi PIN</h3><p className="text-[9px] font-bold text-slate-400 mt-2 uppercase tracking-widest">Masukkan PIN </p></div>
                                <input type="password" autoFocus maxLength={3} value={pinInput} onChange={e=>{
                                    const val = e.target.value;
                                    setPinInput(val); 
                                    if(val.length === 3) {
                                        setTimeout(() => handleActionWithPin(val), 100);
                                    }
                                }} className="w-full text-center text-6xl font-black outline-none bg-slate-50 py-5 rounded-[2rem] tracking-[1.5rem] border-2 border-transparent focus:border-slate-950 shadow-inner" placeholder="···" />
                                <button onClick={()=>{setPinModal({show:false}); setPinInput('');}} className="text-[10px] font-black text-rose-600 uppercase tracking-widest hover:underline">Batal</button>
                            </div>
                        </div>
                    )}

                    {/* Realisasi Modal */}
                    {detailModal.show && (
                        <div className="fixed inset-0 z-[500] bg-slate-950/80 backdrop-blur-xl flex items-center justify-center p-4">
                            <div className="bg-white rounded-[3rem] w-full max-w-xl p-10 shadow-2xl border border-white animate-in">
                                    <div className="flex justify-between items-center mb-8"><div><h3 className="text-xl font-black uppercase tracking-tighter">Input Struk BBM</h3><p className="text-[9px] font-bold text-slate-400 uppercase tracking-widest">Realisasi Voucher Unit: {detailModal.voucher.unit_pengguna}</p></div><button onClick={()=>setDetailModal({show:false})} className="p-3 bg-slate-100 rounded-full hover:bg-slate-200 transition-all"><X size={20}/></button></div>
                                    <form onSubmit={handleSaveUsageDetail} className="space-y-5">
                                        <div className="grid grid-cols-2 gap-5">
                                            <div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-400">Waktu Di Struk</label><input type="datetime-local" value={detailForm.waktuRealisasi} onChange={e=>setDetailForm({...detailForm, waktuRealisasi: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none" required /></div>
                                            <div className="space-y-1 relative">
                                                <label className="text-[9px] font-black uppercase text-slate-400">Nama SPBU / Lokasi</label>
                                                <input list="list-spbu" value={detailForm.spbu} onChange={e=>setDetailForm({...detailForm, spbu: e.target.value.toUpperCase()})} className="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none" placeholder="SPBU..." required />
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-2 gap-5">
                                            <div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-400">No Struk</label><input value={detailForm.noStruk} onChange={e=>setDetailForm({...detailForm, noStruk: e.target.value.toUpperCase()})} className="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none" required /></div>
                                            <div className="space-y-1 relative">
                                                <label className="text-[9px] font-black uppercase text-slate-400">No Kendaraan</label>
                                                <input list="list-nopol" value={detailForm.noKendaraan} onChange={e=>setDetailForm({...detailForm, noKendaraan: e.target.value.toUpperCase()})} className="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none" placeholder="PLAT NOMOR..." required />
                                            </div>
                                        </div>
                                    <div className="grid grid-cols-2 gap-5">
                                        <div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-400">Jenis BBM</label><select value={detailForm.jenisBbm} onChange={e=>{
                                            const jenis = e.target.value;
                                            const harga = HARGA_BBM_REF[jenis] || 10000;
                                            const nilai = parseInt(detailModal.voucher.nilai_voucher) || 0;
                                            const volume = parseInt(detailModal.voucher.volume) || 0;
                                            const totalLiter = harga > 0 ? ((nilai * volume) / harga).toFixed(2) : 0;
                                            setDetailForm({...detailForm, jenisBbm: jenis, hargaBbm: harga, totalLiter});
                                        }} className="w-full p-4 bg-blue-50 text-blue-700 rounded-2xl font-black outline-none">{bbmOptions.map(o=><option key={o} value={o}>{o}</option>)}</select></div>
                                        <div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-400">Harga/Ltr</label><input type="number" value={detailForm.hargaBbm} onChange={e=>{
                                            const p = parseFloat(e.target.value) || 0;
                                            const nilai = parseInt(detailModal.voucher.nilai_voucher) || 0;
                                            const volume = parseInt(detailModal.voucher.volume) || 0;
                                            const totalLiter = p > 0 ? ((nilai * volume) / p).toFixed(2) : 0;
                                            setDetailForm({...detailForm, hargaBbm: p, totalLiter});
                                        }} className="w-full p-4 bg-slate-50 rounded-2xl font-black outline-none" required /></div>
                                    </div>
                                    <div className="p-4 bg-emerald-50 text-emerald-700 rounded-2xl flex justify-between items-center"><span className="font-black uppercase text-[9px]">Volume :</span><span className="text-lg font-black">{detailForm.totalLiter} Ltr</span></div>
                                    <button type="submit" disabled={isSubmitting} className="w-full py-5 bg-emerald-600 text-white rounded-3xl font-black uppercase text-[10px] shadow-xl hover:bg-emerald-700 transition-all flex items-center justify-center gap-2"><CheckCircle2 size={16}/> Simpan Realisasi</button>
                                </form>
                            </div>
                        </div>
                    )}

                    <header className="bg-white/95 backdrop-blur-xl sticky top-0 z-40 border-b border-slate-200 px-4 py-2 flex items-center justify-between shadow-sm">
                        <div className="flex items-center gap-3"><div className="bg-blue-600 p-2 rounded-xl text-white shadow-md shadow-blue-200"><Fuel size={14}/></div><h1 className="font-black uppercase text-[10px] tracking-tight text-slate-800">VOUCHER BBM.</h1></div>
                        <nav className="flex bg-slate-100 p-1 rounded-2xl gap-1">
                            {[{ id: 'quota', label: 'Kuota', icon: BarChart3 }, { id: 'input', label: 'Input', icon: PlusCircle }, { id: 'history', label: 'Riwayat', icon: History }].map(tab => (
                                <button key={tab.id} onClick={()=>setActiveTab(tab.id)} className={"px-3.5 py-2 rounded-xl font-black uppercase text-[8px] flex items-center gap-1.5 transition-all " + (activeTab === tab.id ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-500')}><tab.icon size={11}/> {tab.label}</button>
                            ))}
                            <button onClick={()=>setActiveTab('config')} className={"px-2.5 py-2 rounded-xl " + (activeTab === 'config' ? 'bg-white text-blue-600 shadow-sm' : 'text-slate-400')}><Settings size={12}/></button>
                        </nav>
                    </header>

                    <main className="max-w-[1500px] mx-auto p-4 md:p-5">
                        {activeTab === 'quota' && (
                            <div className="grid grid-cols-1 lg:grid-cols-12 gap-6 animate-in">
                                <div className="lg:col-span-4 space-y-6">
                                    <div className="bg-white p-6 rounded-[2.5rem] shadow-xl border border-white">
                                        <h2 className="font-black text-[11px] uppercase mb-4 flex items-center gap-3 text-emerald-600">{editQuotaId ? <Edit3 size={16}/> : <PlusCircle size={16}/>}{editQuotaId ? 'Koreksi Stok' : 'Update Stok'}</h2>
                                        <form onSubmit={handleAddQuota} className="space-y-4">
                                            <select value={quotaForm.unit} onChange={e=>setQuotaForm({...quotaForm, unit: e.target.value})} className="w-full p-3 bg-slate-50 rounded-xl font-black outline-none border border-transparent focus:border-emerald-500" required><option value="">Pilih Unit</option>{unitOptions.map(u=><option key={u} value={u}>{u}</option>)}</select>
                                            <select value={quotaForm.nilaiVoucher} onChange={e=>setQuotaForm({...quotaForm, nilaiVoucher: e.target.value})} className="w-full p-3 bg-slate-50 rounded-xl font-black outline-none border border-transparent focus:border-emerald-500">{nilaiVoucherOptions.map(v=><option key={v} value={v}>Rp {formatToRupiah(v)}</option>)}</select>
                                            <input type="number" value={quotaForm.lembar} onChange={e=>setQuotaForm({...quotaForm, lembar: e.target.value})} className="w-full p-3 bg-slate-50 rounded-xl font-black outline-none border border-transparent focus:border-emerald-500" placeholder="Jml Lembar" required />
                                            <button type="submit" disabled={isSubmitting} className="w-full py-3 bg-slate-900 text-white rounded-xl font-black uppercase text-[9px] shadow-lg transition-all">{editQuotaId ? 'SIMPAN PERUBAHAN' : 'SINKRONISASI KUOTA'}</button>
                                        </form>
                                    </div>
                                    <div className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 overflow-hidden">
                                        <h3 className="text-[9px] font-black uppercase text-slate-400 mb-4 flex items-center gap-2"><Clock size={12}/> Riwayat Stok</h3>
                                        <div className="space-y-2 max-h-[300px] overflow-y-auto pr-2 custom-scrollbar">
                                            {quotaLogs.map(log => (
                                                <div key={log.id} className="p-3 bg-slate-50 rounded-2xl flex items-center justify-between border border-slate-100 group">
                                                    <div><div className="text-[9px] font-black text-slate-800 uppercase leading-none mb-1">{log.unit}</div><div className="flex items-center gap-2 text-[7px] font-bold text-slate-400"><span className="bg-emerald-100 text-emerald-600 px-1 rounded">+{log.lembar} Lbr</span><span>•</span><span>Rp {formatToRupiah(log.nilai_voucher)}</span></div></div>
                                                    <button onClick={() => setPinModal({ show: true, type: 'delete', dataId: log.id, targetColl: COLLECTION_QUOTAS })} className="p-1.5 bg-white text-red-400 rounded-lg shadow-sm border border-slate-100 opacity-0 group-hover:opacity-100 transition-opacity"><Trash2 size={10}/></button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="lg:col-span-8 grid grid-cols-1 sm:grid-cols-2 gap-5">
                                    {unitOptions.map(unit => {
                                        const q = unitQuotas[unit] || { totalNominal: 0, totalLembar: 0, details: {} }, u = unitUsage[unit] || { usedNominal: 0, usedLembar: 0, realizedLembar: 0, details: {} }, rem = q.totalNominal - u.usedNominal, percent = u.usedLembar > 0 ? (u.realizedLembar / u.usedLembar) * 100 : 0;
                                        return (
                                            <div key={unit} className="bg-white p-6 rounded-[2.5rem] shadow-sm border border-slate-100 flex flex-col group hover:shadow-xl transition-all">
                                                <div className="flex justify-between items-start mb-4"><div><div className="font-black text-[11px] uppercase text-slate-800">{unit}</div><div className="text-[7px] font-black text-slate-400 uppercase tracking-widest flex items-center gap-1"><Activity size={10}/> Sisa Saldo</div></div><div className={"text-[10px] font-black px-4 py-1.5 rounded-full border " + (rem < 100000 ? 'bg-red-50 text-red-600 border-red-100' : 'bg-blue-50 text-blue-600 border-blue-100')}>Rp {formatToRupiah(rem)}</div></div>
                                                <div className="mb-6 p-4 bg-slate-50 rounded-3xl border border-slate-100/50">
                                                    <div className="flex justify-between items-end mb-2"><div className="text-[8px] font-black uppercase text-slate-500 flex items-center gap-1.5"><CheckSquare size={10} className="text-emerald-500"/> Kepatuhan Struk</div><div className="text-[10px] font-black text-blue-600">{u.realizedLembar} / {u.usedLembar}</div></div>
                                                    <div className="h-2 w-full bg-slate-200 rounded-full overflow-hidden flex"><div className="bg-emerald-500 h-full transition-all duration-1000" style={{ width: `${percent}%` }}></div></div>
                                                </div>
                                                <div className="grid grid-cols-3 gap-3 mt-auto">{nilaiVoucherOptions.map(val => { const av = (q.details[val] || 0) - (u.details[val] || 0); return (<div key={val} className="text-center p-3 rounded-[1.5rem] bg-white border border-slate-100 shadow-sm"><div className="text-[7px] text-slate-400 font-black uppercase mb-1">Rp {val/1000}K</div><div className={"text-[12px] font-black " + (av <= 0 ? 'text-red-400' : 'text-slate-800')}>{av} <span className="text-[8px] text-slate-300 font-medium">Lbr</span></div></div>);})}</div>
                                            </div>
                                        );
                                    })}
                                </div>
                            </div>
                        )}

                        {activeTab === 'input' && (
                            <div className="max-w-2xl mx-auto animate-in">
                                <div className="bg-white p-10 rounded-[3rem] shadow-2xl border border-white">
                                    <h2 className="font-black text-[14px] uppercase mb-8 flex items-center gap-4 text-slate-800"><div className="p-3 bg-blue-600 text-white rounded-2xl shadow-lg"><Edit3 size={20}/></div><div>Input Pengeluaran</div></h2>
                                    <form onSubmit={handleSubmitVoucher} className="space-y-6">
                                        <div className="grid grid-cols-2 gap-6">
                                            <div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-400">Unit</label><select value={form.unitPengguna} onChange={e=>setForm({...form, unitPengguna: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl font-black text-[11px] outline-none" required><option value="">Pilih Unit</option>{unitOptions.map(u=><option key={u} value={u}>{u}</option>)}</select></div>
                                        <div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-400">Waktu</label><input type="datetime-local" value={form.tanggal} onChange={e=>setForm({...form, tanggal: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl font-black text-[11px] outline-none" required /></div>
                                    </div>
                                    <div className="space-y-2 relative">
                                        <label className="text-[10px] font-black uppercase text-slate-400">Penerima</label>
                                        <input list="list-pegawai" value={form.penerima} onChange={e=>setForm({...form, penerima: e.target.value.toUpperCase()})} className="w-full p-4 bg-slate-50 rounded-2xl font-black text-[11px] uppercase outline-none" placeholder="NAMA PENERIMA..." required />
                                    </div>
                                    <div className="grid grid-cols-3 gap-6 items-end">
                                            <div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-400">Nominal</label><select value={form.nilaiVoucher} onChange={e=>setForm({...form, nilaiVoucher: e.target.value})} className="w-full p-4 bg-blue-50/50 text-blue-700 rounded-2xl font-black text-[11px] outline-none">{nilaiVoucherOptions.map(v=><option key={v} value={v}>Rp {formatToRupiah(v)}</option>)}</select></div>
                                            <div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-400">Jml Lembar</label><input type="number" value={form.volume} onChange={e=>setForm({...form, volume: e.target.value})} className="w-full p-4 bg-slate-50 rounded-2xl font-black text-[11px] outline-none" placeholder="0" required /></div>
                                            <div className="p-4 bg-slate-900 text-white rounded-2xl font-black text-[11px] text-center">Rp {formatToRupiah((parseInt(form.nilaiVoucher) || 0) * (parseInt(form.volume) || 0))}</div>
                                        </div>
                                        <div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-400">Uraian Kegiatan</label><textarea value={form.uraianKegiatan} onChange={e=>setForm({...form, uraianKegiatan: e.target.value.toUpperCase()})} className="w-full p-4 bg-slate-50 rounded-2xl font-black h-24 text-[10px] resize-none outline-none" placeholder="KEGIATAN..." required /></div>
                                        <button type="submit" disabled={isSubmitting} className="w-full py-4 bg-blue-600 text-white rounded-2xl font-black uppercase text-[10px] shadow-xl hover:bg-blue-700 transition-all flex items-center justify-center gap-3">CATAT PENGELUARAN <ChevronRight size={16}/></button>
                                    </form>
                                </div>
                            </div>
                        )}

                        {activeTab === 'history' && (
                            <div className="space-y-3 animate-in">
                                <div className="bg-white p-2 rounded-[2rem] shadow-sm border border-slate-100 flex flex-wrap items-center gap-3">
                                    <div className="flex items-center gap-4 px-4 py-1.5 bg-slate-50 rounded-2xl border border-slate-100 shadow-inner">
                                        <div className="flex items-center gap-2 pr-4 border-r border-slate-200"><Wallet size={12} className="text-blue-500"/><div><span className="text-[7px] font-black text-slate-400 block leading-none uppercase">Total</span><span className="text-[10px] font-black text-slate-800">Rp {formatToRupiah(stats.totalNominal)}</span></div></div>
                                        <div className="flex items-center gap-2 pr-4 border-r border-slate-200"><Layers size={12} className="text-amber-500"/><div><span className="text-[7px] font-black text-slate-400 block leading-none uppercase">Lbr</span><span className="text-[10px] font-black text-slate-800">{stats.totalLembar}</span></div></div>
                                        <div className="flex items-center gap-2"><CheckSquare size={12} className="text-emerald-500"/><div><span className="text-[7px] font-black text-slate-400 block leading-none uppercase">Struk</span><span className="text-[10px] font-black text-slate-800">{stats.totalRealisasi}</span></div></div>
                                    </div>
                                    <div className="flex flex-1 items-center gap-2">
                                        <input type="text" value={searchTerm} onChange={e=>{setSearchTerm(e.target.value); setCurrentPage(1);}} className="flex-1 pl-4 pr-3 py-2 bg-slate-50 rounded-xl font-black text-[9px] outline-none border border-transparent focus:border-blue-200" placeholder="CARI NAMA/NOPOL..."/>
                                        <select value={filterUnit} onChange={e=>{setFilterUnit(e.target.value); setCurrentPage(1);}} className="bg-slate-50 px-3 py-2 rounded-xl border border-slate-100 font-black text-[9px] outline-none">
                                            <option value="Semua">SEMUA UNIT</option>{unitOptions.map(u=><option key={u} value={u}>{u}</option>)}
                                        </select>
                                        <div className="flex items-center gap-2 bg-slate-50 px-3 py-2 rounded-xl border border-slate-100">
                                            <span className="text-[7px] font-black text-slate-400 uppercase">Dari</span>
                                            <input type="month" value={startDate} onChange={e=>{setStartDate(e.target.value); setCurrentPage(1);}} className="bg-transparent font-black text-[9px] outline-none w-24" />
                                            <span className="text-[7px] font-black text-slate-400 uppercase">Sampai</span>
                                            <input type="month" value={endDate} onChange={e=>{setEndDate(e.target.value); setCurrentPage(1);}} className="bg-transparent font-black text-[9px] outline-none w-24" />
                                        </div>
                                        <button onClick={fetchData} className="w-8 h-8 flex items-center justify-center bg-slate-100 text-slate-400 rounded-lg hover:text-blue-500 transition-all"><RotateCcw size={12}/></button>
                                        <button onClick={exportToExcel} className="px-4 py-2 bg-emerald-600 text-white rounded-xl font-black uppercase text-[8px] flex items-center gap-2 shadow-sm"><FileSpreadsheet size={14}/> EXPORT</button>
                                    </div>
                                </div>

                                <div className="bg-white rounded-[1.5rem] shadow-xl border border-slate-100 overflow-hidden">
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left border-collapse min-w-[1100px]">
                                            <thead>
                                                <tr className="bg-slate-900 text-white font-black uppercase text-[8px] tracking-widest">
                                                    <th className="px-4 py-3 text-center w-12 border-r border-white/5">No</th>
                                                    <th className="px-5 py-3">Waktu & Unit</th>
                                                    <th className="px-5 py-3">Penerima & Guna</th>
                                                    <th className="px-5 py-3 text-center">Nominal</th>
                                                    <th className="px-5 py-3 bg-slate-800">Realisasi (Struk)</th>
                                                    <th className="px-5 py-3 text-center">Aksi</th>
                                                </tr>
                                            </thead>
                                            <tbody className="divide-y divide-slate-100 font-black text-[11px]">
                                                {paginatedVouchers.map((v, i) => (
                                                    <tr key={v.id} className="hover:bg-blue-50/20 transition-colors group">
                                                        <td className="px-4 py-2 text-center text-slate-300 font-medium border-r border-slate-50">{filteredVouchers.length - ((currentPage - 1) * ITEMS_PER_PAGE + i)}</td>
                                                        <td className="px-5 py-2"><div className="text-slate-800 flex items-center gap-1.5"><Clock size={11} className="text-slate-300"/> {formatDateTimeIndo(v.tanggal)}</div><div className="text-[7px] text-blue-500 uppercase font-black mt-0.5">{v.unit_pengguna}</div></td>
                                                        <td className="px-5 py-2 uppercase"><div className="text-slate-800 text-[9px] leading-tight mb-0.5">{v.penerima}</div><div className="text-[7px] text-slate-400 font-medium normal-case truncate max-w-[200px] italic">{v.uraian_kegiatan}</div></td>
                                                        <td className="px-5 py-2 text-center"><div className="text-blue-700 text-[10px]">Rp {formatToRupiah((parseInt(v.nilai_voucher) || 0) * (parseInt(v.volume) || 0))}</div><div className="text-[7px] text-slate-400">× {v.volume} Lbr</div></td>
                                                        <td className="px-5 py-2 bg-slate-50/20">{v.has_details ? (<div className="uppercase space-y-1"><div className="flex items-center gap-2"><div className="text-blue-800 font-black text-[9px]">{v.usage_details?.spbu}</div><div className="text-emerald-700 font-black text-[8px] border-l pl-2">#{v.usage_details?.noStruk}</div></div><div className="flex items-center gap-2 text-[6.5px] text-slate-500 flex-wrap"><Activity size={8}/> {v.usage_details?.noKendaraan} | {v.usage_details?.jenisBbm} | {v.usage_details?.totalLiter} Ltr</div></div>) : (<div className="flex items-center gap-2 text-amber-500 italic text-[8px] py-1 px-3 bg-amber-50 rounded-lg border border-amber-100 w-fit"><AlertCircle size={10}/> Menunggu...</div>)}</td>
                                                        <td className="px-5 py-2"><div className="flex justify-center gap-1.5">{!v.is_locked ? (<><button onClick={()=>{
                                                            const rd=v.usage_details||{}; 
                                                            const initialHarga = rd.hargaBbm || HARGA_BBM_REF[rd.jenisBbm || 'Pertalite'] || 10000;
                                                            const nilai = parseInt(v.nilai_voucher) || 0;
                                                            const volume = parseInt(v.volume) || 0;
                                                            const calculatedLiter = initialHarga > 0 ? ((nilai * volume) / initialHarga).toFixed(2) : 0;
                                                            
                                                            setDetailForm({
                                                                waktuRealisasi:rd.waktuRealisasi||new Date().toISOString().slice(0, 16), 
                                                                spbu:rd.spbu||'', 
                                                                noStruk:rd.noStruk||'', 
                                                                noPompa:rd.noPompa||'', 
                                                                jenisBbm:rd.jenisBbm||'Pertalite', 
                                                                noKendaraan:rd.noKendaraan||'', 
                                                                hargaBbm:initialHarga, 
                                                                totalLiter:rd.totalLiter || calculatedLiter
                                                            }); 
                                                            setDetailModal({show:true, voucher:v});
                                                        }} className="p-2 bg-emerald-600 text-white rounded-lg shadow-sm"><ClipboardCheck size={12}/></button><button onClick={()=>{setForm({unitPengguna:v.unit_pengguna, tanggal:v.tanggal, penerima:v.penerima, nilaiVoucher:v.nilai_voucher.toString(), volume:v.volume.toString(), uraianKegiatan:v.uraian_kegiatan}); setEditId(v.id); setActiveTab('input');}} className="p-2 bg-blue-50 text-blue-600 rounded-lg border border-blue-100"><Edit3 size={12}/></button></>) : (<button onClick={()=>setPinModal({show:true, type:'unlock', dataId:v.id, targetColl:COLLECTION_VOUCHERS})} className="p-2 bg-amber-50 text-amber-600 rounded-lg border border-amber-200/50"><Unlock size={12}/></button>)}<button onClick={()=>setPinModal({show:true, type:'delete', dataId:v.id, targetColl:COLLECTION_VOUCHERS})} className="p-2 text-red-300 hover:text-red-500 transition-all"><Trash2 size={12}/></button></div></td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                    <div className="p-4 bg-slate-50 border-t border-slate-100 flex items-center justify-between">
                                        <div className="text-[9px] font-black text-slate-400 uppercase">Total: <span className="text-slate-800">{filteredVouchers.length}</span></div>
                                        <div className="flex items-center gap-2"><button disabled={currentPage === 1} onClick={()=>setCurrentPage(prev=>Math.max(1, prev-1))} className="p-2 rounded-lg border text-blue-600 bg-white"><ChevronLeft size={14}/></button><div className="px-4 py-1.5 bg-white border rounded-lg font-black text-[9px]">{currentPage} / {totalPages}</div><button disabled={currentPage === totalPages} onClick={()=>setCurrentPage(prev=>Math.min(totalPages, prev+1))} className="p-2 rounded-lg border text-blue-600 bg-white"><ChevronRight size={14}/></button></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'config' && (
                            <div className="max-w-xl mx-auto animate-in">
                                <div className="bg-slate-900 p-10 rounded-[3rem] text-white shadow-2xl">
                                    <h2 className="text-xl font-black uppercase mb-8 flex items-center gap-4"><Database className="text-blue-400"/> Database</h2>
                                    <div className="grid grid-cols-1 gap-4">
                                        <button onClick={()=>{const data={vouchers:vouchers.map(({id,created_at,...r})=>r), quotas:quotaLogs.map(({id,created_at,...r})=>r)}; const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'}),u=URL.createObjectURL(b),l=document.createElement('a'); l.href=u; l.download=`BBM_${new Date().toISOString().split('T')[0]}.json`; l.click(); showNotif("Backup diunduh");}} className="p-6 bg-white/5 rounded-3xl border border-white/10 hover:bg-white/10 flex items-center justify-between group"><div className="text-left"><span className="block font-black uppercase text-[12px] group-hover:text-blue-400">Unduh JSON</span><span className="text-[8px] text-slate-500 font-bold uppercase mt-1">Backup</span></div><Download size={20}/></button>
                                        
                                        <label className="p-6 bg-white/5 rounded-3xl border border-white/10 hover:bg-white/10 flex items-center justify-between group cursor-pointer transition-all">
                                            <div className="text-left">
                                                <span className="block font-black uppercase text-[12px] group-hover:text-emerald-400">Pulihkan JSON</span>
                                                <span className="text-[8px] text-slate-500 font-bold uppercase mt-1">Restore Database</span>
                                            </div>
                                            <Upload size={20}/>
                                            <input type="file" className="hidden" accept=".json" onChange={handleRestoreFile} />
                                        </label>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                    <footer className="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t py-2 px-6 flex justify-between items-center z-30"><div className="flex items-center gap-4"><div className="flex items-center gap-1.5"><div className="w-2 h-2 rounded-full bg-blue-500"></div> <span className="text-[8px] font-black text-slate-400 uppercase">Sistem Aktif</span></div></div></footer>

                    {/* Data Lists for Suggestions */}
                    <datalist id="list-pegawai">
                        {pegawaiList.map((p, idx) => <option key={`peg-${idx}`} value={p.nama} />)}
                    </datalist>
                    <datalist id="list-spbu">
                        {savedSPBUs.map((s, idx) => <option key={`spbu-${idx}`} value={s} />)}
                    </datalist>
                    <datalist id="list-nopol">
                        {savedPlatNomor.map((p, idx) => <option key={`nopol-${idx}`} value={p} />)}
                    </datalist>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
        // Sinyal aktivitas ke induk untuk mencegah logout otomatis
        ['mousedown', 'keypress', 'touchstart'].forEach(evt => {
            document.addEventListener(evt, () => {
                if (window.parent !== window) {
                    window.parent.postMessage('resetSession', '*');
                }
            }, true);
        });
    </script>
</body>
</html>
