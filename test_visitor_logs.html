<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Tabel visitor_logs</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        .success { color: green; }
        .error { color: red; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 5px; overflow-x: auto; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Test Tabel visitor_logs</h1>
    <div id="status"></div>
    <div id="data"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        const SUPABASE_URL = "https://yewkffbatvrbtfliikia.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_gh_LzjznODmbTtMBzt5aaA_sFTDMykg";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        async function testVisitorLogs() {
            const statusDiv = document.getElementById('status');
            const dataDiv = document.getElementById('data');

            statusDiv.innerHTML = '<p>🔄 Mengecek tabel visitor_logs...</p>';

            try {
                // 1. Coba insert data test
                console.log('Mencoba insert data test...');
                const { error: insertError } = await supabaseClient
                    .from('visitor_logs')
                    .insert({
                        nip: 'test123',
                        nama: 'Test User',
                        role: 'Test',
                        activity_type: 'page_visit',
                        page_name: 'test_visitor_logs'
                    });

                if (insertError) {
                    console.error('Insert error:', insertError);
                    statusDiv.innerHTML = `<p class="error">❌ Tabel visitor_logs BELUM ADA atau ada kesalahan: ${insertError.message}</p><pre>${JSON.stringify(insertError, null, 2)}</pre>`;
                    return;
                }

                // 2. Coba baca data
                console.log('Mencoba baca data...');
                const { data, error: selectError } = await supabaseClient
                    .from('visitor_logs')
                    .select('*')
                    .limit(5);

                if (selectError) {
                    console.error('Select error:', selectError);
                    statusDiv.innerHTML = `<p class="error">❌ Gagal membaca data: ${selectError.message}</p>`;
                    return;
                }

                console.log('Data berhasil diambil:', data);
                statusDiv.innerHTML = '<p class="success">✅ Tabel visitor_logs SUDAH ADA dan berjalan!</p>';
                dataDiv.innerHTML = `<h3>Data Terbaru:</h3><pre>${JSON.stringify(data, null, 2)}</pre>`;

            } catch (e) {
                console.error('Exception:', e);
                statusDiv.innerHTML = `<p class="error">❌ Exception: ${e.message}</p>`;
            }
        }

        // Jalankan test saat halaman dimuat
        testVisitorLogs();
    </script>
</body>
</html>
