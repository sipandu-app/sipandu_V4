        // --- UTILS ---
        const calculateAge = (birthDate) => {
            if (!birthDate) return 0;
            const today = new Date();
            const birth = new Date(birthDate);
            let age = today.getFullYear() - birth.getFullYear();
            const m = today.getMonth() - birth.getMonth();
            if (m < 0 || (m === 0 && today.getDate() < birth.getDate())) age--;
            return age;
        };

        const calculateRetirementDate = (dateString, years) => {
            if (!dateString) return null;
            const date = new Date(dateString);
            if (isNaN(date.getTime())) return null;
            date.setFullYear(date.getFullYear() + years);
            date.setMonth(date.getMonth() + 1);
            date.setDate(1);
            return date;

        // Convert base64 to File object
        const base64ToFile = (base64, filename) => {
            const arr = base64.split(',');
            const mime = arr[0].match(/:(.*?);/)[1];
            const bstr = atob(arr[1]);
            let n = bstr.length;
            const u8arr = new Uint8Array(n);
            while(n--){
                u8arr[n] = bstr.charCodeAt(n);
            }
            return new File([u8arr], filename, {type:mime});
        };

        // Upload foto ke Supabase Storage
        const uploadPhotoToStorage = async (file, fileName) => {
            try {
                // Pastikan filename aman (tidak ada spasi atau karakter spesial)
                const safeFileName = fileName.replace(/[^a-zA-Z0-9.-]/g, '_');
                const filePath = `pegawai/${Date.now()}_${safeFileName}`;
                
                const { data, error } = await supabaseClient.storage
                    .from('foto_pegawai')
                    .upload(filePath, file, {
                        cacheControl: '3600',
                        upsert: false
                    });
                
                if (error) throw error;
                
                // Dapatkan public URL
                const { data: { publicUrl } } = supabaseClient.storage
                    .from('foto_pegawai')
                    .getPublicUrl(filePath);
                
                return publicUrl;
            } catch (err) {
                console.error("Upload Error:", err);
                throw err;
            }

            };

            const [form, setForm] = useState(initialForm);
            const videoRef = useRef(null);
            const fileInputRef = useRef(null);
            const restoreInputRef = useRef(null);
            const fetchSessionRef = useRef(0);
            const [draggedId, setDraggedId] = useState(null);

            const handleDragStart = (e, id) => {
                const item = listPegawai.find(p => p.id === id);
                if (item?.is_locked) {
                    e.preventDefault();
                    return;
                }
                setDraggedId(id);
                e.dataTransfer.effectAllowed = "move";
            };

            const handleDragOver = (e) => {
                e.preventDefault();
            };

            const handleDrop = async (e, targetId) => {
                e.preventDefault();
                if (!draggedId || draggedId === targetId) return;

                const targetItem = listPegawai.find(p => p.id === targetId);
                if (targetItem?.is_locked) {
                    showNotif("Gagal: Baris target sedang terkunci", "error");
                    return;
                }

                const draggedIndex = listPegawai.findIndex(p => p.id === draggedId);
                const targetIndex = listPegawai.findIndex(p => p.id === targetId);
                if (draggedIndex === -1 || targetIndex === -1) return;

                const newList = [...listPegawai];
                const draggedItem = newList[draggedIndex];
                newList.splice(draggedIndex, 1);
                newList.splice(targetIndex, 0, draggedItem);

                const updatedList = newList.map((item, idx) => ({
                    ...item,
                    order_index: idx
                }));

                setListPegawai(updatedList);
                setDraggedId(null);

                showNotif("Menyimpan urutan...", "info");
                try {
                    const updates = updatedList.map(item => 
                        supabaseClient
                            .from('data_pegawai')
                            .update({ order_index: item.order_index })
                            .eq('id', item.id)
                    );
                    await Promise.all(updates);
                    showNotif("Urutan pegawai berhasil diperbarui");
                } catch (err) {
                    console.error("Error saving new order:", err);
                    showNotif("Gagal menyimpan urutan baru", "error");
                }
            };

            const handleDragEnd = () => {
                setDraggedId(null);
            };

            const showNotif = (message, type = 'success') => {
                setNotification({ show: true, message, type });
                setTimeout(() => setNotification({ show: false, message: '', type: 'success' }), 3000);
            };

            const fetchData = async () => {
                const currentSession = ++fetchSessionRef.current;
                setLoading(true);
                try {
                    // 1. Fetch text data first (extremely fast - excludes the photo column)
                    const { data: textData, error: textError } = await supabaseClient
                        .from('data_pegawai')
                        .select('id, nama, nip, nik, tempat_lahir, tanggal_lahir, usia, jenis_kelamin, agama, pangkat, jabatan, status_kepegawaian, pendidikan, unit_kerja, alamat, no_hp, order_index, is_locked')
                        .order('order_index', { ascending: true });
                    
                    if (textError) throw textError;
                    
                    if (currentSession !== fetchSessionRef.current) return;

                    // Ambil status is_fungsional dari data_kp_kgb untuk menyamakan logika umur pensiun (60 vs 58)
                    let enrichedData = textData || [];
                    try {
                        const { data: kgbData } = await supabaseClient
                            .from('data_kp_kgb')
                            .select('nip, is_fungsional');
                        if (kgbData) {
                            enrichedData = enrichedData.map(p => {
                                const kgbItem = kgbData.find(k => k.nip === p.nip);
                                return {
                                    ...p,
                                    is_fungsional: kgbItem ? kgbItem.is_fungsional : false
                                };
                            });
                        }
                    } catch (e) {
                        console.error("Error fetching is_fungsional from data_kp_kgb:", e);

                    // Populate list without photos to unblock the UI immediately
                    setListPegawai(enrichedData);
                    setLoading(false);

                    // 2. Fetch photo data asynchronously in batches of 5 for instant visual feedback
                    if (textData && textData.length > 0) {
                        const ids = textData.map(p => p.id);
                        const batchSize = 5;
                        
                        for (let i = 0; i < ids.length; i += batchSize) {
                            if (currentSession !== fetchSessionRef.current) return;
                            const batchIds = ids.slice(i, i + batchSize);
                            
                            const { data: photoBatch, error: photoError } = await supabaseClient
                                .from('data_pegawai')
                                .select('id, photo')
                                .in('id', batchIds);
                            
                            if (photoError) {
                                console.error("Error fetching photo batch:", photoError);
                                continue;
                            }
                            
                            if (currentSession !== fetchSessionRef.current) return;

                            if (photoBatch && photoBatch.length > 0) {
                                setListPegawai(prevList => {
                                    const photoMap = new Map(photoBatch.map(item => [item.id, item.photo]));
                                    return prevList.map(p => {
                                        if (photoMap.has(p.id)) {
                                            return {
                                                ...p,
                                                photo: photoMap.get(p.id) || ''
                                            };
                                        }
                                        return p;
                                    });
                                });
                            }
                        }
                    }
                } catch (error) {
                    if (currentSession === fetchSessionRef.current) {
                        showNotif("Gagal Memuat Data: " + error.message, "error");
                        console.error("Fetch Error:", error);
                        setLoading(false);
                    }
                }
            };

            const handleExportExcel = () => {
                if (filteredData.length === 0) {
                    showNotif("Tidak ada data untuk diekspor", "error");
                    return;
                }

                try {
                    const exportData = filteredData.map((p, i) => ({
                        'No': i + 1,
                        'Nama': p.nama,
                        'NIP': p.nip || '-',
                        'NIK': p.nik || '-',
                        'Tempat Lahir': p.tempat_lahir,
                        'Tanggal Lahir': p.tanggal_lahir,
                        'Usia': p.usia,
                        'Jenis Kelamin': p.jenis_kelamin,
                        'Agama': p.agama,
                        'Pangkat/Golongan': p.pangkat,
                        'Jabatan': p.jabatan,
                        'Status Kepegawaian': p.status_kepegawaian,
                        'Pendidikan': p.pendidikan,
                        'Unit Kerja': p.unit_kerja,
                        'No HP': p.no_hp || '-',
                        'Alamat': p.alamat
                    }));

                    const worksheet = XLSX.utils.json_to_sheet(exportData);
                    const workbook = XLSX.utils.book_new();
                    XLSX.utils.book_append_sheet(workbook, worksheet, "Data Pegawai");

                    // Set column widths
                    const wscols = [
                        {wch: 5}, {wch: 25}, {wch: 20}, {wch: 20}, {wch: 15}, {wch: 12}, 
                        {wch: 5}, {wch: 12}, {wch: 10}, {wch: 25}, {wch: 25}, {wch: 15},
                        {wch: 10}, {wch: 25}, {wch: 15}, {wch: 40}
                    ];
                    worksheet['!cols'] = wscols;

                    XLSX.writeFile(workbook, `DATA_PEGAWAI_${new Date().toISOString().split('T')[0]}.xlsx`);
                    showNotif("Berhasil mengekspor data ke Excel");
                } catch (error) {
                    showNotif("Gagal mengekspor data", "error");
                    console.error("Export Error:", error);
                }
            };

            useEffect(() => {
                fetchData();
            }, []);

            useEffect(() => {
                if (form.tanggal_lahir) {
                    setForm(prev => ({ ...prev, usia: calculateAge(form.tanggal_lahir) }));
                }
            }, [form.tanggal_lahir]);

            const startCamera = async () => {
                setShowCamera(true);
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
                    if (videoRef.current) videoRef.current.srcObject = stream;
                } catch (err) {
                    showNotif("Kamera tidak dapat diakses", "error");
                    setShowCamera(false);
                }
            };

            const takePhoto = () => {
                const canvas = document.createElement('canvas');
                canvas.width = videoRef.current.videoWidth;
                canvas.height = videoRef.current.videoHeight;
                canvas.getContext('2d').drawImage(videoRef.current, 0, 0);
                const base64 = canvas.toDataURL('image/jpeg', 0.8);
                stopCamera();
                
                // Convert base64 ke File object
                const file = base64ToFile(base64, `foto_${form.nama || Date.now()}.jpg`);
                setPhotoFile(file);
                setPreviewPhoto(base64);
                showNotif("Foto berhasil diambil");
            };

            const stopCamera = () => {
                if (videoRef.current?.srcObject) videoRef.current.srcObject.getTracks().forEach(track => track.stop());
                setShowCamera(false);
            };

            const handleFileUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    setPhotoFile(file);
                    const reader = new FileReader();
                    reader.onloadend = () => {
                        setPreviewPhoto(reader.result);
                        showNotif("Foto berhasil diunggah");
                    };
                    reader.readAsDataURL(file);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                
                const nipValue = form.nip || '';
                const statusValue = form.status_kepegawaian || '';

                // Validasi NIP jika bukan PPPK-PW
                if (statusValue !== "PPPK-PW" && nipValue.length !== 18) {
                    return showNotif("NIP harus 18 digit", "error");
                }
                
                // Cek apakah data terkunci sebelum update
                if (editId) {
                    const currentData = listPegawai.find(p => p.id === editId);
                    if (currentData && currentData.is_locked) {
                        return showNotif("Gagal: Data Terkunci!", "error");
                    }
                }

                // Siapkan URL foto
                let finalPhotoUrl = form.photo || '';

                // Jika ada foto baru yang diupload, upload ke Storage terlebih dahulu
                if (photoFile) {
                    try {
                        showNotif("Mengunggah foto...", "info");
                        finalPhotoUrl = await uploadPhotoToStorage(photoFile, `foto_${form.nama || Date.now()}.jpg`);
                    } catch (uploadErr) {
                        console.error("Error upload foto:", uploadErr);
                        return showNotif("Gagal mengunggah foto, silakan coba lagi", "error");
                    }
                }

                // Konstruksi payload - Hindari menyertakan ID, created_at, updated_at dari form
                const payload = {
                    nama: form.nama || '',
                    nip: nipValue,
                    nik: form.nik || '',
                    tempat_lahir: form.tempat_lahir || '',
                    tanggal_lahir: form.tanggal_lahir || null,
                    usia: parseInt(form.usia) || 0,
                    jenis_kelamin: form.jenis_kelamin || '',
                    agama: form.agama || 'Islam',
                    pangkat: form.pangkat || '-',
                    jabatan: form.jabatan || '',
                    status_kepegawaian: statusValue,
                    pendidikan: form.pendidikan || '',
                    unit_kerja: form.unit_kerja || '',
                    alamat: form.alamat || '',
                    no_hp: form.no_hp || '',
                    photo: finalPhotoUrl, // Simpan URL, bukan base64
                    is_locked: form.is_locked || false,
                    order_index: editId ? (form.order_index || 0) : listPegawai.length,
                    updated_at: new Date().toISOString()
                };

                try {
                    let error;
                    if (editId) {
                        const { error: updateError } = await supabaseClient
                            .from('data_pegawai')
                            .update(payload)
                            .eq('id', editId);
                        error = updateError;
                    } else {
                        const { error: insertError } = await supabaseClient
                            .from('data_pegawai')
                            .insert([payload]);
                        error = insertError;
                    }

                    if (error) throw error;

                    showNotif(editId ? `Data ${form.nama} Berhasil Diperbarui` : `Data ${form.nama} Berhasil Disimpan`);
                    
                    // Reset Form dan State
                    setForm(initialForm); 
                    setPhotoFile(null);
                    setPreviewPhoto('');
                    setEditId(null); 
                    setActiveTab('history');
                    fetchData();
                } catch (e) { 
                    console.error("Submit Error:", e);
                    showNotif("Gagal: " + (e.message || "Kesalahan Database"), "error"); 
                }
            };

            const handleDelete = async () => {
                const targetId = pinModal.payload?.id || editId;
                const targetNama = pinModal.payload?.nama || form.nama;
                
                try {
                    const { error } = await supabaseClient.from('data_pegawai').delete().eq('id', targetId);
                    if (error) throw error;
                    
                    showNotif(`Data ${targetNama} Berhasil Dihapus`);
                    setForm(initialForm);
                    setEditId(null);
                    setPhotoFile(null);
                    setPreviewPhoto('');
                    setActiveTab('history');
                    setPinModal({ show: false, type: '', payload: null });
                    setPinInput('');
                    fetchData();
                } catch (e) {
                    showNotif("Gagal menghapus: " + e.message, "error");
                }
            };

            const handleToggleLock = async () => {
                const p = pinModal.payload;
                if (!p) return;

                setIsProcessing(true);
                try {
                    const { error } = await supabaseClient
                        .from('data_pegawai')
                        .update({ is_locked: !p.is_locked })
                        .eq('id', p.id);
                    
                    if (error) throw error;
                    
                    showNotif(`Data ${p.nama} Berhasil ${p.is_locked ? 'Dibuka' : 'Dikunci'}`);
                    setPinModal({ show: false, type: '', payload: null });
                    setPinInput('');
                    fetchData();
                } catch (e) {
                    showNotif("Gagal merubah status kunci: " + e.message, "error");
                } finally {
                    setIsProcessing(false);
                }
            };



            const handleBackupJson = () => {
                const dataStr = JSON.stringify(listPegawai, null, 2);
                const blob = new Blob([dataStr], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement('a');
                link.href = url;
                link.download = `Backup_Pegawai_${new Date().toISOString().split('T')[0]}.json`;
                link.click();
                URL.revokeObjectURL(url);
                showNotif("Backup JSON Berhasil Diunduh");
            };

            const handleRestoreAction = async () => {
                if (pinInput !== MASTER_PIN) return showNotif("PIN Salah", "error");
                const payload = pinModal.payload;
                if (!payload || !Array.isArray(payload)) return showNotif("Data restore tidak valid", "error");

                setIsProcessing(true);
                try {
                    // 1. Hapus data lama (menggunakan kriteria yang pasti berhasil di RLS)
                    showNotif("Membersihkan data lama...", "info");
                    const { error: deleteError } = await supabaseClient.from('data_pegawai').delete().neq('nama', '___EMPTY_DATABASE___'); 
                    if (deleteError) throw deleteError;

                    // 2. Insert data baru (Batch per 50)
                    showNotif(`Memproses ${payload.length} data...`, "info");
                    
                    // Pastikan payload bersih dari field yang bisa menyebabkan error UUID/PK
                    const cleanPayload = payload.map(p => {
                        const { id, created_at, updated_at, ...rest } = p;
                        return rest;
                    });

                    const chunkSize = 50;
                    for (let i = 0; i < cleanPayload.length; i += chunkSize) {
                        const chunk = cleanPayload.slice(i, i + chunkSize);
                        const { error: insertError } = await supabaseClient.from('data_pegawai').insert(chunk);
                        if (insertError) {
                            console.error("Gagal insert chunk ke-" + (i/chunkSize + 1), insertError);
                            throw insertError;
                        }
                    }

                    showNotif(`Restore Berhasil! ${payload.length} data dimuat.`);
                    setPinModal({ show: false, type: '', payload: null });
                    setPinInput('');
                    fetchData();
                } catch (e) {
                    console.error("Error Detail Restore:", e);
                    showNotif("Gagal Restore: " + (e.message || "Lihat Console F12"), "error");
                } finally {
                    setIsProcessing(false);
                }
            };

            const handleNipLookup = (input) => {
                if (!input) return;
                const found = listPegawai.find(p => 
                    (p.nip && p.nip.includes(input)) || 
                    (p.nama && p.nama.toLowerCase().includes(input.toLowerCase()))
                );
                if (found) {
                    setForm(found);
                    setEditId(found.id);
                    setPreviewPhoto(found.photo || ''); // Set preview dari URL foto lama
                    setPhotoFile(null);
                    showNotif(`Data ${found.nama} Ditemukan & Dimuat`);
                } else {
                    showNotif("Pegawai tidak ditemukan", "info");
                }
            };

            const globalStats = useMemo(() => {
                return {
                    total: listPegawai.length,
                    status: {
                        pns: listPegawai.filter(p => p.status_kepegawaian === 'PNS').length,
                        pppk: listPegawai.filter(p => p.status_kepegawaian === 'PPPK').length,
                        pw: listPegawai.filter(p => p.status_kepegawaian === 'PPPK-PW').length,
                    },
                    gender: {
                        p: listPegawai.filter(p => p.jenis_kelamin === 'Laki-laki').length,
                        w: listPegawai.filter(p => p.jenis_kelamin === 'Perempuan').length,
                    },
                    edu: PENDIDIKAN_OPTIONS.reduce((acc, curr) => {
                        acc[curr] = listPegawai.filter(p => p.pendidikan === curr).length;
                        return acc;
                    }, {})
                };
            }, [listPegawai]);

            const unitStats = useMemo(() => UNIT_KERJA_OPTIONS.map((unit, idx) => {
                const filtered = listPegawai.filter(p => p.unit_kerja === unit);
                const palette = UNIT_PALETTES[idx % UNIT_PALETTES.length];
                return {
                    name: unit,
                    palette: palette,
                    stats: {
                        total: filtered.length,
                        gender: { p: filtered.filter(p => p.jenis_kelamin === 'Laki-laki').length, w: filtered.filter(p => p.jenis_kelamin === 'Perempuan').length },
                        education: PENDIDIKAN_OPTIONS.reduce((acc, edu) => { acc[edu] = filtered.filter(p => p.pendidikan === edu).length; return acc; }, {}),
                        status: { pns: filtered.filter(p => p.status_kepegawaian === 'PNS').length, pppk: filtered.filter(p => p.status_kepegawaian === 'PPPK').length, pw: filtered.filter(p => p.status_kepegawaian === 'PPPK-PW').length }
                    }
                };
            }), [listPegawai]);

            const filteredData = useMemo(() => {
                let data = listPegawai.filter(p => {
                    const matchSearch = (
                        p.nama?.toLowerCase().includes(searchTerm.toLowerCase()) || 
                        p.nip?.includes(searchTerm) || 
                        p.nik?.includes(searchTerm) ||
                        p.unit_kerja?.toLowerCase().includes(searchTerm.toLowerCase())
                    );
                    const matchUnit = filterUnit === '' || p.unit_kerja === filterUnit;
                    const matchStatus = filterStatus === '' || p.status_kepegawaian === filterStatus;
                    const matchPendidikan = filterPendidikan === '' || p.pendidikan === filterPendidikan;
                    
                    return matchSearch && matchUnit && matchStatus && matchPendidikan;
                });

                if (filterPurnaTugas) {
                    data = data.filter(p => {
                        if (!p.tanggal_lahir) return false;
                        const purnaDate = calculateRetirementDate(p.tanggal_lahir, p.is_fungsional ? 60 : 58);
                        const today = new Date();
                        const diffTime = purnaDate - today;
                        const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                        return diffDays <= 90 && diffDays >= 0;
                    });
                }

                if (sortBy === 'purna') {
                    data.sort((a, b) => {
                        if (!a.tanggal_lahir) return 1;
                        if (!b.tanggal_lahir) return -1;
                        const dateA = calculateRetirementDate(a.tanggal_lahir, a.is_fungsional ? 60 : 58);
                        const dateB = calculateRetirementDate(b.tanggal_lahir, b.is_fungsional ? 60 : 58);
                        return dateA - dateB;
                    });
                } else if (sortBy === 'usia') {
                    data.sort((a, b) => (b.usia || 0) - (a.usia || 0));
                }

                return data;
            }, [listPegawai, searchTerm, filterUnit, filterStatus, filterPendidikan, sortBy, filterPurnaTugas]);

            if (loading) return (
                <div className="h-screen flex flex-col items-center justify-center bg-white gap-4">
                    <Loader2 className="animate-spin text-slate-900" size={40}/>
                    <p className="text-[10px] font-black uppercase tracking-widest text-slate-400">Memuat Sistem...</p>
                </div>
            );

            return (
                <div className="flex-1 flex flex-col gap-3 overflow-hidden">
                    {notification.show && (
                        <div className={`fixed top-6 right-6 z-[999] px-6 py-4 rounded-2xl text-[11px] font-black flex items-center gap-4 shadow-2xl border border-white/10 animate-in ${notification.type === 'error' ? 'bg-rose-600 text-white' : (notification.type === 'info' ? 'bg-blue-600 text-white' : 'bg-slate-900 text-white')}`}>
                            {notification.type === 'error' ? <AlertCircle size={18} className="text-rose-200" /> : (notification.type === 'info' ? <Loader2 size={18} className="animate-spin" /> : <CheckCircle2 size={18} className="text-emerald-400" />)}
                            <span className="uppercase tracking-widest">{notification.message}</span>
                        </div>
                    )}

                    <input type="file" ref={restoreInputRef} className="hidden" accept=".json" onChange={e => {
                        const file = e.target.files[0];
                        if (!file) return;
                        const reader = new FileReader();
                        reader.onload = (event) => {
                            try {
                                const jsonData = JSON.parse(event.target.result);
                                const mappedData = jsonData.map(p => {
                                    // Bersihkan ID lama agar Supabase bisa men-generate UUID baru jika formatnya bukan UUID
                                    const { id, created_at, updated_at, ...rest } = p;
                                    
                                    return {
                                        nama: rest.nama || p.Nama || '',
                                        nip: rest.nip || p.NIP || '',
                                        nik: rest.nik || p.NIK || '',
                                        tempat_lahir: rest.tempat_lahir || p.tempatLahir || p['Tempat Lahir'] || '',
                                        tanggal_lahir: rest.tanggal_lahir || p.tanggalLahir || p['Tanggal Lahir'] || null,
                                        usia: parseInt(rest.usia || p.Usia) || 0,
                                        jenis_kelamin: rest.jenis_kelamin || p.jenisKelamin || p.Gender || '',
                                        agama: rest.agama || p.Agama || 'Islam',
                                        pangkat: rest.pangkat || p.Pangkat || p.Golongan || '-',
                                        jabatan: rest.jabatan || p.Jabatan || '',
                                        status_kepegawaian: rest.status_kepegawaian || p.statusKepegayaian || p.Status || '',
                                        pendidikan: rest.pendidikan || p.Pendidikan || '',
                                        unit_kerja: rest.unit_kerja || p.unitKerja || p['Unit Kerja'] || '',
                                        alamat: rest.alamat || p.Alamat || '',
                                        no_hp: rest.no_hp || p.noHp || p['No HP'] || '',
                                        photo: rest.photo || p.photoBase64 || '',
                                        order_index: parseInt(rest.order_index || p.orderIndex) || 0,
                                        is_locked: rest.is_locked || p.isLocked || false
                                    };
                                });
                                console.log("Data siap restore:", mappedData);
                                setPinModal({ show: true, type: 'restore', payload: mappedData });
                                setShowSettings(false); // Tutup modal settings saat pilih file restore
                            } catch (err) { showNotif("Gagal Membaca File", "error"); }
                        };
                        reader.readAsText(file);
                        e.target.value = '';
                    }} />

                    {/* Floating Header */}
                    <header className="h-16 flex-none bg-white border border-slate-200 px-6 flex justify-between items-center rounded-2xl shadow-sm z-20">
                        <div className="flex items-center gap-4">
                            <div className="w-10 h-10 bg-slate-900 rounded-xl flex items-center justify-center text-white shadow-xl"><Users size={20} /></div>
                            <div>
                                <h1 className="text-[14px] font-black tracking-tight leading-none text-slate-950 uppercase">SDM Raharjo</h1>
                                <p className="text-[9px] font-bold text-slate-500 uppercase mt-1">Sistem Informasi Kepegawaian</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-3">
                            <div className="bg-slate-100 p-1 rounded-2xl flex gap-1 shadow-inner border border-slate-200">
                                <button 
                                    onClick={() => { 
                                        setActiveTab('input'); 
                                        setEditId(null); 
                                        setForm(initialForm); 
                                        setPhotoFile(null); 
                                        setPreviewPhoto(''); 
                                    }} 
                                    className={`px-6 py-2.5 rounded-xl text-[11px] font-black uppercase transition-all duration-300 ${activeTab === 'input' ? 'bg-emerald-500 text-white shadow-lg scale-105' : 'text-slate-500 hover:bg-white/50'}`}
                                >
                                    Input
                                </button>
                                <button 
                                    onClick={() => setActiveTab('history')} 
                                    className={`px-6 py-2.5 rounded-xl text-[11px] font-black uppercase transition-all duration-300 ${activeTab === 'history' ? 'bg-blue-600 text-white shadow-lg scale-105' : 'text-slate-500 hover:bg-white/50'}`}
                                >
                                    Riwayat
                                </button>
                                <button 
                                    onClick={() => setActiveTab('komposisi')} 
                                    className={`px-6 py-2.5 rounded-xl text-[11px] font-black uppercase transition-all duration-300 ${activeTab === 'komposisi' ? 'bg-indigo-600 text-white shadow-lg scale-105' : 'text-slate-500 hover:bg-white/50'}`}
                                >
                                    Komposisi
                                </button>
                            </div>
                            <button onClick={() => setPinModal({ show: true, type: 'settings', payload: null })} className="p-2.5 text-slate-500 hover:text-slate-950 transition-colors bg-slate-100 rounded-xl border border-slate-200"><Settings size={18} /></button>
                        </div>
                    </header>

                    {/* Content Area */}
                    <main className="flex-1 overflow-y-auto p-6 md:p-8 bg-white border border-slate-200 rounded-2xl shadow-sm">
                        {activeTab === 'komposisi' ? (
                            <div className="space-y-8 animate-in">
                                <div className="grid grid-cols-1 md:grid-cols-12 gap-6">
                                    <div className="md:col-span-4 bg-[#FAF6EB] border border-[#EADCC9] rounded-[2rem] p-8 text-slate-900 flex items-center justify-between shadow-sm">
                                        <div>
                                            <p className="text-5xl font-black text-indigo-600">{globalStats.total}</p>
                                            <p className="text-[10px] font-black text-slate-500 uppercase tracking-widest mt-2">Total Seluruh Pegawai</p>
                                        </div>
                                        <div className="flex gap-6 border-l border-slate-200 pl-6">
                                            <div className="text-center">
                                                <p className="text-[18px] font-black text-slate-900">{globalStats.gender.p}</p>
                                                <p className="text-[9px] font-black uppercase text-slate-400">Pria</p>
                                            </div>
                                            <div className="text-center">
                                                <p className="text-[18px] font-black text-slate-900">{globalStats.gender.w}</p>
                                                <p className="text-[9px] font-black uppercase text-slate-400">Wanita</p>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div className="md:col-span-3 bg-[#FAF6EB] border border-[#EADCC9] rounded-[2rem] p-8 flex items-center justify-around shadow-sm">
                                        {Object.entries(globalStats.status).map(([k, v]) => {
                                            const statusColors = {
                                                pns: { text: "text-sky-500", bg: "bg-sky-50", border: "border-sky-100", label: "PNS" },
                                                pppk: { text: "text-emerald-600", bg: "bg-emerald-50", border: "border-emerald-100", label: "PPPK" },
                                                pw: { text: "text-violet-600", bg: "bg-violet-50", border: "border-violet-100", label: "PPPK-PW" }
                                            };
                                            const style = statusColors[k] || { text: "text-slate-600", bg: "bg-slate-50", border: "border-slate-100", label: k.toUpperCase() };
                                            return (
                                                <div key={k} className="text-center flex flex-col items-center">
                                                    <div className={`w-14 h-14 rounded-full ${style.bg} ${style.border} border flex items-center justify-center mb-2 shadow-sm`}>
                                                        <p className={`text-2xl font-black ${style.text}`}>{v}</p>
                                                    </div>
                                                    <p className="text-[10px] font-black text-slate-500 uppercase tracking-wider">{style.label}</p>
                                                </div>
                                            );
                                        })}
                                    </div>

                                                        onDragStart={(e) => handleDragStart(e, p.id)}

                                                        onDrop={(e) => handleDrop(e, p.id)}
                                                        onDragEnd={handleDragEnd}
                                                        className={`hover:bg-slate-50 transition-colors group ${p.is_locked ? 'bg-slate-50/50' : 'cursor-grab active:cursor-grabbing'} ${draggedId === p.id ? 'opacity-40 bg-slate-100' : ''}`}

                                                        <td className="px-6 py-4 text-center font-bold text-slate-400 select-none">
                                                            <div className="inline-flex items-center justify-center gap-1.5">

                                                                    <div className="flex flex-col gap-0.5 opacity-20 group-hover:opacity-60 transition-opacity">
                                                                        <div className="flex gap-0.5">
                                                                            <span className="w-0.5 h-0.5 bg-slate-600 rounded-full"></span>
                                                                            <span className="w-0.5 h-0.5 bg-slate-600 rounded-full"></span>
                                                                        </div>
                                                                        <div className="flex gap-0.5">
                                                                            <span className="w-0.5 h-0.5 bg-slate-600 rounded-full"></span>
                                                                            <span className="w-0.5 h-0.5 bg-slate-600 rounded-full"></span>
                                                                        </div>
                                                                        <div className="flex gap-0.5">
                                                                            <span className="w-0.5 h-0.5 bg-slate-600 rounded-full"></span>
                                                                            <span className="w-0.5 h-0.5 bg-slate-600 rounded-full"></span>

                                                            <span className="text-[9px] font-black px-2 py-0.5 bg-slate-900 text-white rounded-md uppercase mb-1 inline-block">{p.status_kepegawaian}</span>

                                                                    <span className="text-[8px] font-black px-1.5 py-0.5 bg-indigo-50 text-indigo-600 rounded uppercase">{p.usia} Th</span>

                                                                    if (!p.tanggal_lahir) return null;
                                                                    const purnaDate = calculateRetirementDate(p.tanggal_lahir, p.is_fungsional ? 60 : 58);

                                                                    const diffDays = Math.ceil((purnaDate - today) / (1000 * 60 * 60 * 24));
                                                                    if (diffDays <= 90) {
                                                                        return (
                                                                            <span className="text-[7px] font-black px-2 py-1 bg-orange-500 text-white rounded uppercase w-fit animate-pulse flex items-center gap-1">
                                                                                <Calendar size={9} /> {p.is_fungsional ? "Purna tugas fungsional" : "Purna tugas"} ({formatIDDate(purnaDate)})
                                                                            </span>
                                                                        );
                                                                    }
                                                                    return null;
                                                                })()}

                                                                            setForm(p); 
                                                                            setEditId(p.id); 
                                                                            setActiveTab('input');
                                                                            setPreviewPhoto(p.photo || '');
                                                                            setPhotoFile(null);
                                                                        }

                                                                >
                                                                    <Edit3 size={16} />
                                                                </button>
                                                                <button 
                                                                    onClick={() => setPinModal({ show: true, type: 'toggle_lock', payload: p })}

                                                                    title={p.is_locked ? "Buka Kunci" : "Kunci Data"}
                                                                >
                                                                    {p.is_locked ? <Lock size={16} /> : <Unlock size={16} />}
                                                                </button>
                                                                <button 
                                                                    onClick={() => {
                                                                        setForm(p);
                                                                        setEditId(p.id);
                                                                        setPinModal({ show: true, type: 'delete_row', payload: p });

                                                                    className="p-2.5 bg-white border border-slate-200 text-rose-400 rounded-xl hover:bg-rose-600 hover:text-white hover:border-rose-600 transition-all shadow-sm"
                                                                    title="Hapus Data"
                                                                >
                                                                    <Trash2 size={16} />
                                                                </button>
                                                            </div>
                                                        </td>
                                                    </tr>
                                                ))}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>

                                            </div>
                                            {(previewPhoto || form.photo) && (
                                                <button onClick={() => {
                                                    setPreviewPhoto('');
                                                    setPhotoFile(null);
                                                    setForm(prev => ({ ...prev, photo: '' }));
                                                }} className="absolute -top-2 -right-2 p-2.5 bg-rose-600 text-white rounded-xl shadow-lg hover:scale-110 transition-transform"><X size={16} /></button>
                                            )}

                                                <span className="text-[9px] font-black uppercase">Kamera</span>

                                                </div>
                                                <div className="space-y-1.5">
                                                    <label className="text-[10px] font-black uppercase text-slate-400 px-1">Tanggal Lahir</label>
                                                    <input type="date" className="w-full px-4 py-2.5 bg-blue-50/50 rounded-xl font-bold border border-blue-200 text-blue-700 focus:border-blue-500 outline-none transition-all shadow-sm text-sm" value={form.tanggal_lahir} onChange={e => setForm({...form, tanggal_lahir: e.target.value})} required />
                                                </div>
                                                <div className="space-y-1.5">
                                                    <label className="text-[10px] font-black uppercase text-slate-400 px-1">Agama</label>
                                                    <select className="w-full px-4 py-2.5 bg-white rounded-xl font-bold border border-slate-200 focus:border-sky-500 outline-none transition-all shadow-sm text-sm" value={form.agama} onChange={e => setForm({...form, agama: e.target.value})} required>
                                                        {AGAMA_OPTIONS.map(o => <option key={o} value={o}>{o}</option>)}
                                                    </select>
                                                </div>
                                                <div className="space-y-1.5">
                                                    <label className="text-[10px] font-black uppercase text-slate-400 px-1">No HP / WhatsApp</label>
                                                    <input type="text" className="w-full px-4 py-2.5 bg-white rounded-xl font-bold border border-slate-200 focus:border-sky-500 outline-none transition-all shadow-sm text-sm" placeholder="08XXXXXXXXXX" value={form.no_hp} onChange={e => setForm({...form, no_hp: e.target.value.replace(/\D/g,'')})} />
                                                </div>
                                                <div className="md:col-span-2 space-y-1.5">
                                                    <label className="text-[10px] font-black uppercase text-slate-400 px-1">Alamat Domisili Sesuai KTP</label>
                                                    <textarea className="w-full px-4 py-2.5 bg-blue-50/50 rounded-xl font-bold border border-blue-200 text-blue-700 focus:border-blue-500 outline-none transition-all shadow-sm text-sm min-h-[120px]" value={form.alamat} onChange={e => setForm({...form, alamat: e.target.value.toUpperCase()})} required />
                                                </div>
                                            </div>
                                        </div>

                                        {/* SECTION 2: EMPLOYMENT DATA */}
                                        <div className="bg-indigo-50/50 p-6 rounded-2xl border border-indigo-100 shadow-sm space-y-4">
                                            <div className="flex items-center gap-2 mb-2">
                                                <div className="p-1.5 bg-indigo-500 text-white rounded-lg"><Briefcase size={14}/></div>
                                                <h3 className="text-[11px] font-black uppercase tracking-widest text-indigo-700">Informasi Pekerjaan</h3>
                                            </div>
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div className="space-y-1.5">
                                                    <label className="text-[10px] font-black uppercase text-slate-400 px-1">Status Kepegawaian</label>
                                                    <select className="w-full px-4 py-2.5 bg-white rounded-xl font-bold border border-slate-200 focus:border-indigo-500 outline-none transition-all shadow-sm text-sm" value={form.status_kepegawaian} onChange={e => setForm({...form, status_kepegawaian: e.target.value})} required>
                                                        {STATUS_OPTIONS.map(o => <option key={o} value={o}>{o}</option>)}
                                                    </select>
                                                </div>
                                                <div className="space-y-1.5">
                                                    <label className="text-[10px] font-black uppercase text-slate-400 px-1">NIP / No Register</label>
                                                    <div className="relative">
                                                        <input type="text" className="w-full px-4 py-2.5 bg-blue-50/50 rounded-xl font-bold border border-blue-200 text-blue-700 focus:border-blue-500 outline-none transition-all shadow-sm text-sm" placeholder="18 DIGIT" maxLength={18} list="list-nip-suggest" value={form.nip} onChange={e => {
                                                            const nip = e.target.value.replace(/\D/g,'');
                                                            let updates = { nip };
                                                            if (nip.length >= 8) {
                                                                const yyyy = nip.substring(0, 4);
                                                                const mm = nip.substring(4, 6);
                                                                const dd = nip.substring(6, 8);
                                                                const birthDate = `${yyyy}-${mm}-${dd}`;
                                                                const d = new Date(birthDate);
                                                                if (!isNaN(d.getTime())) {
                                                                    updates.tanggal_lahir = birthDate;
                                                                    updates.usia = calculateAge(birthDate);
                                                                }
                                                            }
                                                            setForm({...form, ...updates});
                                                        }} required={form.status_kepegawaian !== "PPPK-PW"} autoComplete="off" />
                                                        <button type="button" onClick={() => handleNipLookup(form.nip)} className="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition-all shadow-sm"><Search size={12} /></button>
                                                    </div>
                                                </div>
                                                <div className="space-y-1.5">
                                                    <label className="text-[10px] font-black uppercase text-slate-400 px-1">Pangkat & Golongan</label>
                                                    <select className="w-full px-4 py-2.5 bg-white rounded-xl font-bold border border-slate-200 focus:border-indigo-500 outline-none transition-all shadow-sm text-sm" value={form.pangkat} onChange={e => setForm({...form, pangkat: e.target.value})} required>
                                                        {PANGKAT_OPTIONS.map(o => <option key={o} value={o}>{o}</option>)}
                                                    </select>
                                                </div>
                                                <div className="space-y-1.5">
                                                    <label className="text-[10px] font-black uppercase text-slate-400 px-1">Pendidikan Terakhir</label>
                                                    <select className="w-full px-4 py-2.5 bg-white rounded-xl font-bold border border-slate-200 focus:border-indigo-500 outline-none transition-all shadow-sm text-sm" value={form.pendidikan} onChange={e => setForm({...form, pendidikan: e.target.value})} required>
                                                        {PENDIDIKAN_OPTIONS.map(o => <option key={o} value={o}>{o}</option>)}
                                                    </select>
                                                </div>
                                                <div className="md:col-span-2 space-y-1.5">
                                                    <label className="text-[10px] font-black uppercase text-slate-400 px-1">Jabatan Saat Ini</label>
                                                    <input type="text" className="w-full px-4 py-2.5 bg-white rounded-xl font-bold border border-slate-200 focus:border-indigo-500 outline-none transition-all shadow-sm text-sm" value={form.jabatan} onChange={e => setForm({...form, jabatan: e.target.value.toUpperCase()})} required />
                                                </div>
                                                <div className="md:col-span-2 space-y-1.5">
                                                    <label className="text-[10px] font-black uppercase text-slate-400 px-1">Unit Kerja Penempatan</label>
                                                    <select className="w-full px-4 py-2.5 bg-white rounded-xl font-bold border border-slate-200 focus:border-indigo-500 outline-none transition-all shadow-sm text-sm" value={form.unit_kerja} onChange={e => setForm({...form, unit_kerja: e.target.value})} required>
                                                        {UNIT_KERJA_OPTIONS.map(o => <option key={o} value={o}>{o}</option>)}
                                                    </select>
                                                </div>
                                            </div>
                                        </div>

                                        <div className="pt-4 flex gap-3">
                                            <button type="submit" className="flex-1 py-3.5 bg-slate-900 text-white rounded-xl font-black uppercase tracking-widest text-[11px] shadow-lg hover:bg-sky-600 transition-all flex items-center justify-center gap-2">
                                                <Save size={16} /> {editId ? 'Perbarui Data' : 'Simpan Pegawai'}
                                            </button>
                                            <button type="button" onClick={() => { 
                                                setActiveTab('history'); 
                                                setEditId(null); 
                                                setForm(initialForm); 
                                                setPhotoFile(null);
                                                setPreviewPhoto('');
                                            }} className="px-6 py-3.5 bg-slate-100 text-slate-500 rounded-xl font-black uppercase text-[10px] hover:bg-slate-200 transition-all">Batal</button>
                                        </div>
                                    </form>
                                </div>
                            </div>
                        )}
                        <datalist id="list-nip-suggest">
                            {listPegawai.map(p => <option key={p.id} value={p.nip}>{p.nama}</option>)}
                        </datalist>
                    </main>

                    {showCamera && (
                        <div className="fixed inset-0 z-[100] bg-slate-950 flex flex-col items-center justify-center p-6 backdrop-blur-xl">
                            <div className="relative w-full max-w-lg aspect-[3/4] bg-slate-900 rounded-[3rem] overflow-hidden border-2 border-white/20 shadow-2xl">
                                <video ref={videoRef} autoPlay playsInline className="w-full h-full object-cover scale-x-[-1]" />
                            </div>
                            <div className="mt-10 flex gap-6">
                                <button onClick={stopCamera} className="w-16 h-16 bg-white/10 text-white rounded-full flex items-center justify-center hover:bg-white/20 transition-all backdrop-blur-md"><X size={24} /></button>
                                <button onClick={takePhoto} className="w-20 h-20 bg-white text-slate-950 rounded-full flex items-center justify-center hover:scale-110 transition-transform shadow-2xl"><Camera size={32} /></button>
                            </div>
                        </div>
                    )}

                    {pinModal.show && (
                        <div className="fixed inset-0 z-[100] bg-slate-950/60 backdrop-blur-md flex items-center justify-center p-6">
                            <div className="bg-white rounded-[2.5rem] p-10 w-full max-w-sm shadow-2xl space-y-6 text-center animate-in">
                                <div className="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center m-auto text-slate-900"><KeyRound size={32}/></div>
                                <div>
                                    <h3 className="text-[16px] font-black uppercase text-slate-950">
                                        {pinModal.type === 'restore' ? 'Konfirmasi Restore' : 
                                         pinModal.type === 'toggle_lock' ? (pinModal.payload?.is_locked ? 'Buka Kunci Data' : 'Kunci Data Pegawai') :
                                         pinModal.type === 'delete_row' ? 'Konfirmasi Hapus' : 'Akses Pengaturan'}
                                    </h3>
                                    <p className="text-[11px] font-medium text-slate-400 mt-1 uppercase tracking-widest">
                                        {pinModal.type === 'delete_row' ? `Hapus data ${pinModal.payload?.nama}?` : 'Masukkan PIN Master'}
                                    </p>
                                </div>
                                <input type="password" placeholder="" className="w-full text-center text-4xl tracking-[1em] py-4 bg-slate-50 border-2 border-transparent focus:border-slate-900 outline-none rounded-2xl font-black" value={pinInput} onChange={e => setPinInput(e.target.value.replace(/\D/g,''))} onKeyDown={e => {
                                    if (e.key === 'Enter') {
                                        if (pinInput === MASTER_PIN) {
                                            if (pinModal.type === 'restore') handleRestoreAction();
                                            else if (pinModal.type === 'toggle_lock') handleToggleLock();
                                            else if (pinModal.type === 'delete_row') handleDelete();
                                            else {
                                                setShowSettings(true);
                                                setPinModal({ show: false, type: '', payload: null });
                                                setPinInput('');
                                            }
                                        } else {
                                            showNotif("PIN Salah", "error");
                                            setPinInput('');
                                        }
                                    }
                                }} maxLength={4} autoFocus autoComplete="new-password" />
                                <div className="flex flex-col gap-3">
                                    <button onClick={() => {
                                        if (pinInput === MASTER_PIN) {
                                            if (pinModal.type === 'restore') handleRestoreAction();
                                            else if (pinModal.type === 'toggle_lock') handleToggleLock();
                                            else if (pinModal.type === 'delete_row') handleDelete();
                                            else {
                                                setShowSettings(true);
                                                setPinModal({ show: false, type: '', payload: null });
                                                setPinInput('');
                                            }
                                        } else {
                                            showNotif("PIN Salah", "error");
                                            setPinInput('');
                                        }
                                    }} className={`w-full py-4 rounded-2xl font-black uppercase text-[12px] shadow-xl transition-all ${pinModal.type === 'restore' ? 'bg-blue-600 text-white hover:bg-blue-700' : (pinModal.type === 'delete_row' ? 'bg-rose-600 text-white hover:bg-rose-700' : 'bg-slate-900 text-white hover:bg-indigo-600')}`}>
                                        {pinModal.type === 'restore' ? 'Konfirmasi Restore' : 
                                         pinModal.type === 'toggle_lock' ? 'Konfirmasi' :
                                         pinModal.type === 'delete_row' ? 'Hapus Data' : 'Buka Pengaturan'}
                                    </button>
                                    <button onClick={() => { setPinModal({show:false, type:'', payload:null}); setPinInput(''); }} className="text-[11px] font-black uppercase text-slate-400 hover:text-slate-900">Kembali</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {showSettings && (
                        <div className="fixed inset-0 z-[100] bg-slate-950/60 backdrop-blur-md flex items-center justify-center p-6">
                            <div className="bg-white rounded-[2.5rem] p-10 w-full max-w-lg shadow-2xl space-y-8 animate-in relative overflow-hidden">
                                <div className="flex justify-between items-center">
                                    <div className="flex items-center gap-4">
                                        <div className="p-3 bg-slate-100 rounded-xl text-slate-900"><Settings size={20}/></div>
                                        <h3 className="text-[16px] font-black uppercase tracking-tight">Manajemen Database</h3>
                                    </div>
                                    <button onClick={() => setShowSettings(false)} className="p-2 hover:bg-slate-100 rounded-xl transition-colors"><X size={20}/></button>
                                </div>
                                <div className="grid grid-cols-1 gap-4">
                                    <button onClick={handleExportExcel} className="w-full p-6 bg-slate-50 border border-slate-200 rounded-3xl text-left hover:bg-white hover:border-indigo-600 transition-all group">
                                    <div className="flex items-center gap-4">
                                        <div className="p-3 bg-indigo-50 text-indigo-600 rounded-xl group-hover:bg-indigo-600 group-hover:text-white transition-colors"><DownloadCloud size={24}/></div>
                                        <div>
                                            <p className="font-black uppercase text-[12px]">Ekspor ke Excel</p>
                                            <p className="text-[10px] text-slate-400 font-medium mt-0.5">Unduh seluruh data pegawai ke format .xlsx</p>
                                        </div>
                                    </div>
                                </button>

                                <button onClick={handleBackupJson} className="w-full p-6 bg-slate-50 border border-slate-200 rounded-3xl text-left hover:bg-white hover:border-blue-600 transition-all group">
                                    <div className="flex items-center gap-4">
                                        <div className="p-3 bg-blue-50 text-blue-600 rounded-xl group-hover:bg-blue-600 group-hover:text-white transition-colors"><FileUp size={24}/></div>
                                        <div>
                                            <p className="font-black uppercase text-[12px]">Backup JSON</p>
                                            <p className="text-[10px] text-slate-400 font-medium mt-0.5">Simpan data dalam format JSON untuk restore nanti</p>
                                        </div>
                                    </div>
                                </button>

                                <button onClick={() => restoreInputRef.current?.click()} className="w-full p-6 bg-slate-50 border border-slate-200 rounded-3xl text-left hover:bg-white hover:border-emerald-600 transition-all group">
                                    <div className="flex items-center gap-4">
                                        <div className="p-3 bg-emerald-50 text-emerald-600 rounded-xl group-hover:bg-emerald-600 group-hover:text-white transition-colors"><UploadCloud size={24}/></div>
                                        <div>
                                            <p className="font-black uppercase text-[12px]">Restore Data</p>
                                            <p className="text-[10px] text-slate-400 font-medium mt-0.5">Pilih file JSON untuk mengganti data database</p>
                                        </div>
                                    </div>
                                </button>
                                    <div className="p-6 bg-rose-50 border border-rose-100 rounded-3xl space-y-4">
                                        <div className="flex items-center gap-4">
                                            <div className="p-3 bg-rose-600 text-white rounded-xl"><AlertTriangle size={24}/></div>
                                            <div>
                                                <p className="font-black uppercase text-[12px] text-rose-950">ZONA BAHAYA</p>
                                                <p className="text-[10px] text-rose-600 font-bold uppercase mt-0.5 tracking-tighter">Penghapusan Seluruh Database</p>
                                            </div>
                                        </div>
                                        <button onClick={async () => {
                                            if (confirm("KONFIRMASI AKHIR: Hapus seluruh database pegawai?")) {
                                                setIsProcessing(true);
                                                try {
                                                    const { error } = await supabaseClient.from('data_pegawai').delete().not('id', 'is', null);
                                                    if (error) throw error;
                                                    showNotif("Database dikosongkan");
                                                    setShowSettings(false);
                                                    fetchData();
                                                } catch (e) { showNotif("Gagal: " + e.message, "error"); }
                                                finally { setIsProcessing(false); }
                                            }
                                        }} className="w-full py-3 bg-rose-600 text-white rounded-xl font-black uppercase text-[10px] hover:bg-rose-700 shadow-lg shadow-rose-200 flex items-center justify-center gap-2">
                                            {isProcessing ? <Loader2 size={16} className="animate-spin" /> : <Eraser size={16} />} Kosongkan Seluruh Data
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
        // Sinyal aktivitas ke induk untuk mencegah logout otomatis
        ['mousedown', 'keypress', 'touchstart'].forEach(evt => {
            document.addEventListener(evt, () => {
                if (window.parent !== window) {
                    window.parent.postMessage('resetSession', '*');
                }
            }, true);
        });
    </script>
</body>
</html>
