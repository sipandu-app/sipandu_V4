                                                                    Tunjangan Anak
                                                                </label>
                                                            </div>

                                                            {/* PERPANJANGAN SECTION */}
                                                            {(!berlaku || anak.tanggalPerpanjangan) && (
                                                                <div className="md:col-span-2 bg-rose-50 border border-rose-200 rounded-md p-3 space-y-3">
                                                                    <p className="text-[10px] font-black text-rose-700">Perpanjangan Masa Berlaku</p>
                                                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                                                                        <div className="space-y-1">
                                                                            <label className="text-[9px] font-bold text-rose-600 uppercase px-0.5">Tanggal Berlaku Baru</label>
                                                                            <input 
                                                                                type="date" 
                                                                                value={anak.tanggalPerpanjangan || ''} 
                                                                                onChange={(e) => handleUpdateAnak(idx, 'tanggalPerpanjangan', e.target.value)}
                                                                                className="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-md focus:border-rose-500 focus:outline-none text-[11px]"
                                                                            />
                                                                        </div>
                                                                        <div className="space-y-1">
                                                                            <label className="text-[9px] font-bold text-rose-600 uppercase px-0.5">Keterangan</label>
                                                                            <input 
                                                                                type="text" 
                                                                                value={anak.keteranganPerpanjangan || ''} 
                                                                                onChange={(e) => handleUpdateAnak(idx, 'keteranganPerpanjangan', e.target.value)}
                                                                                className="w-full px-3 py-1.5 bg-white border border-slate-200 rounded-md focus:border-rose-500 focus:outline-none text-[11px]"
                                                                                placeholder="Keterangan perpanjangan"
                                                                            />
                                                                        </div>
                                                                    </div>
                                                                    {anak.tanggalPerpanjangan && (
                                                                        <p className="text-[10px] text-emerald-600 font-bold">
                                                                            Status akan menjadi berlaku sampai {new Date(anak.tanggalPerpanjangan).toLocaleDateString('id-ID')}
                                                                        </p>
                                                                    )}
                                                                </div>
                                                            )}
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                                <div className="p-5 bg-slate-50 border-t flex gap-3">
                                    <button onClick={handleSave} disabled={isProcessing} className="flex-1 bg-slate-900 text-white py-3 rounded-xl font-black uppercase tracking-widest text-[11px] hover:bg-emerald-600 transition-all flex items-center justify-center gap-2">
                                        {isProcessing ? <Loader2 size={16} className="animate-spin" /> : <Save size={16} />}
                                        {isProcessing ? 'Menyimpan...' : 'Simpan Data'}
                                    </button>
                                    <button onClick={() => setSelectedItem(null)} className="px-6 py-3 bg-white text-slate-500 rounded-xl font-black uppercase tracking-widest text-[10px] border border-slate-200 hover:bg-slate-100">
                                        Batal
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* PIN MODAL */}
                    {pinModal.show && (
                        <div className="fixed inset-0 z-[600] bg-slate-950/90 backdrop-blur-md flex items-center justify-center p-6">
                            <div className="bg-white rounded-[2.5rem] w-full max-w-sm p-10 text-center space-y-6 shadow-2xl animate-in">
                                <div className="w-16 h-16 bg-slate-900 text-white rounded-2xl flex items-center justify-center mx-auto shadow-xl"><KeyRound size={28} /></div>
                                <div>
                                    <h3 className="text-[14px] font-black uppercase tracking-tight text-slate-950">PIN Otentikasi</h3>
                                </div>
                                <input 
                                    type="password" 
                                    autoFocus 
                                    maxLength={3} 
                                    className="w-full text-center text-5xl font-black outline-none bg-slate-50 py-4 rounded-[1.5rem] tracking-[1.5rem] border-2 border-transparent focus:border-slate-900 shadow-inner"
                                    placeholder="•••" 
                                    value={pinInput} 
                                    onChange={e => handlePinSubmit(e.target.value)} 
                                    autoComplete="new-password"
                                />
                                <button onClick={() => { setPinModal({show: false}); setPinInput(''); }} className="text-[10px] font-black text-rose-600 uppercase tracking-widest hover:underline">Batal</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
