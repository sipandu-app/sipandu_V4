        const App = () => {
            const [isAdmin, setIsAdmin] = useState(false);
            const [pinInput, setPinInput] = useState('');
            const [showPinError, setShowPinError] = useState(false);
            const [loading, setLoading] = useState(true);
            const [processLoading, setProcessLoading] = useState(false);

            const [suratList, setSuratList] = useState([]);
            const [pegawaiList, setPegawaiList] = useState([]);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterStatus, setFilterStatus] = useState('Semua');
            const [isEditing, setIsEditing] = useState(null);
            const [showSettings, setShowSettings] = useState(false);

            const [showStatusModal, setShowStatusModal] = useState(false);
            const [pinModal, setPinModal] = useState({ show: false, type: '', dataId: null });
            const [pendingStatusUpdate, setPendingStatusUpdate] = useState(null);
            const [selectedFile, setSelectedFile] = useState(null);
            const fileInputRef = useRef(null);
            const restoreInputRef = useRef(null);
            const settingsRef = useRef(null);

            const [formData, setFormData] = useState({
                nomorSurat: '',
                asalSurat: '',
                perihal: '',
                pembuatLaporan: '',
                tanggalSurat: '',
                tanggalTerima: new Date().toISOString().split('T')[0],
                kategori: 'Umum',
                sifatLaporan: 'Biasa',
                jenisSurat: 'Umum',
                status: 'Menunggu Verifikasi'
            });

            const ADMIN_PIN = "000";
            const LOCK_PIN = "000";
            const SIFAT_OPTIONS = ["Biasa", "Penting", "Rahasia", "Sangat Segera"];
            const JENIS_OPTIONS = ["Umum", "Nota Dinas", "Undangan", "Surat Tugas", "Pemberitahuan", "Keputusan", "Lainnya"];

            const suggestionLists = useMemo(() => {
                const pengirimSet = new Set();
                const pembuatSet = new Set(pegawaiList.map(p => p.nama)); // Mulai dengan daftar pegawai
                suratList.forEach(surat => {
                    if (surat.asalSurat) pengirimSet.add(surat.asalSurat);
                    if (surat.pembuatLaporan) pembuatSet.add(surat.pembuatLaporan);
                });
                return { pengirim: Array.from(pengirimSet).sort(), pembuat: Array.from(pembuatSet).sort() };
            }, [suratList, pegawaiList]);

            const fetchData = async () => {
                setLoading(true);
                try {
                    // Fetch Surat Masuk ordered by tgl_terima (tanggal pengajuan)
                    const { data: sData, error: sError } = await supabaseClient
                        .from('surat_masuk')
                        .select('*')
                        .order('tgl_terima', { ascending: false });

                    if (sError) throw sError;
                    
                    const mappedData = (sData || []).map(item => ({
                        ...item,
                        nomorSurat: item.nomor_surat,
                        asalSurat: item.asal_surat,
                        perihal: item.perihal,
                        pembuatLaporan: item.petugas,
                        tanggalSurat: item.tgl_surat,
                        tanggalTerima: item.tgl_terima,
                        sifatLaporan: item.sifat,
                        jenisSurat: item.jenis
                    }));
                    setSuratList(mappedData);

                    // Fetch Pegawai for suggestions
                    const { data: pData, error: pError } = await supabaseClient
                        .from('data_pegawai')
                        .select('nama, nip');
                    
                    if (!pError && pData) {
                        setPegawaiList(pData);
                    }
                } catch (err) {
                    console.error("[CRITICAL] Fetch Error:", err);
                }
                setLoading(false);
            };

            useEffect(() => {
                fetchData();
                const authStatus = sessionStorage.getItem('is_admin_suratmasuk');
                if (authStatus === 'true') setIsAdmin(true);
            }, []);

            const handleLogin = (e) => {
                e.preventDefault();
                if (pinInput === ADMIN_PIN) {
                    setIsAdmin(true);
                    setPinInput('');
                    setShowPinError(false);
                    sessionStorage.setItem('is_admin_suratmasuk', 'true');
                    console.log("[DEBUG] Login Admin Berhasil");
                } else {
                    setShowPinError(true);
                    setTimeout(() => setShowPinError(false), 2000);
                }
            };

            const handleLogout = () => {
                setIsAdmin(false);
                sessionStorage.removeItem('is_admin_suratmasuk');
                setShowSettings(false);
                resetForm();
                console.log("[DEBUG] Logout Admin Berhasil");
            };

            const handlePegawaiLookup = (input) => {
                if (!input) return;
                // Search by name or NIP
                const found = pegawaiList.find(p => 
                    p.nama.toLowerCase().includes(input.toLowerCase()) || 
                    (p.nip && p.nip.includes(input))
                );
                if (found) {
                    setFormData(prev => ({ ...prev, pembuatLaporan: found.nama }));
                }
            };

            const handleInputChange = (e) => {
                const { name, value } = e.target;
                setFormData({ ...formData, [name]: value });
                
                // Trigger lookup for pembuatLaporan if it looks like a selection or after typing
                if (name === 'pembuatLaporan' && value.length > 3) {
                    // We could do something more advanced here, but for now let's keep it simple
                }
            };

            const handleFileChange = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    console.log("[DEBUG] Memulai upload file:", file.name);
                    setProcessLoading(true);
                    try {
                        const fileExt = file.name.split('.').pop();
                        const fileName = `${Date.now()}_${Math.random().toString(36).substring(7)}.${fileExt}`;
                        const filePath = `surat_masuk/${fileName}`;

                        const { error: uploadError } = await supabaseClient.storage
                            .from('pdf')
                            .upload(filePath, file, { cacheControl: '3600', upsert: true });

                        if (uploadError) {
                            console.error("[ERROR] Upload Storage Gagal:", uploadError);
                            throw uploadError;
                        }

                        const { data: { publicUrl } } = supabaseClient.storage
                            .from('pdf')
                            .getPublicUrl(filePath);

                        console.log("[DEBUG] File berhasil diupload. URL:", publicUrl);
                        setSelectedFile({ name: file.name, url: publicUrl });
                    } catch (error) {
                        alert("Gagal mengunggah file: " + error.message);
                    } finally {
                        setProcessLoading(false);
                    }
                }
            };

            const resetForm = () => {
                setFormData({
                    nomorSurat: '',
                    asalSurat: '',
                    perihal: '',
                    pembuatLaporan: '',
                    tanggalSurat: '',
                    tanggalTerima: new Date().toISOString().split('T')[0],
                    kategori: 'Umum',
                    sifatLaporan: 'Biasa',
                    jenisSurat: 'Umum',
                    status: isAdmin ? 'Diproses' : 'Menunggu Verifikasi'
                });
                setSelectedFile(null);
                if (fileInputRef.current) fileInputRef.current.value = '';
                setIsEditing(null);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                console.log("[DEBUG] Memproses pengiriman formulir...");
                setProcessLoading(true);
                try {
                    const payload = {
                        nomor_surat: formData.nomorSurat,
                        asal_surat: formData.asalSurat,
                        perihal: formData.perihal,
                        petugas: formData.pembuatLaporan,
                        tgl_surat: formData.tanggalSurat,
                        tgl_terima: formData.tanggalTerima,
                        kategori: formData.kategori,
                        sifat: formData.sifatLaporan,
                        jenis: formData.jenisSurat,
                        status: isAdmin ? formData.status : 'Menunggu Verifikasi',
                        file_name: selectedFile?.name || null,
                        file_url: selectedFile?.url || null,
                        is_verified: isAdmin,
                        updated_at: new Date().toISOString()
                    };

                    console.log("[DEBUG] Payload yang dikirim ke Supabase:", payload);

                    let error;
                    if (isEditing) {
                        console.log("[DEBUG] Melakukan UPDATE pada ID:", isEditing);
                        const res = await supabaseClient.from('surat_masuk').update(payload).eq('id', isEditing);
                        error = res.error;
                    } else {
                        console.log("[DEBUG] Melakukan INSERT data baru");
                        const res = await supabaseClient.from('surat_masuk').insert([payload]);
                        error = res.error;
                    }

                    if (error) {
                        console.error("[ERROR] Operasi Database Gagal:", error);
                        throw error;
                    }

                    console.log("[DEBUG] Operasi Database Berhasil");
                    alert("Data berhasil disimpan!");
                    resetForm();
                    fetchData();
                    setActiveTab('daftar');
                } catch (error) {
                    alert("Gagal menyimpan: " + error.message);
                } finally {
                    setProcessLoading(false);
                }
            };

            const deleteSurat = async (id) => {
                if (!isAdmin) return;
                if (window.confirm('Hapus data surat ini secara permanen?')) {
                    setProcessLoading(true);
                    try {
                        const { error } = await supabaseClient.from('surat_masuk').delete().eq('id', id);
                        if (error) throw error;
                        fetchData();
                    } catch (error) {
                        alert("Gagal menghapus: " + error.message);
                    } finally {
                        setProcessLoading(false);
                    }
                }
            };

            const confirmStatusToggle = async () => {
                if (!pendingStatusUpdate || !isAdmin) return;
                if (pendingStatusUpdate.is_locked) {
                    alert("Data terkunci! Silahkan buka kunci terlebih dahulu.");
                    return;
                }
                setProcessLoading(true);
                try {
                    let newStatus;
                    if (pendingStatusUpdate.currentStatus === 'Menunggu Verifikasi') newStatus = 'Diproses';
                    else if (pendingStatusUpdate.currentStatus === 'Diproses') newStatus = 'Selesai';
                    else newStatus = 'Diproses';

                    const { error } = await supabaseClient.from('surat_masuk').update({ status: newStatus, is_verified: true, updated_at: new Date().toISOString() }).eq('id', pendingStatusUpdate.id);
                    if (error) throw error;
                    setShowStatusModal(false);
                    setPendingStatusUpdate(null);
                    fetchData();
                } catch (error) {
                    alert("Gagal update status: " + error.message);
                } finally {
                    setProcessLoading(false);
                }
            };

            const startEdit = (surat) => {
                if (!isAdmin) return;
                setIsEditing(surat.id);
                setFormData({
                    nomorSurat: surat.nomorSurat,
                    asalSurat: surat.asalSurat,
                    perihal: surat.perihal,
                    pembuatLaporan: surat.pembuatLaporan || '',
                    tanggalSurat: surat.tanggalSurat,
                    tanggalTerima: surat.tanggalTerima,
                    kategori: surat.kategori,
                    sifatLaporan: surat.sifatLaporan || 'Biasa',
                    jenisSurat: surat.jenisSurat || 'Umum',
                    status: surat.status
                });
                setSelectedFile(surat.file_url ? { name: surat.file_name, url: surat.file_url } : null);
                setActiveTab('input');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };

            const handlePinSubmit = async (val) => {
                if (val !== LOCK_PIN) {
                    alert("PIN Salah!");
                    return;
                }

                setProcessLoading(true);
                try {
                    const isLocking = pinModal.type === 'lock';
                    const { error } = await supabaseClient
                        .from('surat_masuk')
                        .update({ is_locked: isLocking })
                        .eq('id', pinModal.dataId);
                    
                    if (error) throw error;
                    alert(isLocking ? "Data berhasil dikunci!" : "Kunci berhasil dibuka!");
                    fetchData();
                } catch (err) {
                    alert("Gagal: " + err.message);
                } finally {
                    setProcessLoading(false);
                    setPinModal({ show: false, type: '', dataId: null });
                }
            };

            const handleToggleLock = (surat) => {
                setPinModal({
                    show: true,
                    type: surat.is_locked ? 'unlock' : 'lock',
                    dataId: surat.id
                });
            };

            const handleExportXlsx = () => {
                if (suratList.length === 0) return;
                const dataToExport = filteredSurat.map((s, idx) => ({
                    'No': idx + 1,
                    'Nomor Surat': s.nomorSurat,
                    'Asal Surat': s.asalSurat,
                    'Perihal': s.perihal,
                    'Petugas': s.pembuatLaporan,
                    'Jenis': s.jenisSurat,
                    'Sifat': s.sifatLaporan,
                    'Tgl Surat': s.tanggalSurat,
                    'Tgl Terima': s.tanggalTerima,
                    'Status': s.status
                }));
                const ws = XLSX.utils.json_to_sheet(dataToExport);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Daftar Surat");
                XLSX.writeFile(wb, `Laporan_Surat_Sipandu_${new Date().toISOString().split('T')[0]}.xlsx`);
            };

            const filteredSurat = suratList.filter(surat => {
                const matchesSearch =
                    (surat.nomorSurat || "").toLowerCase().includes(searchTerm.toLowerCase()) ||
                    (surat.asalSurat || "").toLowerCase().includes(searchTerm.toLowerCase()) ||
                    (surat.perihal || "").toLowerCase().includes(searchTerm.toLowerCase());
                const matchesFilter = filterStatus === 'Semua' || surat.status === filterStatus;
                return matchesSearch && matchesFilter;
            }).sort((a, b) => (b.nomorSurat || "").localeCompare(a.nomorSurat || "", undefined, { numeric: true, sensitivity: 'base' }));

            const getSifatColor = (sifat) => {
                switch (sifat) {
                    case 'Rahasia': return 'text-red-600 bg-red-50 border-red-100';
                    case 'Penting': return 'text-amber-600 bg-amber-50 border-amber-100';
                    case 'Sangat Segera': return 'text-indigo-600 bg-indigo-50 border-indigo-100';
                    default: return 'text-slate-500 bg-slate-100 border-slate-200';
                }
            };

            const formatDate = (dateString) => {
                if (!dateString) return '-';
                const date = new Date(dateString);
                return date.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', year: 'numeric' });
            };

            const [activeTab, setActiveTab] = useState('input');

            return (
                <div className="min-h-screen bg-slate-50 font-sans text-slate-800 p-4 md:p-8">
                    <datalist id="list-pengirim">{suggestionLists.pengirim.map(val => <option key={val} value={val} />)}</datalist>
                    <datalist id="list-pembuat">
                        {pegawaiList.map(p => <option key={p.nip || p.nama} value={p.nama}>{p.nip}</option>)}
                    </datalist>

                    {processLoading && (
                        <div className="fixed inset-0 z-[200] flex flex-col items-center justify-center bg-slate-900/40 backdrop-blur-sm text-white">
                            <Loader2 className="w-12 h-12 animate-spin mb-4" />
                            <p className="font-bold tracking-widest uppercase text-xs">Sinkronisasi Cloud...</p>
                        </div>
                    )}

                    {showStatusModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl p-6 max-w-sm w-full shadow-2xl border border-slate-100 text-center">
                                <ShieldCheck className="w-16 h-16 text-indigo-600 mx-auto mb-4" />
                                <h3 className="text-lg font-black text-slate-900 mb-2">Update Alur Surat</h3>
                                <p className="text-sm text-slate-500 mb-6">Status saat ini: <b>"{pendingStatusUpdate?.currentStatus}"</b>. Ubah ke tahap selanjutnya?</p>
                                <div className="flex gap-3">
                                    <button onClick={() => setShowStatusModal(false)} className="flex-1 px-4 py-3 rounded-2xl bg-slate-100 text-slate-600 font-bold text-sm">Batal</button>
                                    <button onClick={confirmStatusToggle} className="flex-1 px-4 py-3 rounded-2xl bg-indigo-600 text-white font-bold text-sm">Update Status</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {pinModal.show && (
                        <div className="fixed inset-0 z-[300] bg-slate-900/60 backdrop-blur-md flex items-center justify-center p-6">
                            <div className="bg-white rounded-[3rem] p-12 w-full max-w-sm text-center space-y-8 shadow-2xl animate-in">
                                <div className="w-20 h-20 bg-indigo-600 text-white rounded-3xl flex items-center justify-center mx-auto shadow-xl">
                                    <Lock size={32} />
                                </div>
                                <div>
                                    <h3 className="font-black uppercase text-base tracking-tight text-slate-900">Otentikasi PIN</h3>
                                    <p className="text-[9px] font-bold text-slate-400 mt-2 uppercase tracking-widest">Masukkan PIN Kunci Data</p>
                                </div>
                                <input 
                                    type="password" 
                                    autoFocus 
                                    maxLength={3} 
                                    className="w-full bg-slate-50 border-2 border-transparent focus:border-indigo-600 outline-none p-5 rounded-3xl text-5xl font-black text-center tracking-[1.5rem] shadow-inner"
                                    placeholder=""
                                    onChange={e => {
                                        if (e.target.value.length === 3) handlePinSubmit(e.target.value);
                                    }}
                                />
                                <button onClick={() => setPinModal({ show: false, type: '', dataId: null })} className="text-[10px] font-black text-rose-500 uppercase hover:underline tracking-widest">Batal</button>
                            </div>
                        </div>
                    )}

                    <header className="mb-8 flex flex-col md:flex-row md:items-center justify-between gap-6">
                        <div className="flex items-center gap-4">
                            <div className="bg-indigo-600 p-3 rounded-2xl shadow-lg"><FileText className="text-white w-8 h-8" /></div>
                            <div>
                                <h1 className="text-2xl font-bold text-slate-900 tracking-tight flex items-center gap-2">SURAT MASUK {isAdmin && <ShieldCheck className="w-5 h-5 text-emerald-500" />}</h1>
                                <p className="text-slate-500 text-sm">Arsip Digital Surat Masuk.</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            {!isAdmin ? (
                                <form onSubmit={handleLogin} className="flex items-center gap-2 bg-white p-1.5 rounded-2xl border border-slate-200">
                                    <div className="relative">
                                        <Lock className={`absolute left-3 top-2.5 w-4 h-4 ${showPinError ? 'text-red-500 animate-bounce' : 'text-slate-400'}`} />
                                        <input type="password" placeholder="PIN Admin" value={pinInput} onChange={(e) => setPinInput(e.target.value)} className="pl-9 pr-3 py-2 bg-slate-50 border-none outline-none text-sm w-28 rounded-xl" />
                                    </div>
                                    <button type="submit" className="bg-indigo-600 text-white px-4 py-2 rounded-xl text-xs font-bold">Masuk Admin</button>
                                </form>
                            ) : (
                                <div className="flex gap-2">
                                    <button onClick={handleExportXlsx} className="p-2.5 bg-white border border-slate-200 rounded-2xl text-emerald-600 hover:bg-emerald-50"><FileSpreadsheet className="w-5 h-5" /></button>
                                    <button onClick={handleLogout} className="p-2.5 bg-red-50 text-red-600 rounded-2xl hover:bg-red-100"><LogOut className="w-5 h-5" /></button>
                                </div>
                            )}
                        </div>
                    </header>

                    <div className="flex gap-2 mb-8 bg-slate-200 p-1.5 rounded-2xl w-fit mx-auto shadow-inner">
                        <button onClick={() => setActiveTab('input')} className={`px-8 py-3 rounded-xl font-black text-[11px] uppercase tracking-widest transition-all ${activeTab === 'input' ? 'bg-indigo-600 text-white shadow-lg scale-105' : 'text-slate-500 hover:bg-slate-300'}`}>Input Data</button>
                        <button onClick={() => setActiveTab('daftar')} className={`px-8 py-3 rounded-xl font-black text-[11px] uppercase tracking-widest transition-all ${activeTab === 'daftar' ? 'bg-emerald-600 text-white shadow-lg scale-105' : 'text-slate-500 hover:bg-slate-300'}`}>Daftar Pengajuan</button>
                    </div>

                    {activeTab === 'input' && (
                        <div className={`bg-white rounded-3xl shadow-xl border p-8 mb-8 max-w-5xl mx-auto animate-in ${isEditing ? 'border-amber-200 bg-amber-50/20' : 'border-slate-100'}`}>
                            <div className="flex items-center gap-3 mb-8">
                                <div className={`p-2 rounded-xl ${isEditing ? 'bg-amber-100' : 'bg-indigo-100'}`}>
                                    {isEditing ? <Edit3 className="w-6 h-6 text-amber-600" /> : <PlusCircle className="w-6 h-6 text-indigo-600" />}
                                </div>
                                <div>
                                    <h2 className="font-black uppercase text-sm tracking-widest text-slate-800">{isEditing ? 'Mode Edit Data' : 'Input Surat Baru'}</h2>
                                    <p className="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">Pastikan semua kolom terisi dengan benar</p>
                                </div>
                            </div>

                            <form onSubmit={handleSubmit} className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                                {/* GROUP 1: IDENTITAS */}
                                <div className="space-y-4 p-5 rounded-3xl bg-indigo-50/50 border border-indigo-100/50 relative overflow-hidden group">
                                    <div className="absolute top-0 right-0 p-4 opacity-5 group-hover:scale-110 transition-transform"><FileText className="w-16 h-16 text-indigo-600" /></div>
                                    <label className="text-[10px] font-black text-indigo-400 uppercase tracking-widest block mb-2">Identitas Surat</label>
                                    <input type="text" name="nomorSurat" placeholder="Nomor Surat" value={formData.nomorSurat} onChange={handleInputChange} className="w-full px-4 py-3 rounded-2xl border border-slate-300 bg-white/80 outline-none text-sm font-bold focus:border-indigo-400 transition-all placeholder:text-slate-300 shadow-sm" required />
                                    <input type="text" name="asalSurat" placeholder="Asal / Pengirim" list="list-pengirim" value={formData.asalSurat} onChange={handleInputChange} className="w-full px-4 py-3 rounded-2xl border border-slate-300 bg-white/80 outline-none text-sm font-bold focus:border-indigo-400 transition-all placeholder:text-slate-300 shadow-sm" required />
                                    <div className="grid grid-cols-2 gap-3">
                                        <select name="jenisSurat" value={formData.jenisSurat} onChange={handleInputChange} className="w-full px-3 py-3 rounded-2xl border border-slate-300 bg-white/80 text-xs font-black outline-none focus:border-indigo-400 shadow-sm">{JENIS_OPTIONS.map(opt => <option key={opt} value={opt}>{opt}</option>)}</select>
                                        <select name="sifatLaporan" value={formData.sifatLaporan} onChange={handleInputChange} className="w-full px-3 py-3 rounded-2xl border border-slate-300 bg-white/80 text-xs font-black outline-none focus:border-indigo-400 shadow-sm">{SIFAT_OPTIONS.map(opt => <option key={opt} value={opt}>{opt}</option>)}</select>
                                    </div>
                                </div>

                                {/* GROUP 2: KONTEN */}
                                <div className="space-y-4 p-5 rounded-3xl bg-emerald-50/50 border border-emerald-100/50 relative overflow-hidden group">
                                    <div className="absolute top-0 right-0 p-4 opacity-5 group-hover:scale-110 transition-transform"><Paperclip className="w-16 h-16 text-emerald-600" /></div>
                                    <label className="text-[10px] font-black text-emerald-500 uppercase tracking-widest block mb-2">Perihal & Petugas</label>
                                    <textarea name="perihal" placeholder="Isi ringkasan perihal surat..." value={formData.perihal} onChange={handleInputChange} rows="4" className="w-full px-4 py-3 rounded-2xl border border-slate-300 bg-white/80 outline-none text-sm font-bold resize-none focus:border-emerald-400 transition-all placeholder:text-slate-300 shadow-sm" required></textarea>
                                    <div className="relative">
                                        <input type="text" name="pembuatLaporan" placeholder="Petugas Pembuat" list="list-pembuat" value={formData.pembuatLaporan} onChange={handleInputChange} className="w-full px-4 py-3 rounded-2xl border border-slate-300 bg-white/80 outline-none text-sm font-bold focus:border-emerald-400 transition-all placeholder:text-slate-300 shadow-sm" required />
                                        <button type="button" onClick={() => handlePegawaiLookup(formData.pembuatLaporan)} className="absolute right-2 top-1/2 -translate-y-1/2 p-1.5 bg-emerald-600 text-white rounded-lg hover:bg-emerald-700 transition-all shadow-sm"><Search size={12} /></button>
                                    </div>
                                </div>

                                {/* GROUP 3: TANGGAL & FILE */}
                                <div className="space-y-4 p-5 rounded-3xl bg-amber-50/50 border border-amber-100/50 relative overflow-hidden group">
                                    <div className="absolute top-0 right-0 p-4 opacity-5 group-hover:scale-110 transition-transform"><Upload className="w-16 h-16 text-amber-600" /></div>
                                    <label className="text-[10px] font-black text-amber-500 uppercase tracking-widest block mb-2">Waktu & Lampiran</label>
                                    <div className="grid grid-cols-2 gap-3">
                                        <div className="space-y-1">
                                            <span className="text-[9px] font-black text-amber-600/50 uppercase ml-1">Tgl Surat</span>
                                            <input type="date" name="tanggalSurat" value={formData.tanggalSurat} onChange={handleInputChange} className="w-full px-3 py-3 rounded-2xl border border-slate-300 bg-white/80 text-xs font-black outline-none focus:border-amber-400 shadow-sm" />
                                        </div>
                                        <div className="space-y-1">
                                            <span className="text-[9px] font-black text-amber-600/50 uppercase ml-1">Tgl Terima</span>
                                            <input type="date" name="tanggalTerima" value={formData.tanggalTerima} onChange={handleInputChange} className="w-full px-3 py-3 rounded-2xl border border-slate-300 bg-white/80 text-xs font-black outline-none focus:border-amber-400 shadow-sm" />
                                        </div>
                                    </div>
                                    <div onClick={() => fileInputRef.current.click()} className="border-2 border-dashed rounded-2xl p-6 flex flex-col items-center justify-center gap-2 border-amber-200 bg-white/40 cursor-pointer hover:bg-amber-100/50 transition-all text-amber-600 group/upload shadow-inner">
                                        {selectedFile ? (
                                            <div className="flex items-center gap-3 bg-white px-4 py-2 rounded-xl shadow-sm animate-bounce">
                                                <Paperclip className="w-4 h-4 text-amber-600" />
                                                <span className="text-[10px] font-black truncate max-w-[120px]">{selectedFile.name}</span>
                                            </div>
                                        ) : (
                                            <>
                                                <Upload className="w-8 h-8 opacity-40 group-hover/upload:scale-110 transition-transform" />
                                                <span className="text-[10px] font-black uppercase tracking-tighter text-amber-400">Pilih Berkas PDF</span>
                                            </>
                                        )}
                                        <input type="file" ref={fileInputRef} className="hidden" accept=".pdf" onChange={handleFileChange} />
                                    </div>
                                    <button type="submit" className={`w-full font-black py-4 rounded-2xl text-white shadow-xl flex items-center justify-center gap-3 transition-all active:scale-95 text-xs uppercase tracking-widest ${isEditing ? 'bg-gradient-to-r from-amber-500 to-orange-600 hover:shadow-orange-200' : 'bg-gradient-to-r from-indigo-600 to-violet-600 hover:shadow-indigo-200'}`}>
                                        {isEditing ? <Save className="w-5 h-5" /> : <PlusCircle className="w-5 h-5" />}
                                        {isEditing ? 'Simpan Perubahan' : 'Kirim Pengajuan'}
                                    </button>
                                </div>
                            </form>
                        </div>
                    )}

                    {activeTab === 'daftar' && (
                        <div className="bg-white rounded-3xl shadow-sm border border-slate-200 overflow-hidden max-w-[70%] mx-auto">
                            <div className="p-6 border-b flex flex-col md:flex-row justify-between items-center gap-4">
                                <h3 className="font-bold flex items-center gap-2 text-slate-800"><ShieldCheck className="w-4 h-4 text-indigo-600" /> Daftar Pengajuan Surat Masuk</h3>
                                <div className="flex gap-2 w-full md:w-auto">
                                    <div className="relative flex-1 md:w-64">
                                        <Search className="absolute left-3 top-3 w-4 h-4 text-slate-400" />
                                        <input type="text" placeholder="Cari surat..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="pl-10 pr-4 py-2.5 rounded-2xl border border-slate-200 outline-none text-sm w-full bg-slate-50" />
                                    </div>
                                    <select value={filterStatus} onChange={(e) => setFilterStatus(e.target.value)} className="px-4 py-2.5 rounded-2xl border border-slate-200 text-xs font-bold outline-none bg-slate-50">{['Semua', 'Menunggu Verifikasi', 'Diproses', 'Selesai'].map(s => <option key={s} value={s}>{s}</option>)}</select>
                                </div>
                            </div>

                            <div className="overflow-x-auto min-h-[400px]">
                                {loading ? <div className="flex flex-col items-center justify-center py-20"><Loader2 className="w-8 h-8 animate-spin text-slate-300" /></div> : (
                                    <table className="w-full text-left min-w-[1000px]">
                                        <thead className="bg-slate-50">
                                            <tr>
                                                <th className="px-6 py-4 text-[10px] font-black text-slate-400 uppercase">Informasi Surat</th>
                                                <th className="px-6 py-4 text-[10px] font-black text-slate-400 uppercase">Perihal</th>
                                                <th className="px-6 py-4 text-[10px] font-black text-slate-400 uppercase">Asal & Petugas</th>
                                                <th className="px-6 py-4 text-[10px] font-black text-slate-400 uppercase text-center">Status</th>
                                                <th className="px-6 py-4 text-[10px] font-black text-slate-400 uppercase text-center">Aksi</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-100">
                                            {filteredSurat.map(surat => (
                                                <tr key={surat.id} className="hover:bg-slate-50/50">
                                                    <td className="px-6 py-5"><div className="font-black text-slate-800">{surat.nomorSurat}</div><div className="text-[10px] text-indigo-500 font-bold uppercase">{surat.jenisSurat}</div></td>
                                                    <td className="px-6 py-5"><div className="text-[11px] font-bold text-slate-600 line-clamp-2 italic">"{surat.perihal}"</div><div className={`mt-1 text-[8px] font-black uppercase px-2 py-0.5 rounded w-fit border ${getSifatColor(surat.sifatLaporan)}`}>{surat.sifatLaporan}</div></td>
                                                    <td className="px-6 py-5"><div className="text-[10px] font-black text-slate-500"><MapPin className="w-3 h-3 inline mr-1" />{surat.asalSurat}</div><div className="text-[10px] font-black text-indigo-600"><UserCheck className="w-3 h-3 inline mr-1" />{surat.pembuatLaporan}</div></td>
                                                    <td className="px-6 py-5 text-center"><button onClick={() => isAdmin && (setPendingStatusUpdate({ id: surat.id, currentStatus: surat.status }), setShowStatusModal(true))} className={`px-4 py-1.5 rounded-full text-[9px] font-black uppercase border ${surat.status === 'Selesai' ? 'bg-emerald-50 text-emerald-600 border-emerald-100' : surat.status === 'Diproses' ? 'bg-indigo-50 text-indigo-600 border-indigo-100' : 'bg-amber-50 text-amber-600 border-amber-100 animate-pulse'}`}>{surat.status}</button></td>
                                                    <td className="px-6 py-5 text-center">
                                                        <div className="flex justify-center gap-2">
                                                            {surat.file_url && <a href={surat.file_url} target="_blank" className="p-2 bg-indigo-50 text-indigo-600 rounded-xl"><Download className="w-4 h-4" /></a>}
                                                            {isAdmin && (
                                                                <>
                                                                    <button onClick={() => startEdit(surat)} className={`p-2 rounded-xl transition-all ${surat.is_locked ? 'text-slate-200 bg-slate-50' : 'bg-amber-50 text-amber-600'}`}>
                                                                        <Edit3 className="w-4 h-4" />
                                                                    </button>
                                                                    <button onClick={() => deleteSurat(surat.id)} className={`p-2 rounded-xl transition-all ${surat.is_locked ? 'text-slate-200 bg-slate-50' : 'bg-red-50 text-red-600'}`}>
                                                                        <Trash2 className="w-4 h-4" />
                                                                    </button>
                                                                    <button onClick={() => handleToggleLock(surat)} className={`p-2 rounded-xl transition-all ${surat.is_locked ? 'bg-indigo-600 text-white shadow-inner' : 'bg-slate-100 text-slate-400'}`}>
                                                                        {surat.is_locked ? <Lock className="w-4 h-4" /> : <Unlock className="w-4 h-4" />}
                                                                    </button>
                                                                </>
                                                            )}
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                )}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
        // Sinyal aktivitas ke induk untuk mencegah logout otomatis
        ['mousedown', 'keypress', 'touchstart'].forEach(evt => {
            document.addEventListener(evt, () => {
                if (window.parent !== window) {
                    window.parent.postMessage('resetSession', '*');
                }
            }, true);
        });
    </script>
</body>

</html>
