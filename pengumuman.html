<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PAPAN PENGUMUMAN</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        @keyframes pulse-soft {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        .animate-pulse-soft { animation: pulse-soft 2s infinite ease-in-out; }
    </style>
</head>
<body class="bg-slate-50 overflow-hidden">
    <div id="root"></div>

    <!-- React and ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>

    <!-- Supabase SDK -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <!-- PDF.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- KONFIGURASI SUPABASE ---
        const SUPABASE_URL = "https://yewkffbatvrbtfliikia.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_gh_LzjznODmbTtMBzt5aaA_sFTDMykg";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        // --- MOCK LUCIDE ICONS (SVG) ---
        const Icon = ({ path, size = 24, className = '', viewBox = "0 0 24 24" }) => (
            <svg className={className} width={size} height={size} fill="none" viewBox={viewBox} stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                {path}
            </svg>
        );

        const FileText = (props) => <Icon {...props} path={<><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/><line x1="8" y1="9" x2="10" y2="9"/></>} />;
        const Search = (props) => <Icon {...props} path={<><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>} />;
        const Trash2 = (props) => <Icon {...props} path={<><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" y1="11" x2="10" y2="17"/><line x1="14" y1="11" x2="14" y2="17"/></>} />;
        const Plus = (props) => <Icon {...props} path={<><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>} />;
        const Loader2 = (props) => <Icon {...props} className={`${props.className} animate-spin`} path={<path d="M21 12a9 9 0 1 1-6.219-8.56"/>} />;
        const Lock = (props) => <Icon {...props} path={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></>} />;
        const LogOut = (props) => <Icon {...props} path={<><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></>} />;
        const Download = (props) => <Icon {...props} path={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>} />;
        const X = (props) => <Icon {...props} path={<><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></>} />;
        const Eye = (props) => <Icon {...props} path={<><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></>} />;
        const CheckCircle2 = (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></>} />;
        const Info = (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></>} />;
        const AlertTriangle = (props) => <Icon {...props} path={<><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></>} />;
        const Sparkles = (props) => <Icon {...props} path={<><path d="m12 3 1.912 5.813a2 2 0 0 0 1.275 1.275L21 12l-5.813 1.912a2 2 0 0 0-1.275 1.275L12 21l-1.912-5.813a2 2 0 0 0-1.275-1.275L3 12l5.813-1.912a2 2 0 0 0 1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M3 5h4"/><path d="M19 17v4"/><path d="M17 19h4"/></>} />;
        const FileUp = (props) => <Icon {...props} path={<><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M12 12v6"/><path d="m15 15-3-3-3 3"/></>} />;
        const Building2 = (props) => <Icon {...props} path={<><path d="M2 22h20"/><path d="M4 22V4a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v18"/><path d="M9 22v-4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v4"/><path d="M8 6h.01"/><path d="M16 6h.01"/><path d="M8 10h.01"/><path d="M16 10h.01"/><path d="M8 14h.01"/><path d="M16 14h.01"/></>} />;
        const Pencil = (props) => <Icon {...props} path={<><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></>} />;
        const Clock = (props) => <Icon {...props} path={<><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></>} />;

        const PDFToPhoto = ({ url }) => {
            const [pages, setPages] = useState([]);
            const [loading, setLoading] = useState(false);

            useEffect(() => {
                if (!url) return;
                const render = async () => {
                    setLoading(true);
                    try {
                        const loadingTask = pdfjsLib.getDocument(url);
                        const pdf = await loadingTask.promise;
                        const pageImgs = [];
                        for (let i = 1; i <= pdf.numPages; i++) {
                            const page = await pdf.getPage(i);
                            const viewport = page.getViewport({ scale: 1.5 });
                            const canvas = document.createElement('canvas');
                            const context = canvas.getContext('2d');
                            canvas.height = viewport.height;
                            canvas.width = viewport.width;
                            await page.render({ canvasContext: context, viewport }).promise;
                            pageImgs.push(canvas.toDataURL());
                        }
                        setPages(pageImgs);
                    } catch (e) {
                        console.error("PDF Render Error:", e);
                    } finally {
                        setLoading(false);
                    }
                };
                render();
            }, [url]);

            if (loading) return (
                <div className="flex flex-col items-center justify-center py-20">
                    <Loader2 className="animate-spin text-emerald-500 mb-4" size={32} />
                    <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest text-center">Menyiapkan Tampilan Dokumen...</p>
                </div>
            );

            return (
                <div className="flex flex-col items-center gap-6 w-full">
                    {pages.map((img, i) => (
                        <div key={i} className="w-full bg-white shadow-xl rounded-xl overflow-hidden border border-slate-200">
                            <img src={img} alt={`Halaman ${i+1}`} className="w-full h-auto select-none" />
                            <div className="bg-slate-50 px-4 py-2 text-[9px] font-bold text-slate-400 border-t flex justify-between uppercase tracking-widest italic">
                                <span>Halaman {i + 1} dari {pages.length}</span>
                                <span>Pratinjau Sistem</span>
                            </div>
                        </div>
                    ))}
                </div>
            );
        };

        function App() {
            const [user, setUser] = useState(true); // Default logged in for demo, or integrate with main app auth
            const [isAdmin, setIsAdmin] = useState(false);
            const [data, setData] = useState([]);
            const [sources, setSources] = useState(['Gubernur', 'Setda Prov Jateng', 'BKD Prov Jateng', 'Dinas Sosial Prov Jateng', 'PPS Raharjo']);
            const [selected, setSelected] = useState(null);
            const [searchTerm, setSearchTerm] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isEditMode, setIsEditMode] = useState(false);
            const [editId, setEditId] = useState(null);
            const [loginModal, setLoginModal] = useState(false);
            const [pin, setPin] = useState('');
            const [errorMsg, setErrorMsg] = useState('');
            const [loading, setLoading] = useState(false);
            
            const [isAddingNewSource, setIsAddingNewSource] = useState(false);
            const [newSourceInput, setNewSourceInput] = useState('');
            
            const initialForm = { 
                no: '', 
                judul: '', 
                konten: '',
                sumber: 'PPS Raharjo',
                tgl: new Date().toISOString().split('T')[0], 
                prioritas: 'Normal',
                pdf: '', 
                fileName: '' 
            };
            const [form, setForm] = useState(initialForm);

            // Fetch data from Supabase
            const fetchData = async () => {
                setLoading(true);
                const { data: pengumuman, error } = await supabaseClient
                    .from('pengumuman')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) console.error('Error fetching data:', error);
                else {
                    setData(pengumuman || []);
                    // Tampilkan otomatis pengumuman terakhir jika belum ada yang dipilih
                    if (pengumuman && pengumuman.length > 0 && !selected) {
                        setSelected(pengumuman[0]);
                    }
                }

                const { data: sourcesData, error: sourcesError } = await supabaseClient
                    .from('sumber_info')
                    .select('nama');
                
                if (sourcesError) console.error('Error fetching sources:', sourcesError);
                else if (sourcesData) setSources(sourcesData.map(s => s.nama));
                
                setLoading(false);
            };

            useEffect(() => {
                fetchData();
            }, []);

            const openAddModal = () => {
                setForm(initialForm);
                setIsEditMode(false);
                setIsModalOpen(true);
            };

            const openEditModal = (item) => {
                setForm({
                    no: item.no,
                    judul: item.judul,
                    konten: item.konten,
                    sumber: item.sumber,
                    tgl: item.tgl,
                    prioritas: item.prioritas,
                    pdf: item.pdf,
                    fileName: item.file_name
                });
                setEditId(item.id);
                setIsEditMode(true);
                setIsModalOpen(true);
            };

            const save = async (e) => {
                e.preventDefault();
                if (!form.pdf) return setErrorMsg("Harap unggah file PDF!");
                setLoading(true);
                
                try {
                    let finalSource = form.sumber;
                    if (isAddingNewSource && newSourceInput.trim()) {
                        finalSource = newSourceInput.trim();
                        await supabaseClient.from('sumber_info').upsert({ nama: finalSource });
                    }

                    const payload = {
                        no: form.no,
                        judul: form.judul,
                        konten: form.konten,
                        sumber: finalSource,
                        tgl: form.tgl,
                        prioritas: form.prioritas,
                        pdf: form.pdf,
                        file_name: form.fileName,
                        updated_at: new Date().toISOString()
                    };

                    if (isEditMode && editId) {
                        const { error } = await supabaseClient
                            .from('pengumuman')
                            .update(payload)
                            .eq('id', editId);
                        if (error) throw error;
                    } else {
                        const { error } = await supabaseClient
                            .from('pengumuman')
                            .insert([payload]);
                        if (error) throw error;
                    }

                    setIsModalOpen(false);
                    setForm(initialForm);
                    // Jika bukan mode edit, reset selected agar fetchData otomatis memilih yang terbaru
                    if (!isEditMode) setSelected(null);
                    fetchData();
                } catch (err) { 
                    setErrorMsg('Gagal memproses data.');
                    console.error(err);
                } finally {
                    setLoading(false);
                }
            };

            const deleteItem = async (id) => {
                if (!confirm('Yakin ingin menghapus pengumuman ini?')) return;
                setLoading(true);
                try {
                    const { error } = await supabaseClient
                        .from('pengumuman')
                        .delete()
                        .eq('id', id);
                    if (error) throw error;
                    if (selected?.id === id) setSelected(null);
                    fetchData();
                } catch (err) {
                    console.error('Delete error:', err);
                } finally {
                    setLoading(false);
                }
            };

            const handleFileUpload = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                if (file.type !== 'application/pdf') return alert('Hanya file PDF yang diizinkan!');
                
                setLoading(true);
                try {
                    const fileExt = file.name.split('.').pop();
                    const fileName = `${Math.random()}.${fileExt}`;
                    const filePath = `pengumuman/${fileName}`;

                    let { error: uploadError } = await supabaseClient.storage
                        .from('pdf')
                        .upload(filePath, file, {
                            cacheControl: '3600',
                            upsert: true
                        });

                    if (uploadError) {
                        console.error("Supabase Upload Error Details:", uploadError);
                        throw uploadError;
                    }

                    const { data: { publicUrl } } = supabaseClient.storage
                        .from('pdf')
                        .getPublicUrl(filePath);

                    setForm({ ...form, pdf: publicUrl, fileName: file.name });
                } catch (error) {
                    alert('Error uploading file!');
                    console.error(error);
                } finally {
                    setLoading(false);
                }
            };

            const handleLogin = (e) => {
                e.preventDefault();
                if (pin === '888') { // Simple admin pin
                    setIsAdmin(true);
                    setLoginModal(false);
                    setPin('');
                    setErrorMsg('');
                } else {
                    setErrorMsg('PIN Salah!');
                }
            };

            const filtered = data.filter(d => 
                d.judul?.toLowerCase().includes(searchTerm.toLowerCase()) || 
                d.no?.toLowerCase().includes(searchTerm.toLowerCase()) ||
                d.sumber?.toLowerCase().includes(searchTerm.toLowerCase())
            );

            return (
                <div className="h-screen w-full flex flex-col bg-slate-50 font-sans text-slate-900 overflow-hidden text-sm">
                    {/* Navbar */}
                    <nav className="h-16 flex-none bg-emerald-600 border-b border-emerald-500 px-4 md:px-6 flex items-center justify-between shadow-lg z-30">
                        <div className="flex items-center gap-3">
                            <div className="bg-white p-2 rounded-xl text-emerald-600">
                                <FileText size={20} />
                            </div>
                            <div>
                                <h1 className="font-black text-sm uppercase tracking-tighter text-white">PENGUMUMAN</h1>
                                <p className="text-[10px] font-bold text-emerald-100 uppercase tracking-widest leading-none">Halaman informasi dan berita</p>
                            </div>
                        </div>
                        
                        <div className="flex items-center gap-2 md:gap-4">
                            <div className="relative hidden sm:block">
                                <Search className="absolute left-3 top-1/2 -translate-y-1/2 text-emerald-200" size={14} />
                                <input 
                                    placeholder="Cari Judul/No/Sumber..." 
                                    className="bg-emerald-700/50 rounded-xl pl-9 pr-4 py-2 text-xs w-32 md:w-56 focus:ring-2 focus:ring-white outline-none font-bold text-white placeholder:text-emerald-200"
                                    value={searchTerm}
                                    onChange={e => setSearchTerm(e.target.value)}
                                />
                            </div>
                            {isAdmin ? (
                                <div className="flex items-center gap-2">
                                    <button onClick={openAddModal} className="bg-white text-emerald-600 px-3 md:px-4 py-2 rounded-xl text-xs font-black flex items-center gap-2 uppercase shadow-md shadow-emerald-800/20">
                                        <Plus size={16} /> <span className="hidden sm:inline">BUAT PENGUMUMAN</span>
                                    </button>
                                    <button onClick={() => setIsAdmin(false)} className="p-2 bg-emerald-700/50 text-emerald-100 rounded-xl hover:text-white transition-colors"><LogOut size={18} /></button>
                                </div>
                            ) : (
                                <button onClick={() => setLoginModal(true)} className="px-3 md:px-4 py-2 rounded-xl text-[10px] font-bold uppercase text-emerald-100 bg-emerald-700/50 flex items-center gap-2 hover:text-white transition-all">
                                    <Lock size={12} /> <span className="hidden sm:inline">Admin Room</span>
                                </button>
                            )}
                        </div>
                    </nav>

                    <div className="flex-1 flex overflow-hidden flex-col md:flex-row">
                        {/* Sidebar */}
                        <aside className="w-full md:w-80 flex-none bg-emerald-50/50 border-b md:border-r border-emerald-100 flex flex-col overflow-hidden h-1/2 md:h-full">
                            <div className="p-4 border-b border-emerald-100 bg-emerald-100/50 flex justify-between items-center">
                                <h3 className="text-[10px] font-black text-emerald-700 uppercase tracking-widest flex items-center gap-2">
                                    <Clock size={12} /> Daftar Pengumuman
                                </h3>
                                {loading && <Loader2 className="animate-spin text-emerald-600" size={12} />}
                            </div>
                            <div className="flex-1 overflow-y-auto p-3 space-y-2">
                                {filtered.map((item, index) => (
                                    <div 
                                        key={item.id} 
                                        onClick={() => setSelected(item)}
                                        className={`p-4 rounded-2xl cursor-pointer transition-all border relative overflow-hidden ${selected?.id === item.id ? 'bg-emerald-600 border-emerald-600 shadow-lg text-white' : 'bg-white border-emerald-100 hover:border-emerald-300 hover:shadow-md'}`}
                                    >
                                        {item.id === data[0]?.id && (
                                            <div className={`absolute top-0 right-0 px-3 py-1 text-[8px] font-black uppercase tracking-tighter rounded-bl-xl flex items-center gap-1 animate-pulse-soft ${selected?.id === item.id ? 'bg-white text-emerald-600' : 'bg-emerald-600 text-white'}`}>
                                                <Sparkles size={8} /> TERBARU
                                            </div>
                                        )}
                                        <div className="flex justify-between items-start mb-2">
                                            <div className={`text-[8px] font-black uppercase px-2 py-0.5 rounded-lg ${selected?.id === item.id ? 'bg-emerald-500 text-white' : 'bg-emerald-50 text-emerald-600'}`}>
                                                {item.prioritas}
                                            </div>
                                            <div className={`text-[8px] font-bold ${selected?.id === item.id ? 'text-emerald-100' : 'text-emerald-400'}`}>
                                                {new Date(item.tgl).toLocaleDateString('id-ID')}
                                            </div>
                                        </div>
                                        <h4 className={`font-black uppercase tracking-tight leading-tight mb-1 line-clamp-2 ${selected?.id === item.id ? 'text-white' : 'text-emerald-900'}`}>
                                            {item.judul}
                                        </h4>
                                        <div className={`text-[9px] font-bold uppercase ${selected?.id === item.id ? 'text-emerald-100' : 'text-emerald-600'}`}>
                                            {item.sumber}
                                        </div>
                                    </div>
                                ))}
                                {filtered.length === 0 && (
                                    <div className="p-8 text-center text-slate-400">
                                        <Search size={32} className="mx-auto mb-2 opacity-20" />
                                        <p className="text-[10px] font-black uppercase">Tidak ada pengumuman</p>
                                    </div>
                                )}
                            </div>
                        </aside>

                        {/* Content Area */}
                        <main className="flex-1 bg-slate-100 overflow-y-auto p-4 md:p-8">
                            {selected ? (
                                <div className="max-w-5xl mx-auto space-y-6">
                                    <div className="bg-white p-6 md:p-8 rounded-[2.5rem] shadow-xl shadow-slate-200/50 border border-white">
                                        <div className="flex flex-col md:flex-row md:items-start justify-between gap-6 mb-8">
                                            <div className="space-y-2">
                                                <div className="flex flex-wrap items-center gap-2">
                                                    <span className="text-[10px] font-black text-emerald-600 uppercase tracking-widest">{selected.no}</span>
                                                    <span className="text-slate-300">•</span>
                                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{new Date(selected.tgl).toLocaleDateString('id-ID')}</span>
                                                    <span className="text-slate-300">•</span>
                                                    <div className="flex items-center gap-1.5 px-2 py-0.5 bg-slate-100 rounded-full">
                                                        <Building2 size={10} className="text-slate-500" />
                                                        <span className="text-[9px] font-black text-slate-600 uppercase tracking-tight">{selected.sumber}</span>
                                                    </div>
                                                    <span className="text-slate-300">•</span>
                                                    <span className="text-[10px] font-black text-slate-400 uppercase tracking-widest">{selected.prioritas}</span>
                                                </div>
                                                <h2 className="text-xl md:text-2xl font-black text-slate-900 uppercase tracking-tighter leading-tight">
                                                    {selected.judul}
                                                </h2>
                                            </div>
                                            <div className="flex gap-2 w-full md:w-auto">
                                                {isAdmin && (
                                                    <>
                                                        <button 
                                                            onClick={() => openEditModal(selected)} 
                                                            className="flex-1 md:flex-none p-3 bg-amber-50 text-amber-600 rounded-2xl hover:bg-amber-100 transition-colors"
                                                            title="Edit"
                                                        >
                                                            <Pencil size={18} />
                                                        </button>
                                                        <button 
                                                            onClick={() => deleteItem(selected.id)} 
                                                            className="flex-1 md:flex-none p-3 bg-red-50 text-red-600 rounded-2xl hover:bg-red-100 transition-colors"
                                                            title="Hapus"
                                                        >
                                                            <Trash2 size={18} />
                                                        </button>
                                                    </>
                                                )}
                                                <a 
                                                    href={selected.pdf} 
                                                    target="_blank"
                                                    className="flex-[2] md:flex-none bg-slate-900 text-white px-6 py-3 rounded-2xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 shadow-lg shadow-slate-200"
                                                >
                                                    <Download size={14} /> Download PDF
                                                </a>
                                            </div>
                                        </div>
                                        
                                        <div className="prose prose-slate max-w-none mb-10">
                                            <p className="text-slate-600 font-bold leading-relaxed whitespace-pre-wrap">{selected.konten}</p>
                                        </div>

                                        <div className="border-t pt-10">
                                            <PDFToPhoto url={selected.pdf} />
                                        </div>
                                    </div>
                                </div>
                            ) : (
                                <div className="h-full flex flex-col items-center justify-center text-slate-300">
                                    <Eye size={64} className="opacity-20 mb-4" />
                                    <p className="text-xs font-black uppercase tracking-[0.3em]">Pilih pengumuman untuk melihat detail</p>
                                </div>
                            )}
                        </main>
                    </div>

                    {/* Modal Input (Add / Edit) */}
                    {isModalOpen && (
                        <div className="fixed inset-0 z-50 bg-slate-900/50 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white w-full max-w-xl rounded-[2.5rem] shadow-2xl overflow-hidden flex flex-col max-h-[95vh]">
                                <div className="p-6 border-b flex justify-between items-center bg-white sticky top-0 z-10">
                                    <div className="flex items-center gap-3">
                                        <div className="bg-emerald-600 p-2 rounded-xl text-white">
                                            {isEditMode ? <Pencil size={18}/> : <Plus size={18}/>}
                                        </div>
                                        <h2 className="font-black uppercase text-xs tracking-widest text-slate-800">
                                            {isEditMode ? 'Edit Dokumen' : 'ENTRI PENGUMUMAN'}
                                        </h2>
                                    </div>
                                    <button onClick={() => setIsModalOpen(false)} className="p-2 text-slate-400 rounded-full hover:bg-red-50 hover:text-red-500 transition-all"><X size={18}/></button>
                                </div>

                                <form onSubmit={save} className="flex-1 overflow-y-auto p-6 space-y-6">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-500 uppercase">Nomor Dokumen</label>
                                            <input required placeholder="NOMOR/PENG/2024" className="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-xs font-black uppercase focus:ring-4 focus:ring-blue-500/10 outline-none" value={form.no} onChange={e => setForm({...form, no: e.target.value.toUpperCase()})} />
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-500 uppercase">Tanggal Terbit</label>
                                            <input type="date" required className="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-xs font-black focus:ring-4 focus:ring-blue-500/10 outline-none" value={form.tgl} onChange={e => setForm({...form, tgl: e.target.value})} />
                                        </div>
                                    </div>

                                    <div className="space-y-2">
                                        <div className="flex justify-between items-center">
                                            <label className="text-[10px] font-black text-slate-500 uppercase">Sumber Informasi</label>
                                            <button type="button" onClick={() => setIsAddingNewSource(!isAddingNewSource)} className="text-[10px] font-black text-blue-600 uppercase">
                                                {isAddingNewSource ? 'Pilih Dari Daftar' : '+ Tambah Sumber Baru'}
                                            </button>
                                        </div>
                                        {!isAddingNewSource ? (
                                            <select className="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-xs font-black uppercase outline-none focus:ring-4 focus:ring-blue-500/10" value={form.sumber} onChange={e => setForm({...form, sumber: e.target.value})}>
                                                {sources.map(s => <option key={s} value={s}>{s}</option>)}
                                            </select>
                                        ) : (
                                            <div className="relative">
                                                <input 
                                                    autoFocus
                                                    placeholder="NAMA SUMBER BARU..." 
                                                    className="w-full bg-blue-50 border-2 border-blue-200 rounded-2xl p-4 text-xs font-black uppercase outline-none focus:ring-4 focus:ring-blue-500/20" 
                                                    value={newSourceInput} 
                                                    onChange={e => setNewSourceInput(e.target.value.toUpperCase())}
                                                />
                                                <Building2 className="absolute right-4 top-1/2 -translate-y-1/2 text-blue-500" size={16} />
                                            </div>
                                        )}
                                    </div>

                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-500 uppercase">Judul Pengumuman</label>
                                        <input required placeholder="MASUKKAN JUDUL..." className="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-xs font-black uppercase focus:ring-4 focus:ring-blue-500/10 outline-none" value={form.judul} onChange={e => setForm({...form, judul: e.target.value.toUpperCase()})} />
                                    </div>

                                    <div className="space-y-2">
                                        <label className="text-[10px] font-black text-slate-500 uppercase">Ringkasan / Konten</label>
                                        <textarea rows="4" required placeholder="Tuliskan isi pengumuman....." className="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-xs font-bold outline-none focus:ring-4 focus:ring-blue-500/10 resize-none" value={form.konten} onChange={e => setForm({...form, konten: e.target.value})} />
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-500 uppercase">Prioritas</label>
                                            <select className="w-full bg-slate-50 border border-slate-200 rounded-2xl p-4 text-xs font-black uppercase outline-none focus:ring-4 focus:ring-blue-500/10" value={form.prioritas} onChange={e => setForm({...form, prioritas: e.target.value})}>
                                                <option value="Normal">Normal</option>
                                                <option value="Penting">Penting</option>
                                                <option value="Sangat Penting">Sangat Penting</option>
                                                <option value="Segera">Segera</option>
                                            </select>
                                        </div>
                                        <div className="space-y-2">
                                            <label className="text-[10px] font-black text-slate-500 uppercase">File PDF</label>
                                            <div className="relative">
                                                <input type="file" accept=".pdf" className="hidden" id="pdf-upload" onChange={handleFileUpload} />
                                                <label htmlFor="pdf-upload" className="w-full bg-slate-50 border-2 border-dashed border-slate-200 rounded-2xl p-4 flex flex-col items-center justify-center cursor-pointer hover:border-blue-400 hover:bg-blue-50 transition-all group">
                                                    <FileUp className="text-slate-400 group-hover:text-blue-500 mb-1" size={20} />
                                                    <span className="text-[9px] font-black uppercase text-slate-400 group-hover:text-blue-600">
                                                        {form.fileName || 'Klik untuk Unggah PDF'}
                                                    </span>
                                                </label>
                                            </div>
                                        </div>
                                    </div>

                                    {errorMsg && (
                                        <div className="bg-red-50 p-4 rounded-2xl border border-red-100 flex items-center gap-3 text-red-600">
                                            <AlertTriangle size={18} />
                                            <p className="text-[10px] font-black uppercase">{errorMsg}</p>
                                        </div>
                                    )}
                                    
                                    <div className="pt-4 flex gap-3">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="flex-1 bg-slate-100 text-slate-500 font-black py-4 rounded-2xl uppercase text-[10px]">Batal</button>
                                        <button type="submit" disabled={loading} className="flex-[2] bg-blue-600 text-white font-black py-4 rounded-2xl uppercase text-[10px] shadow-xl flex items-center justify-center gap-2">
                                            {loading && <Loader2 className="animate-spin" size={14} />}
                                            {isEditMode ? 'Update' : 'Terbitkan'}
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Login Modal */}
                    {loginModal && (
                        <div className="fixed inset-0 z-[100] bg-slate-900/80 backdrop-blur-sm flex items-center justify-center p-4">
                            <div className="bg-white p-8 rounded-[2rem] shadow-2xl text-center w-full max-w-xs space-y-6">
                                <div className="mx-auto w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-2">
                                    <Lock size={20} />
                                </div>
                                <h2 className="font-black text-sm uppercase text-slate-800">Admin Login</h2>
                                <form onSubmit={handleLogin} className="space-y-4">
                                    <input 
                                        type="password" 
                                        autoFocus
                                        autoComplete="new-password"
                                        placeholder="PIN KEAMANAN" 
                                        className="w-full bg-slate-100 p-4 rounded-xl text-center text-xl font-black tracking-widest outline-none border-2 border-transparent focus:border-blue-500 transition-all" 
                                        value={pin}
                                        onChange={e => setPin(e.target.value)}
                                    />
                                    {errorMsg && <p className="text-red-500 text-[10px] font-black uppercase">{errorMsg}</p>}
                                    <div className="flex gap-2">
                                        <button type="button" onClick={() => {setLoginModal(false); setPin(''); setErrorMsg('');}} className="flex-1 py-3 bg-slate-100 text-slate-500 font-black rounded-xl text-[10px] uppercase">Batal</button>
                                        <button type="submit" className="flex-1 py-3 bg-blue-600 text-white font-black rounded-xl text-[10px] uppercase shadow-lg shadow-blue-200">Masuk</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <script>
        // Sinyal aktivitas ke induk untuk mencegah logout otomatis
        ['mousedown', 'keypress', 'touchstart'].forEach(evt => {
            document.addEventListener(evt, () => {
                if (window.parent !== window) {
                    window.parent.postMessage('resetSession', '*');
                }
            }, true);
        });
    </script>
</body>
</html>
