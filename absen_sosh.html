<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rekap Absensi PM - SIPM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            max-width: 100%;
            margin: 0;
            background-color: transparent;
        }
        .emerald-toska-gradient { background: linear-gradient(135deg, #0d9488 0%, #059669 100%); }
        .active-tab { background-color: white; color: #000000; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); }
        [v-cloak] { display: none; }
    </style>
</head>
<body class="min-h-screen bg-slate-50 text-slate-800 pb-10">

    <!-- Toast Notification -->
    <div id="toast" class="fixed top-6 left-1/2 -translate-x-1/2 z-[100] flex items-center gap-3 px-6 py-3 rounded-xl shadow-xl border opacity-0 transition-all pointer-events-none duration-300">
        <span id="toast-message" class="text-xs font-bold uppercase tracking-wider text-white"></span>
    </div>

    <!-- PIN Modal -->
    <div id="modal-pin" class="fixed inset-0 z-[150] flex items-center justify-center bg-slate-900/40 backdrop-blur-sm p-4 hidden">
        <div class="bg-white w-full max-w-xs rounded-2xl p-6 shadow-2xl">
            <h3 id="pin-modal-title" class="text-center font-black text-slate-800 mb-4 uppercase text-xs tracking-widest">Verifikasi PIN</h3>
            <p class="text-[9px] text-center text-slate-400 font-bold mb-4 uppercase tracking-tighter">Masukkan PIN untuk melanjutkan</p>
            <input type="tel" id="pin-input-absensi" class="w-full text-center text-3xl font-black py-4 bg-white border-2 border-slate-200 rounded-2xl mb-4 outline-none focus:border-emerald-500 focus:ring-4 focus:ring-emerald-100 relative z-[200] text-slate-900 shadow-inner" placeholder="..." autocomplete="off" inputmode="numeric" pattern="[0-9]*">
            <div class="grid grid-cols-2 gap-2">
                <button onclick="closePinModal()" class="py-2 text-[10px] font-black uppercase text-slate-400">Batal</button>
                <button id="btn-verify-pin" class="py-2 bg-indigo-600 text-white rounded-lg text-[10px] font-black uppercase tracking-widest shadow-lg shadow-indigo-100">Verifikasi</button>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-emerald-600 sticky top-0 z-40 px-6 py-3 shadow-lg shadow-emerald-100 rounded-b-2xl">
        <div class="flex items-center justify-between gap-4">
            <div class="flex items-center gap-4">
                <div class="p-2.5 bg-white/20 backdrop-blur-md rounded-xl shadow-inner border border-white/20">
                    <i class="fas fa-users text-black"></i>
                </div>
                <div class="hidden sm:block">
                    <h1 class="text-sm font-black text-black uppercase tracking-tight leading-none">REKAP ABSENSI PM</h1>
                    <p class="text-[10px] text-emerald-900 font-bold uppercase tracking-widest mt-0.5">Per Periode Pemesanan SOSH</p>
                </div>
            </div>

            <div class="flex bg-emerald-700/40 p-1 rounded-xl backdrop-blur-sm border border-white/10">
                <button id="tab-input" onclick="switchTab('input')" class="flex items-center gap-2 px-5 py-2 rounded-lg transition-all text-[11px] font-black uppercase tracking-wider text-black hover:bg-white/10">
                    <i class="fas fa-plus-circle"></i> <span>Input</span>
                </button>
                <button id="tab-history" onclick="switchTab('history')" class="flex items-center gap-2 px-5 py-2 rounded-lg transition-all text-[11px] font-black uppercase tracking-wider text-black hover:bg-white/10 active-tab">
                    <i class="fas fa-history"></i> Riwayat
                </button>
            </div>
        </div>
    </header>

    <main class="p-4 md:p-8">
        <!-- Input Section -->
        <section id="section-input" class="max-w-2xl mx-auto hidden">
            <div class="bg-white rounded-[24px] shadow-sm border border-slate-200 overflow-hidden">
                <div class="bg-slate-50/80 px-6 py-4 border-b border-slate-100">
                    <h2 id="form-title" class="text-[11px] font-black text-black uppercase tracking-[0.2em]">Input Laporan Baru</h2>
                </div>
                <form id="form-absensi" class="p-6 md:p-8 space-y-6">
                    <input type="hidden" id="edit-id">
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div class="space-y-1.5">
                            <label class="text-[10px] font-black text-black uppercase tracking-widest ml-1">Unit Pelayanan</label>
                            <select id="form-unit" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 text-xs font-bold transition-all" required>
                                <option value="">Pilih Unit...</option>
                                <option value="PPSDI Raharjo">PPSDI Raharjo</option>
                                <option value="RPSLU Mojomulyo">RPSLU Mojomulyo</option>
                                <option value="RPSA Pamardi Siwi">RPSA Pamardi Siwi</option>
                                <option value="RPS PMKS Gondang">RPS PMKS Gondang</option>
                            </select>
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="space-y-1.5">
                                <label class="text-[10px] font-black text-black uppercase tracking-widest ml-1">Bulan</label>
                                <input type="month" id="form-bulan" class="w-full px-3 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-xs font-bold transition-all" required>
                            </div>
                            <div class="space-y-1.5">
                                <label class="text-[10px] font-black text-black uppercase tracking-widest ml-1">Periode</label>
                                <select id="form-periode" class="w-full px-3 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none text-xs font-bold transition-all" required>
                                    <option value="">Pilih...</option>
                                    <option value="I (Satu)">P I (Satu)</option>
                                    <option value="II (Dua)">P II (Dua)</option>
                                    <option value="III (Tiga)">P III (Tiga)</option>
                                </select>
                            </div>
                        </div>
                    </div>
                    <div class="grid grid-cols-3 gap-4">
                        <div class="p-4 bg-blue-50/40 border border-blue-100 rounded-2xl group transition-all">
                            <label class="text-[9px] font-black text-blue-700 uppercase block mb-1 tracking-widest">Laki-Laki</label>
                            <input type="number" id="form-laki" placeholder="0" class="w-full bg-transparent text-3xl font-black outline-none text-blue-700 placeholder:text-blue-300" required>
                        </div>
                        <div class="p-4 bg-rose-50/40 border border-rose-100 rounded-2xl group transition-all">
                            <label class="text-[9px] font-black text-rose-700 uppercase block mb-1 tracking-widest">Perempuan</label>
                            <input type="number" id="form-perempuan" placeholder="0" class="w-full bg-transparent text-3xl font-black outline-none text-rose-700 placeholder:text-rose-300" required>
                        </div>
                        <div class="p-4 bg-indigo-600 rounded-2xl flex flex-col justify-center shadow-lg shadow-indigo-100">
                            <label class="text-[9px] font-black text-white uppercase block mb-1 tracking-widest">Total</label>
                            <div id="form-total" class="text-3xl font-black text-white">0</div>
                        </div>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-black text-black uppercase tracking-widest ml-1">Keterangan Tambahan</label>
                        <textarea id="form-keterangan" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:border-indigo-500 text-xs font-medium min-h-[80px]" placeholder="Catatan tambahan (opsional)..."></textarea>
                    </div>
                    <div class="flex gap-3 pt-4">
                        <button type="button" id="btn-cancel" onclick="switchTab('history')" class="flex-1 py-4 border border-slate-200 text-slate-400 font-black text-[11px] rounded-2xl uppercase tracking-[0.2em] transition-all hover:bg-slate-50 hidden">Batal</button>
                        <button type="submit" id="btn-submit" class="flex-[2] py-4 bg-indigo-600 text-white font-black text-[11px] rounded-2xl uppercase tracking-[0.2em] shadow-xl shadow-indigo-100 flex items-center justify-center gap-3 transition-all hover:bg-indigo-700 active:scale-95">
                            <i class="fas fa-save"></i> <span>Simpan Laporan</span>
                        </button>
                    </div>
                </form>
            </div>
        </section>

        <!-- History Section -->
        <section id="section-history" class="space-y-6">
            <!-- Latest Status Cards -->
            <div>
                <div class="flex items-center gap-2 mb-3 ml-1">
                    <i class="fas fa-building text-emerald-600"></i>
                    <h2 class="text-[10px] font-black text-black uppercase tracking-widest">Update Terakhir Per Unit</h2>
                </div>
                <div id="unit-stats-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-3">
                    <!-- Unit Stats dynamically loaded -->
                </div>
            </div>

            <!-- Filter & Table -->
            <div class="space-y-6 pt-2">
                <div class="bg-white p-4 rounded-3xl border border-slate-200 shadow-sm flex flex-wrap gap-3 items-end">
                    <div class="flex-1 min-w-[200px]">
                        <label class="text-[10px] font-black text-black uppercase block mb-2 tracking-widest ml-1">Filter Unit</label>
                        <select id="filter-unit" class="w-full px-3 py-2 bg-slate-50 rounded-xl text-[10px] font-black outline-none border border-slate-100 focus:border-indigo-200">
                            <option value="Semua">Semua Unit</option>
                            <option value="PPSDI Raharjo">PPSDI Raharjo</option>
                            <option value="RPSLU Mojomulyo">RPSLU Mojomulyo</option>
                            <option value="RPSA Pamardi Siwi">RPSA Pamardi Siwi</option>
                            <option value="RPS PMKS Gondang">RPS PMKS Gondang</option>
                        </select>
                    </div>
                    <div class="w-24">
                        <label class="text-[10px] font-black text-black uppercase block mb-2 tracking-widest ml-1">Periode</label>
                        <select id="filter-periode" class="w-full px-3 py-2 bg-slate-50 rounded-xl text-[10px] font-black outline-none border border-slate-100 focus:border-indigo-200">
                            <option value="Semua">Semua</option>
                            <option value="I (Satu)">P I</option>
                            <option value="II (Dua)">P II</option>
                            <option value="III (Tiga)">P III</option>
                        </select>
                    </div>
                    <div class="w-36">
                        <label class="text-[10px] font-black text-black uppercase block mb-2 tracking-widest ml-1">Bulan</label>
                        <input type="month" id="filter-bulan" class="w-full px-3 py-2 bg-slate-50 rounded-xl text-[10px] font-black outline-none border border-slate-100 focus:border-indigo-200 h-[33px]">
                    </div>
                    <div class="flex gap-2">
                        <button onclick="handleBackup()" class="flex items-center gap-2 px-4 py-2 bg-indigo-100 text-indigo-600 rounded-lg font-black text-[9px] uppercase tracking-widest hover:bg-indigo-600 hover:text-white transition-all">
                            <i class="fas fa-cloud-download-alt"></i> Backup
                        </button>
                        <button onclick="document.getElementById('restore-input').click()" class="flex items-center gap-2 px-4 py-2 bg-amber-100 text-amber-600 rounded-lg font-black text-[9px] uppercase tracking-widest hover:bg-amber-600 hover:text-white transition-all">
                            <i class="fas fa-cloud-upload-alt"></i> Restore
                        </button>
                        <input type="file" id="restore-input" class="hidden" accept=".json" onchange="handleRestore(event)">
                        
                        <button onclick="resetFilters()" class="p-2 bg-slate-100 text-slate-400 rounded-lg hover:bg-slate-200 transition-colors">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                        <button onclick="handleExport()" class="flex items-center gap-2 px-4 py-2 bg-emerald-600 text-white rounded-lg font-black text-[9px] uppercase tracking-widest shadow-md shadow-emerald-50 active:scale-95 transition-all">
                            <i class="fas fa-download"></i> Ekspor
                        </button>
                    </div>
                </div>

                <!-- Table -->
                <div class="bg-white rounded-[24px] border border-slate-200 shadow-sm overflow-hidden">
                    <div class="overflow-x-auto">
                        <table class="w-full text-left border-collapse min-w-[800px]">
                            <thead>
                                <tr class="bg-slate-50/50 border-b border-slate-100">
                                    <th class="px-6 py-4 text-[9px] font-black text-black uppercase tracking-widest">Unit Pelayanan</th>
                                    <th class="px-3 py-4 text-[9px] font-black text-black uppercase tracking-widest text-center">Bulan</th>
                                    <th class="px-3 py-4 text-[9px] font-black text-black uppercase tracking-widest text-center">Periode</th>
                                    <th class="px-3 py-4 text-[9px] font-black text-blue-700 uppercase tracking-widest text-center">L</th>
                                    <th class="px-3 py-4 text-[9px] font-black text-rose-700 uppercase tracking-widest text-center">P</th>
                                    <th class="px-3 py-4 text-[9px] font-black text-indigo-700 uppercase tracking-widest text-center">Total</th>
                                    <th class="px-6 py-4 text-[9px] font-black text-black uppercase tracking-widest">Keterangan</th>
                                    <th class="px-6 py-4 text-[9px] font-black text-black uppercase tracking-widest text-right">Aksi</th>
                                </tr>
                            </thead>
                            <tbody id="absensi-table-body" class="divide-y divide-slate-50">
                                <!-- Table rows loaded dynamically -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script>
        // Supabase Configuration
        const SUPABASE_URL = "https://yewkffbatvrbtfliikia.supabase.co";
        const SUPABASE_KEY = "sb_publishable_gh_LzjznODmbTtMBzt5aaA_sFTDMykg";
        const TABLE_NAME = "absensi_pm";
        const LOCK_PIN = "888";

        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let listAbsensi = [];
        let filteredAbsensi = [];
        let currentTab = 'history';

        // --- Core Functions ---

        async function syncData() {
            try {
                const { data, error } = await supabaseClient
                    .from(TABLE_NAME)
                    .select('*')
                    .order('updated_at', { ascending: false });
                
                if (error) throw error;
                listAbsensi = data || [];
                applyFilters();
                updateUnitStats();
            } catch (err) {
                console.error("Sync error:", err);
                showToast("Gagal memuat data", "error");
            }
        }

        function applyFilters() {
            const unit = document.getElementById('filter-unit').value;
            const periode = document.getElementById('filter-periode').value;
            const bulan = document.getElementById('filter-bulan').value;

            filteredAbsensi = listAbsensi.filter(item => {
                const matchUnit = unit === 'Semua' || item.unit_pelayanan === unit;
                const matchPeriode = periode === 'Semua' || item.periode_laporan === periode;
                const matchBulan = !bulan || item.bulan_tahun === bulan;
                return matchUnit && matchPeriode && matchBulan;
            });

            renderTable();
        }

        function updateUnitStats() {
            const units = ["PPSDI Raharjo", "RPSLU Mojomulyo", "RPSA Pamardi Siwi", "RPS PMKS Gondang"];
            const container = document.getElementById('unit-stats-container');
            container.innerHTML = '';

            units.forEach(unitName => {
                const unitData = listAbsensi
                    .filter(item => item.unit_pelayanan === unitName)
                    .sort((a, b) => new Date(b.updated_at) - new Date(a.updated_at));
                
                const latest = unitData[0] || { pm_laki: 0, pm_perempuan: 0, total_pm: 0, updated_at: null };
                
                const card = `
                    <div class="bg-white px-4 py-3 rounded-2xl border-l-4 border-emerald-500 shadow-lg shadow-emerald-100/20 flex flex-col justify-between hover:scale-[1.02] transition-transform duration-300">
                        <div class="flex items-start justify-between mb-1">
                            <h4 class="text-[9px] font-black text-black uppercase leading-tight max-w-[65%]">${unitName}</h4>
                            <div class="flex items-center gap-1 text-[8px] font-bold text-emerald-700 bg-emerald-50 px-1.5 py-0.5 rounded-md border border-emerald-100">
                                <i class="fas fa-clock text-emerald-600"></i> 
                                <span class="whitespace-nowrap">${latest.updated_at ? formatDate(latest.updated_at) : '-'}</span>
                            </div>
                        </div>
                        <div class="flex items-end justify-between">
                            <div class="flex flex-col">
                                <span class="text-lg font-black text-emerald-700 leading-none">${latest.total_pm}</span>
                                <span class="text-[8px] font-black text-emerald-600 uppercase tracking-tighter">Total PM</span>
                            </div>
                            <div class="flex items-center gap-3">
                                <div class="text-center">
                                   <div class="text-[10px] font-black text-blue-700 leading-none">${latest.pm_laki}</div>
                                   <div class="text-[7px] font-bold text-black uppercase">L</div>
                                </div>
                                <div class="text-center border-l border-slate-100 pl-3">
                                   <div class="text-[10px] font-black text-rose-700 leading-none">${latest.pm_perempuan}</div>
                                   <div class="text-[7px] font-bold text-black uppercase">P</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += card;
            });
        }

        function renderTable() {
            const tbody = document.getElementById('absensi-table-body');
            tbody.innerHTML = '';

            if (filteredAbsensi.length === 0) {
                tbody.innerHTML = `<tr><td colSpan="8" class="px-6 py-16 text-center opacity-30">
                    <div class="flex flex-col items-center">
                        <i class="fas fa-history text-4xl text-slate-200 mb-2"></i>
                        <span class="text-[9px] font-black uppercase tracking-widest text-black">Tidak ada data</span>
                    </div>
                </td></tr>`;
                return;
            }

            filteredAbsensi.forEach(item => {
                const row = `
                    <tr class="hover:bg-indigo-50/20 transition-all group ${item.is_locked ? 'bg-slate-50/10' : ''}">
                        <td class="px-6 py-4">
                            <div class="flex items-center gap-2">
                                <span class="font-bold text-black text-[11px]">${item.unit_pelayanan}</span>
                                ${item.is_locked ? '<i class="fas fa-lock text-[10px] text-amber-500"></i>' : ''}
                            </div>
                        </td>
                        <td class="px-3 py-4 text-center text-[10px] font-bold text-black">${item.bulan_tahun}</td>
                        <td class="px-3 py-4 text-center">
                            <span class="px-2 py-0.5 bg-indigo-50 text-indigo-700 text-[9px] font-black rounded-full uppercase border border-indigo-100">${item.periode_laporan}</span>
                        </td>
                        <td class="px-3 py-4 text-center font-bold text-blue-700 text-[11px]">${item.pm_laki}</td>
                        <td class="px-3 py-4 text-center font-bold text-rose-700 text-[11px]">${item.pm_perempuan}</td>
                        <td class="px-3 py-4 text-center font-black text-indigo-700 text-[11px]">${item.total_pm}</td>
                        <td class="px-6 py-4">
                            <div class="flex items-start gap-2 max-w-[300px]">
                                <i class="fas fa-comment-dots text-[10px] text-emerald-600 mt-1 shrink-0"></i>
                                <span class="text-[10px] text-black whitespace-pre-line leading-relaxed">${item.keterangan || '-'}</span>
                            </div>
                        </td>
                        <td class="px-6 py-4 text-center">
                            <div class="flex items-center justify-center gap-1.5">
                                <button onclick="handleEdit('${item.id}')" class="p-1.5 rounded-lg border transition-all ${item.is_locked ? 'text-slate-300 bg-slate-50' : 'text-indigo-600 border-indigo-100 bg-indigo-50 hover:bg-indigo-600 hover:text-white'}" title="Edit"><i class="fas fa-edit text-[12px]"></i></button>
                                <button onclick="handleDelete('${item.id}')" class="p-1.5 rounded-lg border transition-all ${item.is_locked ? 'text-slate-300 bg-slate-50' : 'text-rose-600 border-rose-100 bg-rose-50 hover:bg-rose-600 hover:text-white'}" title="Hapus"><i class="fas fa-trash text-[12px]"></i></button>
                                <button onclick="handleToggleLock('${item.id}', ${item.is_locked})" class="p-1.5 rounded-lg border transition-all ${item.is_locked ? 'text-amber-500 border-amber-200 bg-amber-50 shadow-inner' : 'text-slate-400 border-slate-200 hover:bg-slate-100'}" title="${item.is_locked ? 'Buka Kunci' : 'Kunci'}">
                                    <i class="fas ${item.is_locked ? 'fa-lock' : 'fa-unlock'} text-[12px]"></i>
                                </button>
                            </div>
                        </td>
                    </tr>
                `;
                tbody.innerHTML += row;
            });
        }

        // --- Event Handlers ---

        function switchTab(tab) {
            currentTab = tab;
            document.getElementById('section-input').classList.toggle('hidden', tab !== 'input');
            document.getElementById('section-history').classList.toggle('hidden', tab !== 'history');
            
            document.getElementById('tab-input').classList.toggle('active-tab', tab === 'input');
            document.getElementById('tab-history').classList.toggle('active-tab', tab === 'history');
            
            if (tab === 'history') {
                document.getElementById('edit-id').value = '';
                document.getElementById('form-absensi').reset();
                document.getElementById('form-total').innerText = '0';
                document.getElementById('form-title').innerText = 'Input Laporan Baru';
                document.getElementById('btn-cancel').classList.add('hidden');
                syncData();
            }
        }

        function handleEdit(id) {
            const item = listAbsensi.find(x => x.id === id);
            if (!item) return;
            if (item.is_locked) {
                showToast("Data terkunci!", "error");
                return;
            }

            document.getElementById('edit-id').value = item.id;
            document.getElementById('form-unit').value = item.unit_pelayanan;
            document.getElementById('form-bulan').value = item.bulan_tahun;
            document.getElementById('form-periode').value = item.periode_laporan;
            document.getElementById('form-laki').value = item.pm_laki;
            document.getElementById('form-perempuan').value = item.pm_perempuan;
            document.getElementById('form-keterangan').value = item.keterangan || '';
            document.getElementById('form-total').innerText = item.total_pm;
            
            document.getElementById('form-title').innerText = 'Mode Edit Laporan';
            document.getElementById('btn-cancel').classList.remove('hidden');
            switchTab('input');
        }

        let pendingAction = null;
        function handleToggleLock(id, currentLock) {
            pendingAction = { type: currentLock ? 'unlock' : 'lock', targetId: id };
            openPinModal(currentLock ? 'Buka Kunci Data' : 'Kunci Data');
        }

        function handleDelete(id) {
            const item = listAbsensi.find(x => x.id === id);
            if (item.is_locked) {
                showToast("Buka kunci dahulu untuk menghapus!", "error");
                return;
            }
            pendingAction = { type: 'delete', targetId: id };
            openPinModal('Hapus Data Permanen');
        }

        async function processPendingAction() {
            const pin = document.getElementById('pin-input-absensi').value;
            if (pin !== LOCK_PIN) {
                showToast("PIN Salah!", "error");
                return;
            }

            try {
                if (pendingAction.type === 'delete') {
                    const { error } = await supabaseClient
                        .from(TABLE_NAME)
                        .delete()
                        .eq('id', pendingAction.targetId);
                    
                    if (error) throw error;
                    showToast("Data dihapus!");
                } else {
                    const { error } = await supabaseClient
                        .from(TABLE_NAME)
                        .update({ 
                            is_locked: pendingAction.type === 'lock' 
                        })
                        .eq('id', pendingAction.targetId);
                    
                    if (error) throw error;
                    showToast(pendingAction.type === 'lock' ? "Data dikunci!" : "Kunci dibuka!");
                }
                closePinModal();
                syncData();
            } catch (err) {
                console.error("Action error:", err);
                showToast("Gagal memproses permintaan: " + err.message, "error");
            }
        }

        // --- Form Calculation ---

        function updateTotal() {
            const laki = parseInt(document.getElementById('form-laki').value) || 0;
            const perempuan = parseInt(document.getElementById('form-perempuan').value) || 0;
            document.getElementById('form-total').innerText = laki + perempuan;
        }

        document.getElementById('form-laki').addEventListener('input', updateTotal);
        document.getElementById('form-perempuan').addEventListener('input', updateTotal);

        document.getElementById('form-absensi').onsubmit = async (e) => {
            e.preventDefault();
            const editId = document.getElementById('edit-id').value;
            const laki = parseInt(document.getElementById('form-laki').value) || 0;
            const perempuan = parseInt(document.getElementById('form-perempuan').value) || 0;
            
            const payload = {
                unit_pelayanan: document.getElementById('form-unit').value,
                bulan_tahun: document.getElementById('form-bulan').value,
                periode_laporan: document.getElementById('form-periode').value,
                pm_laki: laki,
                pm_perempuan: perempuan,
                total_pm: laki + perempuan,
                keterangan: document.getElementById('form-keterangan').value,
                updated_at: new Date().toISOString()
            };

            try {
                let res;
                if (editId) {
                    res = await supabaseClient.from(TABLE_NAME).update(payload).eq('id', editId);
                } else {
                    payload.id = 'ABS-' + Math.random().toString(36).substr(2, 9).toUpperCase();
                    res = await supabaseClient.from(TABLE_NAME).insert(payload);
                }

                if (res.error) throw res.error;
                showToast(editId ? "Data diperbarui!" : "Data disimpan!");
                switchTab('history');
            } catch (err) {
                console.error("Save error:", err);
                showToast("Gagal menyimpan data", "error");
            }
        };

        // --- Helpers ---

        function showToast(message, type = 'success') {
            const el = document.getElementById('toast');
            const msgEl = document.getElementById('toast-message');
            msgEl.innerText = message;
            el.className = `fixed top-6 left-1/2 -translate-x-1/2 z-[100] flex items-center gap-3 px-6 py-3 rounded-xl shadow-xl border transition-all duration-300 ${type === 'success' ? 'bg-emerald-600 border-emerald-500' : 'bg-rose-600 border-rose-500'} opacity-100`;
            setTimeout(() => { el.classList.replace('opacity-100', 'opacity-0'); }, 3000);
        }

        function formatDate(isoString) {
            if (!isoString) return '-';
            const date = new Date(isoString);
            return date.toLocaleDateString('id-ID', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
        }

        function openPinModal(title) {
            document.getElementById('pin-modal-title').innerText = title;
            document.getElementById('modal-pin').classList.remove('hidden');
            document.getElementById('pin-input-absensi').value = '';
            setTimeout(() => document.getElementById('pin-input-absensi').focus(), 100);
        }

        function closePinModal() {
            document.getElementById('modal-pin').classList.add('hidden');
            pendingAction = null;
        }

        document.getElementById('btn-verify-pin').onclick = processPendingAction;
        
        // Handle stopPropagation for iframe typing
        const pinInputEl = document.getElementById('pin-input-absensi');
        pinInputEl.onkeypress = (e) => {
            e.stopPropagation();
            if (e.key === 'Enter') processPendingAction();
        };
        pinInputEl.onkeydown = (e) => e.stopPropagation();

        async function handleBackup() {
            const dataStr = JSON.stringify(listAbsensi, null, 2);
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `backup_absensi_${new Date().toISOString().split('T')[0]}.json`;
            a.click();
            showToast("Backup berhasil diunduh");
        }

        async function handleRestore(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = async (e) => {
                try {
                    const data = JSON.parse(e.target.result);
                    const { error } = await supabaseClient.from(TABLE_NAME).upsert(data);
                    if (error) throw error;
                    showToast("Data berhasil dipulihkan!");
                    syncData();
                } catch (err) {
                    showToast("Gagal memulihkan data: " + err.message, "error");
                }
            };
            reader.readAsText(file);
        }

        function handleExport() {
            const worksheet = XLSX.utils.json_to_sheet(filteredAbsensi);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Absensi");
            XLSX.writeFile(workbook, `rekap_absensi_${new Date().toISOString().split('T')[0]}.xlsx`);
            showToast("Data diekspor ke Excel");
        }

        function resetFilters() {
            document.getElementById('filter-unit').value = 'Semua';
            document.getElementById('filter-periode').value = 'Semua';
            document.getElementById('filter-bulan').value = '';
            applyFilters();
        }

        // Event listeners for filters
        document.getElementById('filter-unit').addEventListener('change', applyFilters);
        document.getElementById('filter-periode').addEventListener('change', applyFilters);
        document.getElementById('filter-bulan').addEventListener('change', applyFilters);

        // Initial Load
        syncData();
    </script>
    <script>
        // Sinyal aktivitas ke induk untuk mencegah logout otomatis
        ['mousedown', 'keypress', 'touchstart'].forEach(evt => {
            document.addEventListener(evt, () => {
                if (window.parent !== window) {
                    window.parent.postMessage('resetSession', '*');
                }
            }, true);
        });
    </script>
</body>
</html>
