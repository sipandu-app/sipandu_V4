<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem SPPD Terpadu - PPSDI Raharjo</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap');

        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        body {
            background-color: #f8fafc;
            font-family: 'Plus Jakarta Sans', sans-serif;
            color: #1e293b;
        }

        .wa-green {
            background-color: #25d366;
        }

        .wa-green:hover {
            background-color: #1ea952;
        }

        .mono {
            font-family: 'JetBrains Mono', monospace;
        }

        .dots-separator {
            border-top: 1px dotted #cbd5e1;
            height: 0;
            width: 100%;
            margin: 0.5rem 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: fadeIn 0.2s ease-out forwards;
        }

        .input-focus:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .custom-shadow {
            box-shadow: 0 20px 50px -12px rgba(0, 0, 0, 0.08);
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <!-- Scripts -->
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone@7.23.5/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // --- CONFIG ---
        const SUPABASE_URL = "https://yewkffbatvrbtfliikia.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_gh_LzjznODmbTtMBzt5aaA_sFTDMykg";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        const TABLE_NAME = 'sppd_data';
        const TABLE_PEGAWAI = 'data_pegawai';
        const MASTER_PIN = '888';

        // --- ICONS ---
        const Icon = ({ path, size = 18, className = '', viewBox = "0 0 24 24" }) => (
            <svg className={className} width={size} height={size} fill="none" viewBox={viewBox} stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                {path}
            </svg>
        );
        const Trash2 = (p) => <Icon {...p} path={<><path d="M3 6h18" /><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6" /><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2" /><line x1="10" y1="11" x2="10" y2="17" /><line x1="14" y1="11" x2="14" y2="17" /></>} />;
        const Download = (p) => <Icon {...p} path={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="7 10 12 15 17 10" /><line x1="12" y1="15" x2="12" y2="3" /></>} />;
        const Upload = (p) => <Icon {...p} path={<><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4" /><polyline points="17 8 12 3 7 8" /><line x1="12" y1="3" x2="12" y2="15" /></>} />;
        const Unlock = (p) => <Icon {...p} path={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></>} />;
        const User = (p) => <Icon {...p} path={<><path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" /><circle cx="12" cy="7" r="4" /></>} />;
        const MapPin = (p) => <Icon {...p} path={<><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" /><circle cx="12" cy="10" r="3" /></>} />;
        const FileText = (p) => <Icon {...p} path={<><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z" /><polyline points="14 2 14 8 20 8" /><line x1="16" y1="13" x2="8" y2="13" /><line x1="16" y1="17" x2="8" y2="17" /><line x1="10" y1="9" x2="8" y2="9" /></>} />;
        const BarChart3 = (p) => <Icon {...p} path={<><path d="M3 3v18h18" /><path d="M18 17V9" /><path d="M13 17V5" /><path d="M8 17v-3" /></>} />;
        const Plus = (p) => <Icon {...p} path={<><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></>} />;
        const History = (p) => <Icon {...p} path={<><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8" /><path d="M3 3v5h5" /><path d="M12 7v5l4 2" /></>} />;
        const Settings = (p) => <Icon {...p} path={<><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.1a2 2 0 0 1-1-1.72v-.51a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" /><circle cx="12" cy="12" r="3" /></>} />;
        const Edit2 = (p) => <Icon {...p} path={<path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z" />} />;
        const Lock = (p) => <Icon {...p} path={<><rect x="3" y="11" width="18" height="11" rx="2" ry="2" /><path d="M7 11V7a5 5 0 0 1 10 0v4" /></>} />;
        const X = (p) => <Icon {...p} path={<path d="M18 6 6 18M6 6l12 12" />} />;

        // --- UTILS ---
        const formatNumber = (num) => new Intl.NumberFormat('id-ID').format(num || 0);
        const parseCurrency = (str) => parseInt(str.toString().replace(/\D/g, '')) || 0;

        function App() {
            const [data, setData] = useState([]);
            const [pegawaiList, setPegawaiList] = useState([]);
            const [loading, setLoading] = useState(true);
            const [notif, setNotif] = useState(null);
            const [waPhone, setWaPhone] = useState('812');
            const [form, setForm] = useState({
                tanggal_bp: new Date().toISOString().split('T')[0],
                no_bp: '',
                ssk: '',
                kegiatan: '',
                penerima: [''],
                sppd: 0,
                bensin: 0,
                tol: 0,
                hotel: 0
            });
            const [pinModal, setPinModal] = useState({ show: false, type: '', extra: null });
            const [pinInput, setPinInput] = useState('');
            const [filters, setFilters] = useState({ ssk: '', date: '', startMonth: '', endMonth: '' });
            const [suggestions, setSuggestions] = useState({ show: false, index: -1, list: [] });
            const [editingId, setEditingId] = useState(null);
            const [activeTab, setActiveTab] = useState('input');
            const reportRef = useRef();

            const showNotif = (msg, type = 'success') => {
                setNotif({ msg, type });
                setTimeout(() => setNotif(null), 3000);
            };

            const fetchData = async () => {
                const { data: res, error } = await supabaseClient.from(TABLE_NAME).select('*').order('created_at', { ascending: false });
                if (!error) setData(res);

                const { data: peg } = await supabaseClient.from(TABLE_PEGAWAI).select('nama, nip, jabatan, pangkat_golongan, no_hp');
                if (peg) setPegawaiList(peg);

                setLoading(false);
            };

            useEffect(() => { fetchData(); }, []);

            const totalBayar = useMemo(() => form.sppd + form.bensin + form.tol + form.hotel, [form]);

            const handlePenerimaChange = (idx, val) => {
                const newPenerima = [...form.penerima];
                newPenerima[idx] = val;
                setForm({ ...form, penerima: newPenerima });

                if (val.length > 2) {
                    const filtered = pegawaiList.filter(p => p.nama.toLowerCase().includes(val.toLowerCase()));
                    setSuggestions({ show: true, index: idx, list: filtered });
                } else {
                    setSuggestions({ show: false, index: -1, list: [] });
                }
            };

            const selectSuggestion = (peg, idx) => {
                const newPenerima = [...form.penerima];
                newPenerima[idx] = peg.nama;
                setForm({ ...form, penerima: newPenerima });

                // Ambil nomor telpon otomatis
                if (peg.no_hp) {
                    const cleanPhone = peg.no_hp.replace(/\D/g, '');
                    if (cleanPhone.startsWith('62')) setWaPhone(cleanPhone.substring(2));
                    else if (cleanPhone.startsWith('0')) setWaPhone(cleanPhone.substring(1));
                    else setWaPhone(cleanPhone);
                }

                setSuggestions({ show: false, index: -1, list: [] });
            };

            const addPenerima = () => setForm({ ...form, penerima: [...form.penerima, ''] });
            const removePenerima = (idx) => {
                const newPenerima = form.penerima.filter((_, i) => i !== idx);
                setForm({ ...form, penerima: newPenerima.length ? newPenerima : [''] });
            };

            const handleSave = async () => {
                if (!form.tanggal_bp || !form.ssk || !form.penerima[0]) return alert("Lengkapi Tanggal, SSK, dan Penerima!");

                setLoading(true);
                const payload = {
                    ...form,
                    penerima: form.penerima.filter(p => p.trim() !== ''),
                    total: totalBayar
                };

                let res;
                if (editingId) {
                    res = await supabaseClient.from(TABLE_NAME).update(payload).eq('id', editingId);
                } else {
                    res = await supabaseClient.from(TABLE_NAME).insert([payload]);
                }

                if (res.error) {
                    setLoading(false);
                    return showNotif("Gagal: " + res.error.message, "error");
                }

                if (!editingId) {
                    showNotif("Menyimpan & Mengunduh Bukti...", "info");
                    const canvas = await html2canvas(reportRef.current, { scale: 2, useCORS: true, backgroundColor: "#ffffff" });
                    const link = document.createElement('a');
                    link.download = `BP-${form.no_bp || 'SPPD'}-${form.tanggal_bp}.png`;
                    link.href = canvas.toDataURL("image/png");
                    link.click();

                    const msg = `*LAPORAN OPERASIONAL PPS RAHARJO*\n---------------------------\nTanggal: ${form.tanggal_bp}\nSSK: ${form.ssk}\nPenerima: ${form.penerima.filter(p => p).join(', ')}\nTotal: Rp ${formatNumber(totalBayar)}\n\n_Bukti gambar telah diunduh, silakan lampirkan._`;
                    window.open(`https://wa.me/62${waPhone}?text=${encodeURIComponent(msg)}`, '_blank');
                    showNotif("Data Berhasil Disimpan!");
                } else {
                    showNotif("Data Berhasil Diperbarui!");
                }

                setEditingId(null);
                setForm({
                    tanggal_bp: new Date().toISOString().split('T')[0],
                    no_bp: '', ssk: '', kegiatan: '', penerima: [''],
                    sppd: 0, bensin: 0, tol: 0, hotel: 0
                });
                fetchData();
                setActiveTab('riwayat');
            };

            const handleEdit = (item) => {
                if (item.is_locked) return showNotif("Data terkunci!", "error");
                setForm({
                    tanggal_bp: item.tanggal_bp,
                    no_bp: item.no_bp || '',
                    ssk: item.ssk || '',
                    kegiatan: item.kegiatan || '',
                    penerima: item.penerima && item.penerima.length ? item.penerima : [''],
                    sppd: item.sppd || 0,
                    bensin: item.bensin || 0,
                    tol: item.tol || 0,
                    hotel: item.hotel || 0
                });
                setEditingId(item.id);
                setActiveTab('input');
                window.scrollTo({ top: 0, behavior: 'smooth' });
                showNotif("Mode Edit Aktif", "info");
            };

            const handleDelete = (id) => {
                const item = data.find(d => d.id === id);
                if (item && item.is_locked) return showNotif("Data terkunci!", "error");
                setPinModal({ show: true, type: 'delete', extra: id });
            };

            const handleToggleLock = (item) => {
                setPinModal({ 
                    show: true, 
                    type: item.is_locked ? 'unlock' : 'lock', 
                    extra: item.id 
                });
            };

            const handlePinSubmit = async (val) => {
                if (val !== MASTER_PIN) {
                    showNotif("PIN Salah!", "error");
                    setPinInput('');
                    return;
                }

                if (pinModal.type === 'delete') {
                    const { error } = await supabaseClient.from(TABLE_NAME).delete().eq('id', pinModal.extra);
                    if (error) {
                        showNotif("Gagal Hapus: " + error.message, "error");
                    } else {
                        showNotif("Data Berhasil Dihapus!");
                        fetchData();
                    }
                } else if (pinModal.type === 'restore') {
                    await performRestore(pinModal.extra);
                } else if (pinModal.type === 'lock' || pinModal.type === 'unlock') {
                    const isLocking = pinModal.type === 'lock';
                    const { error } = await supabaseClient
                        .from(TABLE_NAME)
                        .update({ is_locked: isLocking })
                        .eq('id', pinModal.extra);
                    
                    if (error) {
                        showNotif("Gagal: " + error.message, "error");
                    } else {
                        showNotif(isLocking ? "Data Berhasil Dikunci!" : "Kunci Berhasil Dibuka!");
                        fetchData();
                    }
                }

                setPinModal({ show: false, type: '', extra: null });
                setPinInput('');
            };

            const performRestore = async (json) => {
                showNotif("Memulihkan data...", "info");
                try {
                    let dataToRestore = json;

                    // Deteksi jika JSON dibungkus key tertentu (seperti 'data', 'reports', dll)
                    if (!Array.isArray(dataToRestore)) {
                        const possibleKeys = ['data', 'reports', 'records', 'sppd_data'];
                        for (const key of possibleKeys) {
                            if (json[key] && Array.isArray(json[key])) {
                                dataToRestore = json[key];
                                break;
                            }
                        }
                    }

                    if (!Array.isArray(dataToRestore)) {
                        throw new Error("Format JSON tidak valid (harus berupa Array)");
                    }

                    if (dataToRestore.length === 0) {
                        throw new Error("File JSON kosong");
                    }

                    // Bersihkan data dari field internal dan normalisasi
                    const cleanData = dataToRestore.map((item) => {
                        const cleanItem = { ...item };
                        // List field yang harus dibuang sebelum insert
                        const fieldsToRemove = [
                            'id', 'created_at', 'updated_at',
                            'createdAt', 'updatedAt', 'createdat', 'updatedat',
                            '_id', '__v'
                        ];
                        fieldsToRemove.forEach(f => delete cleanItem[f]);

                        return {
                            ...cleanItem,
                            // Pastikan penerima adalah array (antisipasi jika data lama disimpan sebagai string)
                            penerima: Array.isArray(cleanItem.penerima) ? cleanItem.penerima : (cleanItem.penerima ? [cleanItem.penerima] : [])
                        };
                    });

                    for (let i = 0; i < cleanData.length; i += 50) {
                        const chunk = cleanData.slice(i, i + 50);
                        const { error } = await supabaseClient.from(TABLE_NAME).insert(chunk);
                        if (error) throw error;
                    }

                    showNotif("Database Berhasil Dipulihkan", "success");
                    fetchData();
                } catch (e) {
                    console.error("Restore Error:", e);
                    showNotif("Gagal: " + (e.message || "Kesalahan Database"), "error");
                }
            };

            const handleBackup = () => {
                const b = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
                const url = URL.createObjectURL(b);
                const l = document.createElement('a');
                l.href = url; l.download = `BACKUP_SPPD_${new Date().toISOString().split('T')[0]}.json`;
                l.click();
                showNotif("Backup Berhasil Diunduh");
            };

            const handleRestoreFile = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const r = new FileReader();
                r.onload = (ev) => {
                    try {
                        const json = JSON.parse(ev.target.result);
                        setPinModal({ show: true, type: 'restore', extra: json });
                    } catch (e) { showNotif("File tidak valid", "error"); }
                };
                r.readAsText(file);
                e.target.value = '';
            };

            const filteredData = useMemo(() => {
                return data.filter(item => {
                    const matchSsk = (item.ssk || '').toLowerCase().includes(filters.ssk.toLowerCase());
                    const matchDate = filters.date ? item.tanggal_bp === filters.date : true;

                    let matchMonth = true;
                    if (filters.startMonth || filters.endMonth) {
                        const itemDate = new Date(item.tanggal_bp);
                        const itemVal = itemDate.getFullYear() * 12 + itemDate.getMonth();

                        if (filters.startMonth) {
                            const start = new Date(filters.startMonth);
                            const startVal = start.getFullYear() * 12 + start.getMonth();
                            if (itemVal < startVal) matchMonth = false;
                        }
                        if (filters.endMonth) {
                            const end = new Date(filters.endMonth);
                            const endVal = end.getFullYear() * 12 + end.getMonth();
                            if (itemVal > endVal) matchMonth = false;
                        }
                    }

                    return matchSsk && matchDate && matchMonth;
                });
            }, [data, filters]);

            const totals = useMemo(() => {
                return filteredData.reduce((acc, curr) => {
                    acc.sppd += (curr.sppd || 0);
                    acc.bensin += (curr.bensin || 0);
                    acc.tol += (curr.tol || 0);
                    acc.hotel += (curr.hotel || 0);
                    acc.total += (curr.total || 0);
                    return acc;
                }, { sppd: 0, bensin: 0, tol: 0, hotel: 0, total: 0 });
            }, [filteredData]);

            const uniqueSSKs = useMemo(() => {
                const ssks = data.map(item => item.ssk).filter(Boolean);
                return [...new Set(ssks)].sort();
            }, [data]);

            const exportExcel = () => {
                const ws = XLSX.utils.json_to_sheet(filteredData.map(d => ({
                    'Tanggal': d.tanggal_bp,
                    'No BP': d.no_bp,
                    'SSK': d.ssk,
                    'Kegiatan': d.kegiatan,
                    'Penerima': d.penerima.join(', '),
                    'Total': d.total
                })));
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "Laporan");
                XLSX.writeFile(wb, `Rekap_SPPD_${new Date().toISOString().split('T')[0]}.xlsx`);
            };

            return (
                <div className="min-h-screen py-6 px-4 lg:px-12 bg-slate-50">
                    {notif && (
                        <div className={`fixed top-6 right-6 z-[1000] px-8 py-4 rounded-2xl shadow-2xl animate-in font-black text-[10px] uppercase tracking-widest ${
                            notif.type === 'error' ? 'bg-rose-600 text-white' : 
                            notif.type === 'info' ? 'bg-blue-600 text-white' :
                            'bg-slate-900 text-white'
                        }`}>
                            {notif.msg}
                        </div>
                    )}

                    {pinModal.show && (
                        <div className="fixed inset-0 z-[1000] bg-slate-950/90 backdrop-blur-md flex items-center justify-center p-6">
                            <div className="bg-white rounded-[3rem] p-12 w-full max-w-sm text-center space-y-8 shadow-2xl animate-in">
                                <div className="w-20 h-20 bg-slate-950 text-white rounded-3xl flex items-center justify-center mx-auto shadow-xl"><Unlock size={32} /></div>
                                <div>
                                    <h3 className="font-black uppercase text-base tracking-tight text-slate-900">Otentikasi PIN</h3>
                                    <p className="text-[9px] font-bold text-slate-400 mt-2 uppercase tracking-widest">Masukkan PIN Master Anda</p>
                                </div>
                                <input type="password" autoFocus maxLength={3} value={pinInput}
                                    onChange={e => {
                                        const v = e.target.value; setPinInput(v);
                                        if (v.length === 3) setTimeout(() => handlePinSubmit(v), 100);
                                    }}
                                    className="w-full bg-slate-50 border-2 border-transparent focus:border-slate-950 outline-none p-5 rounded-3xl text-5xl font-black text-center tracking-[1.5rem] shadow-inner"
                                    placeholder="···"
                                />
                                <button onClick={() => setPinModal({ show: false })} className="text-[10px] font-black text-rose-500 uppercase hover:underline tracking-widest">Batalkan Sesi</button>
                            </div>
                        </div>
                    )}

                    <div className="max-w-[1400px] mx-auto space-y-6">
                        <div className="flex justify-between items-center px-6 py-2 bg-slate-900 text-white rounded-2xl text-[9px] font-black tracking-[0.2em] shadow-lg">
                            <div className="flex items-center gap-3">
                                <div className="w-2 h-2 rounded-full bg-emerald-500 animate-pulse shadow-[0_0_10px_rgba(16,185,129,0.8)]"></div>
                                <span></span>
                            </div>
                            <div className="flex gap-3">
                                <button onClick={handleBackup} className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-1.5 rounded-xl transition-all shadow-lg active:scale-95 text-[8px]">BACKUP</button>
                                <label className="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-1.5 rounded-xl cursor-pointer transition-all shadow-lg active:scale-95 text-[8px]">
                                    RESTORE
                                    <input type="file" className="hidden" accept=".json" onChange={handleRestoreFile} />
                                </label>
                            </div>
                        </div>

                        <div className="bg-white rounded-[3rem] custom-shadow border border-slate-100 overflow-hidden">
                            {/* Header */}
                            <div className="bg-blue-900 px-10 py-6 text-white flex flex-col md:flex-row justify-between items-center gap-8">
                                <div>
                                    <h1 className="text-3xl font-black uppercase tracking-tighter leading-none">PERJALANAN DINAS</h1>
                                    <div className="flex items-center gap-3 mt-3">
                                        <div className="h-0.5 w-10 bg-blue-500"></div>
                                        <p className="text-[10px] font-bold text-blue-300 tracking-[0.4em] uppercase">Pencatatan Operasional</p>
                                    </div>

                                                                    <div className="flex flex-wrap gap-1">
                                                                        {d.penerima.map((p, idx) => (
                                                                            <span key={idx} className="px-2 py-0.5 bg-slate-100 text-slate-700 rounded text-[8px] font-black uppercase tracking-tighter">{p}</span>
                                                                        ))}
                                                                    </div>
                                                                </td>
                                                                <td className="px-6 py-4 text-right font-black text-slate-500">{formatNumber(d.sppd)}</td>
                                                                <td className="px-6 py-4 text-right font-black text-slate-500">{formatNumber(d.bensin)}</td>
                                                                <td className="px-6 py-4 text-right font-black text-slate-500">{formatNumber(d.tol)}</td>
                                                                <td className="px-6 py-4 text-right font-black text-slate-500">{formatNumber(d.hotel)}</td>
                                                                <td className="px-6 py-4 text-right font-black text-slate-950"> {formatNumber(d.total)}</td>
                                                                <td className="px-6 py-4 text-center">
                                                                    <div className="flex justify-center gap-2">
                                                                        <button onClick={() => handleEdit(d)} className={`p-2 rounded-lg transition-all ${d.is_locked ? 'text-slate-200 cursor-not-allowed' : 'text-slate-400 hover:text-blue-600 hover:bg-blue-50'}`}>
                                                                            <Edit2 size={16} />
                                                                        </button>
                                                                        <button onClick={() => handleDelete(d.id)} className={`p-2 rounded-lg transition-all ${d.is_locked ? 'text-slate-200 cursor-not-allowed' : 'text-slate-400 hover:text-rose-600 hover:bg-rose-50'}`}>
                                                                            <Trash2 size={16} />
                                                                        </button>
                                                                        <button onClick={() => handleToggleLock(d)} className={`p-2 rounded-lg transition-all ${d.is_locked ? 'text-amber-500 bg-amber-50 shadow-inner' : 'text-slate-400 hover:text-amber-600 hover:bg-amber-50'}`}>
                                                                            {d.is_locked ? <Lock size={16} /> : <Unlock size={16} />}
                                                                        </button>
                                                                    </div>
                                                                </td>
                                                            </tr>
                                                        ))}
                                                    </tbody>
                                                </table>
                                                {!filteredData.length && <div className="p-32 text-center text-slate-300 font-black uppercase text-sm tracking-[0.5em] animate-pulse">Belum Ada Data Laporan SPPD</div>}
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
